name: Update changelogs

on:
  schedule:
    # Once a day at 06:00 UTC.
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: changelogs
  cancel-in-progress: false

jobs:
  update:
    name: Fetch firmware releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Pull releases for every firmware whose changelog source is GitHub.
      - name: Fetch releases
        run: node scripts/update-changelogs.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Make sure the fetched data still validates before committing.
      - name: Validate
        run: npm test

      - name: Commit changes
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/firmwares data/software; then
            echo "No changelog changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add data/firmwares/*/changelog.yaml data/software/*/changelog.yaml
            git commit -m "chore: update firmware and software changelogs"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made with GITHUB_TOKEN don't trigger the push-based deploy
      # workflow, so kick it off explicitly when the changelog actually changed.
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
