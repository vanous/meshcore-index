name: Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress production run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Validate data & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Validate every YAML record against the JSON Schemas + referential checks.
      - name: Validate data
        run: npm test
      # Ensure the static site builds (also regenerates data.json via prebuild).
      - name: Build
        run: npm run build

  build:
    name: Build site for Pages
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      # base_path is "/<repo>" for project sites, "" for user/org root sites —
      # svelte.config.js reads it via process.env.BASE_PATH.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
      # The single source of the github-pages artifact. Keeping this out of the
      # deploy job means re-running deploy never produces duplicate artifacts.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
