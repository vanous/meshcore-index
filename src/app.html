<!doctype html>
<html lang="%lang%">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="An open catalog of the MeshCore ecosystem — regional networks, LoRa devices, the reference firmware plus community and custom builds, and the software that connects it all."
    />
    <!-- Set the theme before first paint to avoid a flash of the wrong mode. -->
    <script>
      (function () {
        // Keep elev hex values in sync with src/lib/theme-chrome.js
        var elev = { dark: '#161b22', light: '#f6f8fa' };
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
          var c = elev[t] || elev.dark;
          var themeColor = document.createElement('meta');
          themeColor.name = 'theme-color';
          themeColor.content = c;
          document.head.appendChild(themeColor);
          var statusBar = document.createElement('meta');
          statusBar.name = 'apple-mobile-web-app-status-bar-style';
          statusBar.content = t === 'light' ? 'default' : 'black';
          document.head.appendChild(statusBar);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          var themeColor = document.createElement('meta');
          themeColor.name = 'theme-color';
          themeColor.content = elev.dark;
          document.head.appendChild(themeColor);
          var statusBar = document.createElement('meta');
          statusBar.name = 'apple-mobile-web-app-status-bar-style';
          statusBar.content = 'black';
          document.head.appendChild(statusBar);
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
