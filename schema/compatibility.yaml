$schema: https://json-schema.org/draft/2020-12/schema
$id: https://meshcore-atlas/schema/compatibility.yaml
title: Compatibility Report
description: >
  Optional evidence/details for one firmware version on one device. Firmware
  device support is listed in firmware.yaml; compatibility reports add richer
  verification when somebody has tested or researched a specific combination.
  firmwareId, firmwareVersion, and deviceId are inferred from
  data/compatibility/<firmware>/<version>/<device>.yaml.
type: object
additionalProperties: false
properties:
  status:
    description: Overall support verdict for this firmware + device pairing.
    enum:
      - supported
      - partial
      - untested
      - unsupported
  support:
    description: How the build is obtained and how strongly the pairing is verified.
    type: object
    additionalProperties: false
    properties:
      availability:
        description: Whether a usable build exists for this device.
        enum:
          - available
          - unavailable
          - unknown
      level:
        description: Who provides/blesses the build.
        enum:
          - official
          - vendor
          - community
          - experimental
      verification:
        description: How far the build has been verified, from imported data to fully tested.
        enum:
          - unknown
          - imported-unverified
          - boots
          - radio-tested
          - verified
  roles:
    description: >-
      Per-role results, keyed by canonical role (companion, repeater,
      room-server, observer, sensor, kiss-modem, standalone-ui).
    type: object
    additionalProperties: false
    patternProperties:
      ^(companion|repeater|room-server|observer|sensor|kiss-modem|standalone-ui)$:
        type: object
        additionalProperties: false
        properties:
          status:
            description: Verification result for this role.
            enum:
              - verified
              - boots
              - untested
              - unsupported
              - unknown
          transports:
            description: Per-transport result for this role, keyed by transport.
            type: object
            additionalProperties: false
            patternProperties:
              ^(ble|usb|tcp|wifi|ethernet|serial)$:
                enum:
                  - verified
                  - boots
                  - untested
                  - unsupported
                  - unknown
          management:
            description: Per-management-channel result for this role (CLI, OTA, DFU, web UI).
            type: object
            additionalProperties: false
            patternProperties:
              ^(serialCli|wifiOta|bleDfu|webUi)$:
                enum:
                  - verified
                  - boots
                  - untested
                  - unsupported
                  - unknown
  peripherals:
    description: >-
      Per-peripheral result, keyed by peripheral (display, gnss, battery,
      buttons, sd, sensors, wifi, ble, externalFlash).
    type: object
    additionalProperties: false
    patternProperties:
      ^(display|gnss|battery|buttons|sd|sensors|wifi|ble|externalFlash)$:
        enum:
          - verified
          - boots
          - untested
          - unsupported
          - unknown
  builds:
    description: Concrete build artifacts that were tested, with how each was obtained.
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        target:
          description: Firmware build target / variant name, e.g. "Heltec_v3_companion_radio_ble".
          type: string
          pattern: ^[A-Za-z0-9_.-]+$
        platformio_board:
          description: PlatformIO board id, e.g. "esp32-s3-devkitc-1".
          type: string
          pattern: ^[A-Za-z0-9_.-]+$
        role:
          description: Node role this build runs.
          enum:
            - companion
            - repeater
            - room-server
            - observer
            - sensor
            - kiss-modem
            - standalone-ui
        transports:
          description: Transports this build exposes.
          type: array
          items:
            enum:
              - ble
              - usb
              - tcp
              - wifi
              - ethernet
              - serial
        artifactSource:
          description: Where the tested artifact came from.
          enum:
            - github-release
            - web-flasher
            - source-build
            - manual
            - unknown
  verification:
    description: Who tested this pairing, when, and how trustworthy the evidence is.
    type: object
    additionalProperties: false
    properties:
      firmwareVersion:
        description: Exact firmware version tested, e.g. "v1.16.0".
        type: string
      hardwareRevision:
        description: Hardware revision tested, when relevant, e.g. "3.1".
        type: string
      testedAt:
        description: Date the test was performed, e.g. "2026-06-06".
        type: string
      testedBy:
        description: Person or team who tested it.
        type: string
      evidenceUrl:
        description: Link to supporting evidence (issue, forum post, screenshot, etc.).
        type: string
        pattern: ^https?://
      confidence:
        description: How much to trust this report, from manufacturer claim to community test.
        enum:
          - manufacturer
          - upstream-maintainer
          - community-tested
          - inferred-from-source
          - imported-unverified
          - unknown
  notes:
    description: Free-form notes about this firmware + device combination.
    type: string
  provenance:
    description: Where this report was imported/derived from, for traceability.
    type: object
    additionalProperties: false
    properties:
      source:
        description: Name of the source dataset or document.
        type: string
      sourceUrl:
        description: Link to the source.
        type: string
        pattern: ^https?://
      importedAt:
        description: When the report was imported, e.g. "2026-06-06".
        type: string
required:
  - status
