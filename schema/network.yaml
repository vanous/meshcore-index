$schema: https://json-schema.org/draft/2020-12/schema
$id: https://meshcore-atlas/schema/network.yaml
title: Network
description: >-
  An organized regional or local MeshCore mesh (national, regional, city-level
  or experimental) — its radio/joining settings, coverage, community and
  resources. The id comes from the directory name, not this file. Compatible
  devices are derived at render time from `radio.frequency` / `radios[].frequency`
  band keys against the device catalog, so networks do not list devices themselves.
type: object
additionalProperties: false
required:
  - name
properties:
  name:
    description: >-
      Short display name, e.g. "Czech MeshCore". Drop a repeated "MeshCore"
      prefix when context already makes it obvious.
    type: string
    minLength: 1
  also_known_as:
    description: Longer official names or alternate labels, e.g. "MeshCore Germany".
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  short_name:
    description: Abbreviated label, e.g. "MeshCore CZ".
    type: string
    minLength: 1
  description:
    description: One short paragraph about the network.
    type: string
  scope:
    description: >-
      How broad the network is. `general` = a standard MeshCore preset/region
      not tied to one community (e.g. the EU/UK band defaults), rather than an
      organized local mesh.
    type: string
    enum: [general, national, regional, local, experimental]
  status:
    description: Operational status of the network.
    type: string
    enum: [active, planned, dormant, inactive]
  deprecated:
    type: boolean
    description: >-
      Superseded by a newer preset/configuration. Deprecated networks are kept
      for reference but hidden from the coverage map and listed separately from
      active networks.
  visibility:
    description: Whether the network is openly joinable (`public`) or closed/invite-only (`private`).
    type: string
    enum: [public, private]
  coverage:
    description: Geographic coverage of the network.
    type: object
    additionalProperties: false
    properties:
      countries:
        description: Countries covered, as ISO-3166 alpha-2 uppercase codes, e.g. ["CZ", "DE"].
        type: array
        minItems: 1
        items:
          type: string
          pattern: ^[A-Z]{2}$
  area:
    type: string
    description: >-
      Optional GeoJSON filename in this network directory (usually
      `area.geojson`). Published as `/network-area/<id>.geojson` and shown on
      the Networks map.
    pattern: ^[A-Za-z0-9._-]+\.geojson$
  regions:
    description: >-
      MeshCore regions this network defines (firmware ≥1.14.0). Each is the
      region code used with `region put <code>` plus a friendly name;
      administrative subdivisions point at their national root via `parent`.
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - code
        - name
      properties:
        code:
          description: Firmware region code used in `region put <code>`, e.g. "cz-ulk".
          type: string
          minLength: 1
        name:
          description: Friendly region name, e.g. "Ústecký".
          type: string
          minLength: 1
        parent:
          description: Code of the parent region this subdivision belongs to, e.g. "cz".
          type: string
          minLength: 1
  radio:
    $ref: '#/$defs/radioSetting'
    description: >-
      The "how to join" panel for networks with a single joining preset. All
      fields optional, but a network with no `frequency` band key shows no
      derived compatible-device list.
  radios:
    type: array
    description: >-
      Multiple joining presets for one organized network, e.g. a primary band
      plus a secondary/growing band. Compatible devices are derived from the
      union of all `frequency` band keys.
    minItems: 1
    items:
      $ref: '#/$defs/radioSetting'
  community:
    description: Community hubs and contact channels for the network.
    type: object
    additionalProperties: false
    properties:
      website:
        description: Community website, e.g. https://meshcore.cz.
        type: string
        pattern: ^https?://
      matrix:
        description: Matrix room or space, e.g. "#meshcore-cz:matrix.org".
        type: string
        minLength: 1
      discord:
        description: Discord invite URL.
        type: string
        pattern: ^https?://
      telegram:
        description: Telegram group/channel URL.
        type: string
        pattern: ^https?://
      forum:
        description: Discussion forum URL.
        type: string
        pattern: ^https?://
      facebook:
        description: Facebook group/page URL.
        type: string
        pattern: ^https?://
      reddit:
        description: Subreddit URL.
        type: string
        pattern: ^https?://
      youtube:
        description: YouTube channel URL.
        type: string
        pattern: ^https?://
      peertube:
        description: PeerTube channel URL.
        type: string
        pattern: ^https?://
      contact:
        description: General contact, e.g. an email address or handle.
        type: string
        minLength: 1
  maps:
    description: >-
      Map instances for this network — a network can run several (live node map,
      coverage/propagation map, etc.). Each has a display `name` and a `url`.
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/namedLink'
  analyzers:
    description: >-
      Network analyzer / diagnostic instances (e.g. CoreScope deployments). A
      network can run many; each has a display `name` and a `url`.
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/namedLink'
  resources:
    description: Single-instance documentation/links for the network.
    type: object
    additionalProperties: false
    properties:
      status_page:
        description: Network status/health page URL.
        type: string
        pattern: ^https?://
      repeater_list:
        description: Page listing the network's repeaters.
        type: string
        pattern: ^https?://
      getting_started:
        description: Getting-started / how-to-join guide URL.
        type: string
        pattern: ^https?://
      links:
        description: Other useful network resources (`{ name, url }`).
        type: array
        minItems: 1
        items:
          $ref: '#/$defs/namedLink'
  refs:
    type: object
    description: >-
      Cross-references to external databases. Each key must be a ref id defined
      in data/globals.yaml `refs`; each value is this record's id/slug on that
      site, expanded into a URL via the ref's urlTemplate.
    minProperties: 1
    additionalProperties:
      type: string
      minLength: 1
$defs:
  radioSetting:
    description: One joining preset — the LoRa settings members use to reach the mesh.
    type: object
    additionalProperties: false
    properties:
      name:
        description: Friendly label when a network publishes multiple radio presets.
        type: string
        minLength: 1
      description:
        description: Short note explaining when/why to use this preset.
        type: string
        minLength: 1
      app_preset:
        description: >-
          Foreign key to the matching preset in the official MeshCore app config
          (https://api.meshcore.nz/api/v1/config →
          config.suggested_radio_settings.entries[].title). The value is that
          entry's exact `title`. A daily workflow (.github/workflows/app-presets.yml)
          verifies this network's frequency_mhz / bandwidth_khz / spreading_factor /
          coding_rate still match the upstream preset and opens an issue on drift.
        type: string
        minLength: 1
      frequency:
        description: >-
          Band key matching a key in data/globals.yaml `frequency`
          (e.g. "433", "868", "915"). Drives the compatible-device match.
        type: string
        minLength: 1
      frequency_mhz:
        description: Exact centre frequency in MHz shown to users, e.g. 869.432.
        type: number
        exclusiveMinimum: 0
      bandwidth_khz:
        description: Channel bandwidth in kHz, e.g. 250.
        type: number
        exclusiveMinimum: 0
      spreading_factor:
        description: LoRa spreading factor (5–12), e.g. 11.
        type: integer
        minimum: 5
        maximum: 12
      coding_rate:
        description: LoRa coding rate, e.g. "4/5" or "4/8".
        type: string
        pattern: ^4/[5-8]$
      tx_power_dbm:
        description: Transmit power in dBm, e.g. 22.
        type: number
      duty_cycle_pct:
        description: Legal/agreed duty cycle for the band, in percent (e.g. 10).
        type: number
        exclusiveMinimum: 0
        maximum: 100
      path_hash_mode:
        description: MeshCore path hash mode, e.g. "1-Byte" or "2-Byte".
        type: string
        minLength: 1
      region_code:
        description: MeshCore region code used with `region put`, e.g. "eu".
        type: string
        minLength: 1
      max_hops:
        description: Maximum hop count for routed packets, e.g. 5.
        type: integer
        minimum: 1
      public_channel:
        description: Name of the default public channel shared to join, e.g. "public".
        type: string
        minLength: 1
  namedLink:
    description: A labelled link (`{ name, url }`).
    type: object
    additionalProperties: false
    required:
      - name
      - url
    properties:
      name:
        description: Display label, e.g. "Live node map".
        type: string
        minLength: 1
      url:
        description: Link target, e.g. https://mapa.meshcore.cz.
        type: string
        pattern: ^https?://
