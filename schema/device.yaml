$schema: https://json-schema.org/draft/2020-12/schema
$id: https://meshcore-atlas/schema/device.yaml
title: Device
description: A hardware board. The id comes from the directory name, not this file.
type: object
additionalProperties: false
required:
  - name
  - hardware
properties:
  name:
    type: string
    minLength: 1
  vendorId:
    type: string
    pattern: ^[a-z0-9-]+$
  kind:
    enum:
      - product
      - dev-board
      - module
      - kit
      - generic-build
  lifecycle:
    enum:
      - announced
      - active
      - discontinued
      - unknown
  familyId:
    type: string
    pattern: ^[a-z0-9-]+$
  revision:
    type: string
  variantOf:
    type: string
    pattern: ^[a-z0-9-]+$
  aliases:
    type: array
    items:
      type: string
  replaces:
    type: string
    pattern: ^[a-z0-9-]+$
  product_url:
    type: string
    pattern: ^https?://
  price:
    type: object
    additionalProperties: false
    description: Approximate street price — an indicator, not a quote.
    required:
      - amount
    properties:
      amount:
        type: number
        minimum: 0
      currency:
        type: string
        default: USD
        pattern: ^[A-Z]{3}$
      asOf:
        type: string
        pattern: ^\d{4}-\d{2}$
      url:
        type: string
        pattern: ^https?://
  image:
    type: string
    pattern: \.svg$
  official:
    type: boolean
  roles:
    type: array
    items:
      enum:
        - companion
        - repeater
        - room-server
        - observer
        - sensor
        - kiss-modem
        - standalone-ui
  transports:
    type: array
    items:
      enum:
        - ble
        - usb
        - tcp
        - wifi
        - ethernet
        - serial
  hardware:
    type: object
    additionalProperties: false
    required:
      - mcu
    properties:
      mcu:
        type: object
        additionalProperties: false
        properties:
          model:
            type: string
          flashMb:
            type: number
          psramMb:
            type: number
      radios:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            technology:
              enum:
                - lora
                - esp-now
                - other
            chip:
              type: string
            frequencyVariants:
              type: array
              items:
                type: string
            txPowerDbm:
              type: number
            antenna:
              type: string
      display:
        type: object
        additionalProperties: false
        properties:
          status:
            enum:
              - unknown
              - none
              - present
          technology:
            enum:
              - unknown
              - display
              - oled
              - e-paper
              - e-ink
          controller:
            type: string
          size:
            type: number
          resolution:
            type: object
            additionalProperties: false
            properties:
              width:
                type: integer
              height:
                type: integer
          touch:
            type: boolean
          colors:
            enum:
              - monochrome
              - grayscale
              - color
      gnss:
        type: object
        additionalProperties: false
        properties:
          status:
            enum:
              - unknown
              - none
              - present
          chip:
            type: string
      input:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            type:
              enum:
                - keyboard
                - trackball
                - joystick
                - encoder
                - button
                - microphone
                - speaker
            description:
              type: string
      power:
        type: object
        additionalProperties: false
        properties:
          batterySupported:
            type: boolean
          charging:
            type: boolean
          solarInput:
            type: boolean
          solarPanelBuiltIn:
            type: boolean
          solarPanelWatts:
            type: number
            minimum: 0
          batteryBuiltIn:
            type: boolean
          batteryCapacityMah:
            type: number
            minimum: 1
          pmic:
            type: string
          batteryConnector:
            type: string
      expansion:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
            count:
              type: integer
              minimum: 1
            pins:
              type: integer
              minimum: 1
            interfaces:
              type: array
              items:
                type: string
      enclosure:
        type: object
        additionalProperties: false
        properties:
          builtIn:
            type: boolean
          ipRating:
            type: string
      physical:
        type: object
        additionalProperties: false
        properties:
          dimensionsMm:
            type: object
            additionalProperties: false
            properties:
              width:
                type: number
                minimum: 0
              height:
                type: number
                minimum: 0
              depth:
                type: number
                minimum: 0
          weightG:
            type: number
            minimum: 0
      environmental:
        type: object
        additionalProperties: false
        properties:
          operatingTempC:
            type: object
            additionalProperties: false
            properties:
              min:
                type: number
              max:
                type: number
      certifications:
        type: array
        items:
          type: string
          minLength: 1
  interfaces:
    type: object
    additionalProperties: false
    properties:
      usb:
        type: object
        additionalProperties: false
        properties:
          connector:
            type: string
          bridge:
            type: string
          capabilities:
            type: array
            items:
              enum:
                - power
                - serial
                - flashing
                - dfu
      bluetooth:
        type: object
        additionalProperties: false
        properties:
          version:
            type: string
          ble:
            type: boolean
      wifi:
        type: object
        additionalProperties: false
        properties:
          status:
            enum:
              - unknown
              - none
              - present
          standard:
            type: string
  description:
    type: string
