# Shared parts catalog — canonical names, vendors and datasheet links for the
# components referenced by device.yaml files. Devices carry only the bare
# identifying string (mcu model, radio chip, band key…); the site resolves it
# against this catalog (case-insensitively) for a friendly name and an outbound
# link. Adding entries is purely additive — an unmatched value renders as-is.
#
# Because a model belongs to exactly one family, MCUs are defined as a family
# tree: a device specifies only `hardware.mcu.model` and the family + CPU
# architecture are derived from here. When a family id also names a specific
# chip (e.g. `esp32` is both the series and the original ESP32), register it
# under `models` too — lookup prefers the model entry over the family fallback.
#
# Keys match the value used in device.yaml:
#   family / family.models → hardware.mcu.model
#   radio                  → hardware.radios[].chip
#   frequency              → hardware.radios[].frequencyVariants[]  (e.g. "868")
#   display                → hardware.display.technology
#   gnss                   → hardware.gnss.chip

family:
  nrf52:
    name: Nordic nRF52 series
    vendor: Nordic Semiconductor
    url: https://www.nordicsemi.com/Products/Low-power-short-range-wireless/nRF52-Series
    architecture: arm-cortex-m4
    models:
      nrf52840:
        name: Nordic nRF52840
        url: https://www.nordicsemi.com/Products/nRF52840
  nrf54:
    name: Nordic nRF54 series
    vendor: Nordic Semiconductor
    url: https://www.nordicsemi.com/Products/nRF54L-Series
    architecture: arm-cortex-m33
    models:
      nrf54l15:
        name: Nordic nRF54L15
        url: https://www.nordicsemi.com/Products/nRF54L15
  esp32:
    name: Espressif ESP32 series
    vendor: Espressif
    url: https://www.espressif.com/en/products/socs/esp32
    architecture: xtensa
    models:
      esp32:
        name: Espressif ESP32 (original)
        url: https://www.espressif.com/en/products/socs/esp32
      esp32-s3:
        name: Espressif ESP32-S3
        url: https://www.espressif.com/en/products/socs/esp32-s3
      esp32-c3:
        name: Espressif ESP32-C3
        url: https://www.espressif.com/en/products/socs/esp32-c3
        architecture: risc-v
      esp32-c6:
        name: Espressif ESP32-C6
        url: https://www.espressif.com/en/products/socs/esp32-c6
        architecture: risc-v
      esp32-p4:
        name: Espressif ESP32-P4
        url: https://www.espressif.com/en/products/socs/esp32-p4
        architecture: risc-v
  rp2040:
    name: Raspberry Pi RP2040
    vendor: Raspberry Pi
    url: https://www.raspberrypi.com/products/rp2040/
    architecture: arm-cortex-m0-plus
  stm32wl:
    name: ST STM32WL
    vendor: STMicroelectronics
    url: https://www.st.com/en/microcontrollers-microprocessors/stm32wl-series.html
    architecture: arm-cortex-m4

# Friendly display names for CPU architectures (the keys above resolve here).
