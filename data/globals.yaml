# Regional LoRa bands. Referenced from a device by the short key, e.g.
#   frequencyVariants: ["868", "915"]
frequency:
  "433":
    name: 433 MHz
    range: 433.05–434.79 MHz
    region: EU433 / CN
  "470":
    name: 470 MHz
    range: 470–510 MHz
    region: CN470
  "780":
    name: 780 MHz
    range: 779–787 MHz
    region: CN779
  "865":
    name: 865 MHz
    range: 865–867 MHz
    region: IN865
  "868":
    name: 868 MHz
    range: 863–870 MHz
    region: EU868
  "915":
    name: 915 MHz
    range: 902–928 MHz
    region: US915 / AU915
  "920":
    name: 920 MHz
    range: 920–923 MHz
    region: KR920
  "923":
    name: 923 MHz
    range: 920–925 MHz
    region: AS923

