name: MeshcoreGRID
type: fork
maintainer: Quark1980
description: >
  Touch-first MeshCore handheld firmware with a standalone GRID interface for
  chat, discovery, contacts, radio controls, BLE settings and power management.
repository: https://github.com/Quark1980/MeshcoreGRID
license: MIT
status: maintenance
lifecycle: active
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
runtime:
  framework: arduino
  language: C++
roles:
  - companion
  - standalone-ui
features:
  - Touch-first standalone interface
  - Direct and channel messaging
  - Contact and advert management
  - On-device radio controls
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
  hardware:
    display: true
devices:
  - id: heltec-v4
    status: supported
    target: heltec_v4_tft_grid_os_ble
    notes: Requires a Heltec V4 configuration with TFT and FT6336 touch controller.
