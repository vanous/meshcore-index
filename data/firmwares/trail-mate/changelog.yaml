      instead of parallel page-local implementations / 新增共享地图视口组件，以及固件视觉风格、节点详情页行为与地图图层弹窗语义等 UI/UX
      规格，使地图相关界面不再继续各自平行实现，而是共享同一套明确契约

      - Formal localization and locale-pack specifications in Chinese, covering runtime
      responsibilities, install layout, package/version boundaries, and the evolution rules between
      firmware and language packs / 新增中文版本地化总规格与语言包规格，明确运行时职责、安装布局、包与版本边界，以及固件与语言包之间的演进约束


      ### Changed / 变更

      - The Node Info page was rebuilt around the shared map viewport, with bottom-center layer
      switching, node-centered zoom semantics, draggable map browsing, right-aligned link readouts,
      and a content-bounded translucent backdrop for readability over live map tiles /
      节点详情页现已围绕共享地图视口重构，支持底部居中的图层切换、以目标节点为锚点的缩放语义、可拖动地图浏览、右对齐链路读数，以及仅包裹读数内容的半透明可读性底板

      - Shared SPI bus ownership is now modeled explicitly as shared_spi_lock, with naming, guard
      usage, and supporting guidance aligned across display, map tiles, track recording, SSTV, and
      USB mass-storage paths / 共享 SPI 总线所有权现已显式建模为 shared_spi_lock，并在显示、地图瓦片、轨迹记录、SSTV 与 USB
      大容量存储路径中统一命名、guard 用法与配套说明

      - Shared localization/runtime surfaces were refined further across settings, contacts, GPS,
      and package/runtime plumbing, and the Simplified Chinese language pack was updated to cover
      the new map-layer and UI copy / 设置、联系人、GPS 与语言包运行时等共享本地化路径进一步收敛，同时补齐简体中文语言包对新地图图层与界面文案的覆盖


      ### Fixed / 修复

      - Fixed Node Info regressions where tiles could fail to render, map dragging/layer switching
      diverged from the main map page, and right-side readouts became hard to read or inconsistent
      over map imagery / 修复节点详情页中瓦片可能不渲染、地图拖动与图层切换语义偏离主地图页，以及右侧读数叠在地图图像上时难以辨认或表现不一致的问题

      - Fixed shared-SPI contention during USB mass-storage activity by locking SD access and
