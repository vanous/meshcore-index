      corruption and tear-like artifacts on ESP boards / 修复 USB 大容量存储期间的共享 SPI 争用问题，在 USB MSC
      后端占用存储路径时为 SD 访问加锁并暂停无线任务，降低 ESP 板卡上的显示损坏与类似撕裂现象

      - Fixed supporting protocol/runtime helper paths so node detail, map-layer UI, and
      localization-driven surfaces behave more predictably across mixed protocol and device states /
      修复若干协议与运行时 helper 的支撑路径，使节点详情、地图图层界面与本地化驱动的共享界面在混合协议和设备状态下表现更稳定且更可解释




