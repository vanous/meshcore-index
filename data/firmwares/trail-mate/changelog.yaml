      ## [0.1.27-alpha] - 2026-05-30

      ### Added / 新增

      - Added the T-LoRa Pager LR1121 build and release path for issue #40, including the CI build
      target, web flasher target, RF switch setup, and TCXO bring-up / 针对 issue #40 新增 T-LoRa Pager
      LR1121 构建与发布路径，包括 CI 构建目标、网页刷机目标、RF switch 配置与 TCXO 启动


      ### Changed / 变更

      - Updated GitHub Pages device/install metadata so the LR1121 Pager appears as its own release
      target, while CI continues to validate `tlora_pager_lr1121` alongside the existing targets /
      更新 GitHub Pages 设备与安装信息，使 LR1121 Pager 作为独立发布目标展示，同时 CI 继续与既有目标一起验证 `tlora_pager_lr1121`


      ### Fixed / 修复

      - Fixed Team mode on T-LoRa Pager for issue #35 by finishing the Team runtime refactor and
      restoring the Team chat receive/send path / 针对 issue #35 完成 Team runtime 重构并恢复 Team 聊天收发路径，修复
      T-LoRa Pager 上的 Team 模式

      - Fixed daylight-saving time handling for issue #38 so displayed local time follows DST rules
      correctly / 针对 issue #38 修复夏令时处理，使本地时间显示正确遵循 DST 规则

      - Fixed spotty T-Deck battery reporting for issue #39 by smoothing the battery estimate path /
      针对 issue #39 修复 T-Deck 电量状态不稳定的问题，收敛电量估算路径

      - Fixed 64 GB SD card support for issue #42 by adding SDXC/exFAT-capable storage and routing
      map, Team, GPS, Settings, contact, node, route, tracker, and SSTV persistence through the
      shared SD runtime / 针对 issue #42 支持 64 GB SD 卡，新增 SDXC/exFAT
      存储能力，并让地图、Team、GPS、Settings、联系人、节点、路线、轨迹与 SSTV 持久化统一走共享 SD runtime




      ## What's Changed

      * Prepare 0.1.27-alpha fixes by @vicliu624 in https://github.com/vicliu624/trail-mate/pull/45



      **Full Changelog**:
      https://github.com/vicliu624/trail-mate/compare/v0.1.26-alpha...v0.1.27-alpha
