      in-device updates / 新增 Pages/Release 打包链路，同时发布 OTA 二进制、Web Flasher
      镜像与语言包资源，使项目站点既能浏览器刷机也能驱动设备内更新

      - Flash-backed language-pack storage on ESP, allowing installed locale/font packages to load
      from internal flash without depending on SD card presence / 新增 ESP 上基于内部 Flash 的语言包存储，使已安装
      locale/font 包可直接从内部 Flash 加载，不再依赖 SD 卡存在


      ### Changed / 变更

      - Startup flow now surfaces UI earlier, shows boot progress/log feedback, and keeps
      long-running locale/package operations behind a shared busy overlay that blocks input and
      suppresses sleep while work is active / 启动流程现会更早显示 UI，并提供 boot 进度/日志反馈；耗时的语言包与资源操作也会通过统一 busy
      overlay 承载，在进行中阻止输入并抑制息屏

      - Firmware version reporting now prefers the injected Trail Mate version from the build
      pipeline instead of exposing the raw ESP-IDF app version, and CI validates OTA slot size
      before publishing artifacts / 固件版本展示现优先使用构建流水线注入的 Trail Mate 版本号，而不是直接暴露 ESP-IDF app
      version；CI 也会在发布前校验 OTA 分区大小

      - Chinese locale/font handling was reworked around tiered packs, IME availability controls,
      and flash-first discovery so startup and runtime font loads are faster and more predictable /
      中文 locale/font 处理围绕分层字体包、输入法启用控制与 flash-first 发现机制进行了重构，使启动与运行时字体加载更快且更可控


      ### Fixed / 修复

      - Fixed low-memory Wi-Fi bring-up for settings/package/update flows by adding heap
      diagnostics, BLE pause-and-retry fallback, and lighter initialization settings when needed /
      修复设置页、语言包下载与固件更新流程中 Wi-Fi 在低内存条件下难以启动的问题，通过增加 heap 诊断、BLE 暂停后重试，以及更轻量的初始化参数提升成功率

      - Fixed incorrect esp-idf:v4.4.7 ... version strings in the UI, and kept update/version
      surfaces aligned with the actual firmware release being built / 修复界面中错误显示 esp-idf:v4.4.7 ...
      作为版本号的问题，使更新与版本展示统一对齐到真实固件版本

      - Fixed several UX regressions around locale install/load and multilingual input, including
      missing loading feedback, sleep during blocking tasks, and Chinese IME/candidate layout issues
      / 修复语言包安装/加载与多语言输入过程中的多项体验回退，包括缺少 loading 反馈、阻塞任务期间误触发息屏，以及中文输入法/候选栏布局问题




