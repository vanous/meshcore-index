name: MeshCore T-Beam 1W
type: fork
maintainer: mintylinux
description: >
  Dedicated MeshCore firmware builds for the LilyGo T-Beam 1 Watt, providing prebuilt
  binaries for easy flashing without compiling from source.
repository: https://github.com/mintylinux/Meshcore-T-beam-1W-Firmware
license: MIT
status: maintenance
lifecycle: maintenance
maturity: stable
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
  - repeater
features:
  - Prebuilt firmware for T-Beam 1W
  - Easy flashing without compiling
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: true
    wifiAp: true
  operations:
    ota: true
    webFlasher: false
  networking:
    repeater: true
    roomServer: false
    observer: false
    kissModem: false
  hardware:
    gps: true
    display: false
    sensors: false
    lowPowerRx: false
devices:
  # Source: repo description — dedicated firmware for LilyGo T-Beam 1 Watt
  - id: lilygo-tbeam-1w
    status: supported