      **This is the new stable release.** It replaces beta_27 and bundles everything from beta_28
      through beta_31 — room-server reliability, the real burn-in fix, a redesigned chats tab,
      big-mesh performance work and a live Spectrum analyzer.


      Flash from the web flasher at **https://wadamesh.com**, update from the Launcher, or use the
      on-device updater (Settings → About). Devices on the beta/test channel are already on this
