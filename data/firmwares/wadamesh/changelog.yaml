    notes: >-
      **wadamesh beta_22 — test build.** Opt in on-device via **Settings → About → "Get test builds
      (beta)"**, or the flasher's Beta toggle. Two fixes on top of the stable beta_21:


      ## Fixed


      - **The signal probe reads a real signal again.** beta_21 made the probe a zero-hop advert so
      it could never be re-flooded across the mesh — but nothing answers a zero-hop advert, so the
      reading stopped updating. It now sends a **directed trace "ping" to your nearest repeater**:
      the repeater replies directly (it still never floods the mesh) and the device reads the link
      signal from that reply. No flooding *and* a live signal. Thanks to **Tarmo** for spotting this
      and suggesting the fix.

      - **Contacts discovered while your phone is connected now show on the device too.** A node
      heard while the T-Deck was Bluetooth-connected to the MeshCore phone app appeared on the phone
      but not on the device's own screen, and the Contacts list didn't refresh. It now updates
      either way. (#73, reported by @1nerdherder.)


      Everything from beta_21, the first stable, is included.
