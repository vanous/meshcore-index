      > 🙌 **Most of this release was built by the community.** [@Vybo](https://github.com/Vybo)
      (Dan Vybiral) contributed the lion's share in
      [#12](https://github.com/ALLFATHER-BV/wadamesh/pull/12) — the Snake game, battery & telemetry
      history, map night mode, the PNG/BMP image viewer, and the entire status-bar toolkit.
      [@tun0](https://github.com/tun0) (Ruben Laban) fixed unread badges and chat-history
      persistence in [#15](https://github.com/ALLFATHER-BV/wadamesh/pull/15). Thank you both. 🎉


      ### 🐍 Snake game — by [@Vybo](https://github.com/Vybo) (#12)

      A Snake game in the app drawer — steer by swiping the screen or with the T-Deck trackball,
      with pause/resume and restart after a game over. (Touch now stays inside the game and doesn't
      leak to the screen behind it.)


      ### 🔋 Battery & telemetry — by [@Vybo](https://github.com/Vybo) (#12)

      - **Tap the battery** in the status bar for a **24-hour history chart** with an estimated
      time-left readout (logged every 5 minutes).

      - **Per-node telemetry window** — poll a node's battery, temperature and humidity, watch them
      on a live chart, and keep a per-node log.


      ### 🗺️ Map — by [@Vybo](https://github.com/Vybo) (#12)

      - **Night mode** — the status bar and tab bar invert to match the dark map.

      - Live **zoom-level readout** above the zoom slider, and a proper magnifier icon on the zoom
      button.

      - New **"Show on map"** contact action that centres the map on that node.


      ### 📊 Status bar & tools — by [@Vybo](https://github.com/Vybo) (#12)

      - A **microSD activity LED** that lights on card access (including file-manager reads/copies).

      - An **activity spinner** while a telemetry / admin / ping / trace / range / sightline request
      is in flight.

      - Option to **hide the device name** and move the clock left.

      - **Hold the status bar** to save a full-screen screenshot to SD.


      ### 🖼️ Files & images — by [@Vybo](https://github.com/Vybo) (#12)

      The file browser now previews **PNG and BMP** images (not just JPEG), with no stale image when
      opening several in a row.


      ### 💬 Chat reliability

      - **Fixed garbled / duplicated messages** — chat text is no longer corrupted in transit, so
      messages arrive intact and duplicates are filtered out correctly. Thanks to
      [@marcelverdult](https://github.com/marcelverdult) for the precise report
      ([#13](https://github.com/ALLFATHER-BV/wadamesh/issues/13)).

      - **Accurate unread badges** and **more chat history kept across reboots** — by
      [@tun0](https://github.com/tun0) ([#15](https://github.com/ALLFATHER-BV/wadamesh/pull/15)).


      ### ✨ Also in this release

      - **Lock-screen wallpaper from Files** — view any JPEG on your SD card and tap "Set as
      wallpaper".

      - **Set your own Bluetooth pairing code** in Settings.

      - The app drawer **fits all the apps** again (no clipped bottom row) and shows a **scrollbar**
      when there's more to scroll.

      - Fixed map-tile caching (false "storage full"); black/missing tiles re-download. `@`-reply no
      longer overwrites text you were typing. Fixed an out-of-memory crash and made notification
      audio more reliable.


      ---


      **Contributors:** [@Vybo](https://github.com/Vybo) (Dan Vybiral) ·
      [@tun0](https://github.com/tun0) (Ruben Laban) ·
      [@marcelverdult](https://github.com/marcelverdult) (reported #13).


      **Boards:** T-Deck → `wadamesh-tdeck*.bin` · Heltec V4 TFT → `wadamesh-heltec-v4-tft*.bin`.
      Use `-merged.bin` for a full flash at 0x0 (web flasher / esptool), or the plain `.bin` for
      on-device update / Launcher.
  - version: beta_6
    name: wadamesh beta_6
    datetime: '2026-06-16T22:40:43Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_6
    prerelease: false
    notes: >-
      Touch firmware **beta_6** for the **LilyGo T-Deck** and **Heltec V4 + TFT**.


      Install or update via the web flasher → **https://flasher.wadamesh.com** (or flash the
      `*-merged.bin` at `0x0` with esptool). Devices on beta_5 will see beta_6 on their next update
      check.


      ---


      ### New: RF Monitor app

      - A new **Monitor** app on the app drawer — a live RF sniffer that shows exactly what your
      node is pulling out of the air in real time.

      - A **"Recently heard"** feed lists recent received frames by type (text, advert, ack,
      route-trace…) with **RSSI, SNR and hop count**, colour-coded by type.

      - A **link-margin** readout grades how much headroom your last packet had (green / amber /
      red), alongside a live **packet rate** and a **noise-floor + peak-hold RSSI scope with an
      on-screen dBm scale**.

      - Lays out cleanly in both **portrait and landscape**, so it's readable on the Heltec V4 and
      the T-Deck.


      ### Chat & contacts

      - Direct-message chats now show a **person icon** and channels a **group icon** (instead of
      the old loop / envelope).

      - **Block a non-contact sender by name** — handy for silencing an automated room or repeater
      bot you couldn't block before.

      - Opening a chat or channel **no longer jumps to the newest message** — it keeps your scroll
      position.

      - The contacts **Sort & Filter** popup now closes after you pick a sort option.

      - Fixed the chat/channel **long-press popup**: the close ✕ no longer overlaps the buttons
      while you scroll it.


      ### Time & timezone

      - New **time-zone picker** with named zones (no longer CET-only) — set yours in **Settings →
      System**.

      - Fixed the clock getting **stuck at 1902** and channels showing 1969–1970 dates: GPS no
      longer clobbers the clock with an invalid date, and the time now **survives a reboot**.


      ### Launcher & Wi-Fi

      - **Map tiles now download under Launcher** (the tile cache was wrongly reported as full).

      - **GPS now gets a fix under Launcher.**

      - The setup-wizard **Wi-Fi scan no longer comes up empty** — modem sleep is deferred until
      after you're connected.


      ### Bluetooth

      - Bluetooth now **advertises under your node / profile name** instead of "NimBLE".

      - The **Bluetooth PIN no longer resets** on its own — it's saved and reused across reboots.


      ### Power & performance

      - Turning the screen off now **downclocks the CPU** and enables Wi-Fi modem sleep to save
      power.

      - On the map, your **position dot is drawn before the tiles** so it no longer lags behind when
      panning.


      ### Community

      - Merged map-server and SD-tile rendering fixes contributed by **Vybo** (#11). Thanks!
  - version: beta_5
