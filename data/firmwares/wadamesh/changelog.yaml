    notes: >-
      **wadamesh beta_14 — hotfix** 🩹


      Fixes a beta_13 regression: with **keyboard navigation turned off** (Settings → Keyboard), the
      physical keyboard stopped typing into text fields entirely on the **T-Deck** and **Tanmatsu**.
      Typing now works again with keyboard-nav off; with it on, behaviour is unchanged. (The Heltec
      V4 was never affected — it has no keyboard navigation.)


      **Everything from [beta_13](https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_13) is
      included** — the community features from **@Yazutsu**, **@tun0**, **@Vybo** and
      **@samuelcoustet** (room-post author names, the Direct 0-hop filter, beer emoji / status-bar
      unread tap / new-contact toast toggle / Czech accents, trackball edge-scroll, and the
      companion/TCP/OTA fixes) plus the keyboard-nav, special-characters picker and 12-hour-clock
      work. See the [beta_13 notes](https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_13)
      for the full list and credits. 🙏


      ▶️ **Flash in the browser:** https://flasher.wadamesh.com — or install via the Launcher /
      on-device update.
  - version: beta_13
    name: wadamesh beta_13
