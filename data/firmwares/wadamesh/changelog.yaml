  - version: beta_31
    name: wadamesh beta_31
    datetime: '2026-07-05T19:09:28Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_31
    prerelease: false
    notes: >-
      Test build on top of beta_30. This one gives the chats tab a face.


      Flash from the web flasher at **https://wadamesh.com** (Standalone install → Version →
      beta_31), or grab a `-merged.bin` below.


      ## New — the chats tab, redesigned

      Each conversation now shows a **round avatar in that chat's signature colour** (the same
      colour its bubbles use) with the **first two letters of the name**, the **last message
      previewed** under the name, the time top-right and the unread count below it — the layout you
      know from every phone messenger. **Compact chat mode keeps the dense single-line rows**
      instead, so both styles are available and the toggle switches the whole tab.


      ## New — custom channel icons

      Open a channel's settings (long-press or the gear) and tap **"Chat icon"** to pick any emoji
      as that channel's avatar. Long-press the same entry to go back to the automatic letters. The
      choice is remembered per channel.


      ## Fixed

      - Long chat names no longer wrap onto the message preview underneath.


      ---

      This is a **test/beta** build (prerelease); stable stays **beta_27**. On-device, enable
      **Settings → About → "Get test builds (beta)"** to follow the test channel over Wi-Fi.
  - version: beta_30
    name: wadamesh beta_30
    datetime: '2026-07-05T11:10:38Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_30
    prerelease: true
    notes: >-
      Test build on top of beta_29. This one is about speed: the big-mesh sluggishness is fixed, and
      the Spectrum analyzer is now genuinely live.


      Flash from the web flasher at **https://wadamesh.com** (Standalone install → Version →
      beta_30), or grab a `-merged.bin` below.


      ## Fixed — the periodic multi-second freezes on busy meshes (#82)

      Saving the contact list took up to **3 seconds at ~570 contacts and ran on the UI thread**
      every couple of minutes — exactly the trackball/touch hesitation reported since beta_25. The
      save now packs the same data into a few large writes instead of thousands of tiny ones,
      cutting it to a fraction of the time. On top of that, the Contacts tab no longer tears itself
      down every 60 seconds just to refresh the "heard 2h ago" labels (they update in place now —
      that rebuild cost over a second on large lists and could yank the list mid-scroll), and advert
      bursts can no longer queue several rebuilds back to back.


      Thanks to **guinnessbear** for the report and to **Yazutsu** for the first-rate timing
      measurements that pinned down exactly where the stalls came from.


      ## Improved — Spectrum analyzer

      - The **waterfall gets a new line ~4x per second** instead of once per sweep, and the trace
      advances across the band as it sweeps, like a bench analyzer.

      - A full sweep is ~20% faster.

      - The **trace Y-axis now scales itself to the live signal**: it expands instantly when a
      strong signal appears (no more clipping flat against the top) and eases back once it's gone,
      never zooming tighter than 30 dB.


      ---

      This is a **test/beta** build (prerelease); stable stays **beta_27**. On-device, enable
      **Settings → About → "Get test builds (beta)"** to follow the test channel over Wi-Fi.
  - version: beta_29
    name: wadamesh beta_29
    datetime: '2026-07-05T08:10:02Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_29
    prerelease: true
    notes: >-
      Test build on top of the current stable (**beta_27**). Clock hardening for room servers, the
      BLE "repeats heard" fix, much deeper chat history on SD, and a set of navigation and delete
      fixes.


      Flash from the web flasher at **https://wadamesh.com** (Standalone install → Version →
      beta_29), or grab a `-merged.bin` below.


      ## Fixed — room logins silently locked out by the device clock (#89 follow-up)

      Room servers quietly reject anything older than the newest timestamp they have seen from you,
      so a device clock that stepped backwards (a reboot without GPS or phone around, or a sync
      correcting a fast clock) black-holed every Join with zero feedback — and beta_28's keep-alives
      made that easier to hit. The device now remembers the newest timestamp it has used **across
      reboots** so it can never fall behind itself, a Join that gets no reply shows a clear error
      after 20 s (including what the device thinks the time is), and the device **warns when its
      clock and the room server's clock disagree**. Thanks to **EricMW61** for the follow-up
      testing.


      ## Fixed — "Repeats heard" over Bluetooth (#94)

      The app counts repeats from the per-packet RX log, which beta_23 stopped sending over BLE to
      fix congestion (#46/#54). The firmware now recognises packets that are **repeats of your own
      messages** and lets exactly those through to BLE — the counter works again and the congestion
      fix stays. Thanks to **daryldakine** for the clean bisect and the analyzer capture.


      ## Fixed — app-sent channel messages now show on the device

      Messages sent from the phone app through the device now appear on the device itself as your
      own outgoing message in that channel. This worked for DMs but never for channels.


      ## Fixed — deleting chats sticks

      Deleted messages could survive in storage and resurrect the chat later, and removing a channel
      could miss the underlying channel entry so the thread came right back. Both closed.


      ## New — deep chat history on SD (up to 5000 messages)

      Devices with an SD card now keep up to **5000 messages** instead of 500, with **date
      separators** (Today / Yesterday / day names) between messages from different days.

      **Downgrade note for testers:** builds older than beta_29 will not read the larger history
      file — downgrading starts with an empty history.


      ## Also

      - Chat/channel rows use the same compact style as Contacts — more conversations per screen.

      - The chat/channel settings sheet fits on one screen (same grid as the contact menu) instead
      of scrolling.

      - Compact chat mode alternates two background tones for readability.

      - Keyboard nav: settings pages no longer jump down on open, and the red update dot can't steal
      the selection from the About button.

      - The update check waits for Wi-Fi to actually have an address and retries within a minute
      instead of showing "couldn't reach the update server" for six hours.

      - Tanmatsu: the About page shows the real firmware version.


      ---

      This is a **test/beta** build (prerelease); stable stays **beta_27**. On-device, enable
      **Settings → About → "Get test builds (beta)"** to follow the test channel over Wi-Fi.
  - version: beta_28
    name: wadamesh beta_28
    datetime: '2026-07-04T11:41:57Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_28
    prerelease: true
    notes: >-
      Test build on top of the current stable (**beta_27**). A room-server fix, the real burn-in
      fix, and a batch of beta-tester feedback.


      Flash from the web flasher at **https://wadamesh.com** (Standalone install → Version →
      beta_28), or grab a `-merged.bin` below.


      ## Fixed — room servers going one-way "frozen" (#89)

      A room server silently stops pushing messages to a client after a few missed deliveries, and
      the device never sent the keep-alives that recover this — so rooms could end up logged-in but
      dead in both directions, with no way to re-login. The device now keeps its room session alive
      in the background, automatically logs back in when the session drops, adds a **"Log in
      again"** option to the room chat's menu, and warns when the room only granted read-only
      access. Thanks to **EricMW61** for the report.


      ## Fixed — real screen-off (LCD burn-in / ghosting)

      "Screen off" previously only turned the backlight off — the panel kept displaying the last
      image in the dark, which is what burns it in. The panel itself now sleeps (wake is still
      instant), a lit lock screen always dims on every board, a screen woken by a message re-darkens
      after 10 s, and the lock clock drifts to avoid ghosting. Thanks to **wyvern.red** for pinning
      down the cause.


      ## New — from wyvern.red's feedback

      - **Compact messages (IRC style)** — opt-in toggle in chat settings; one dense line per
      message, 2–3× more history on screen.

      - **Clearer delivery ticks** — ↑ sent (unconfirmed), ✓✓ confirmed; failed messages say **"tap
      to resend"** and one tap resends.

      - **Keyboard nav** — the scroll keys (F/C) zoom the map; backspace in an empty composer exits
      typing mode.

      - **"Reset path" in the chat menu** — force a fresh route without the detour through Contacts.


      ## Also

      - The on-device "Install update" now hides on mixed/older partition layouts where an update
      could crash mid-flash (found via a user crash report).


      ---

      This is a **test/beta** build (prerelease); stable stays **beta_27**. On-device, enable
      **Settings → About → "Get test builds (beta)"** to follow the test channel over Wi-Fi.
  - version: beta_27
