    notes: >-
      # wadamesh beta_8


      Polish + fixes for the touch UI — a faster chat acknowledgement, map readout controls, and an
      internal-memory trim.


      **Install / update:** flash from [flasher.wadamesh.com](https://flasher.wadamesh.com), grab it
      in LauncherHub, or use the on-device update check (Settings → About).


      ## Chat

      - **Quick replies insert at the cursor** instead of replacing whatever you'd already typed.

      - **New one-tap "Ack"** — long-press any message and tap *Ack*. It drops a ready-to-send reply
      into the composer with that message's **signal strength (SNR/RSSI)** and the **route** it took
      (hop codes), so you can instantly confirm someone's test came through. On a channel it
      `@`-mentions the sender. You review and send — it's never auto-sent.

      - Fixed the message action menu (**Ack / Copy / Info / Mention / Block**) running off the
      bottom of the screen — it now fits, and scrolls if it ever needs to.


      ## Map

      - The zoom button now shows a clear **"+/-"** icon.

      - **Show or hide each on-map readout independently** in Map settings — the coordinates line,
      the tile x/y/z line, and the contact markers.

      - Map settings reorganised: the **microSD-tiles** switch sits at the top under its own
      heading, separated from the new visibility toggles.

      - **New auto-refresh button** — turn it on and the map re-centres on you automatically
      whenever your position changes, with an on-screen *Auto-refresh on/off* confirmation.

      - Fixed the close (**X**) in Map settings overlapping the switches when the panel was
      scrolled.


      ## Performance

      - Reclaimed **~19 KB of internal RAM** (scratch buffers moved to PSRAM), leaving more headroom
      for Wi-Fi and trimming the idle-memory growth seen in recent betas.


      ---

      **Assets:** `*-merged.bin` = full image (flash at 0x0 / erase). Plain `*.bin` = app-only (OTA
      / Launcher side-load). T-Deck = `wadamesh-tdeck*`, Heltec V4 TFT = `wadamesh-heltec-v4-tft*`.
  - version: beta_7
    name: wadamesh beta_7
    datetime: '2026-06-18T10:25:46Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_7
    prerelease: false
    notes: >-
      **wadamesh beta_7** for the LilyGo T-Deck and Heltec V4 TFT.


      🔧 **Flash in your browser:** https://flasher.wadamesh.com — or update on-device (Settings →
      check for update), or side-load `wadamesh-tdeck.bin` through Launcher.


      > 🙌 **Most of this release was built by the community.** [@Vybo](https://github.com/Vybo)
      (Dan Vybiral) contributed the lion's share in
      [#12](https://github.com/ALLFATHER-BV/wadamesh/pull/12) — the Snake game, battery & telemetry
      history, map night mode, the PNG/BMP image viewer, and the entire status-bar toolkit.
      [@tun0](https://github.com/tun0) (Ruben Laban) fixed unread badges and chat-history
      persistence in [#15](https://github.com/ALLFATHER-BV/wadamesh/pull/15). Thank you both. 🎉


      ### 🐍 Snake game — by [@Vybo](https://github.com/Vybo) (#12)

      A Snake game in the app drawer — steer by swiping the screen or with the T-Deck trackball,
      with pause/resume and restart after a game over. (Touch now stays inside the game and doesn't
      leak to the screen behind it.)


      ### 🔋 Battery & telemetry — by [@Vybo](https://github.com/Vybo) (#12)

      - **Tap the battery** in the status bar for a **24-hour history chart** with an estimated
      time-left readout (logged every 5 minutes).

      - **Per-node telemetry window** — poll a node's battery, temperature and humidity, watch them
      on a live chart, and keep a per-node log.


      ### 🗺️ Map — by [@Vybo](https://github.com/Vybo) (#12)

      - **Night mode** — the status bar and tab bar invert to match the dark map.

      - Live **zoom-level readout** above the zoom slider, and a proper magnifier icon on the zoom
      button.

      - New **"Show on map"** contact action that centres the map on that node.


      ### 📊 Status bar & tools — by [@Vybo](https://github.com/Vybo) (#12)

      - A **microSD activity LED** that lights on card access (including file-manager reads/copies).

      - An **activity spinner** while a telemetry / admin / ping / trace / range / sightline request
      is in flight.

      - Option to **hide the device name** and move the clock left.

      - **Hold the status bar** to save a full-screen screenshot to SD.


      ### 🖼️ Files & images — by [@Vybo](https://github.com/Vybo) (#12)

      The file browser now previews **PNG and BMP** images (not just JPEG), with no stale image when
      opening several in a row.


      ### 💬 Chat reliability

      - **Fixed garbled / duplicated messages** — chat text is no longer corrupted in transit, so
      messages arrive intact and duplicates are filtered out correctly. Thanks to
      [@marcelverdult](https://github.com/marcelverdult) for the precise report
      ([#13](https://github.com/ALLFATHER-BV/wadamesh/issues/13)).

      - **Accurate unread badges** and **more chat history kept across reboots** — by
      [@tun0](https://github.com/tun0) ([#15](https://github.com/ALLFATHER-BV/wadamesh/pull/15)).


      ### ✨ Also in this release

      - **Lock-screen wallpaper from Files** — view any JPEG on your SD card and tap "Set as
      wallpaper".

      - **Set your own Bluetooth pairing code** in Settings.

      - The app drawer **fits all the apps** again (no clipped bottom row) and shows a **scrollbar**
      when there's more to scroll.

      - Fixed map-tile caching (false "storage full"); black/missing tiles re-download. `@`-reply no
      longer overwrites text you were typing. Fixed an out-of-memory crash and made notification
      audio more reliable.


      ---


      **Contributors:** [@Vybo](https://github.com/Vybo) (Dan Vybiral) ·
      [@tun0](https://github.com/tun0) (Ruben Laban) ·
      [@marcelverdult](https://github.com/marcelverdult) (reported #13).


      **Boards:** T-Deck → `wadamesh-tdeck*.bin` · Heltec V4 TFT → `wadamesh-heltec-v4-tft*.bin`.
      Use `-merged.bin` for a full flash at 0x0 (web flasher / esptool), or the plain `.bin` for
      on-device update / Launcher.
  - version: beta_6
    name: wadamesh beta_6
    datetime: '2026-06-16T22:40:43Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_6
    prerelease: false
    notes: >-
      Touch firmware **beta_6** for the **LilyGo T-Deck** and **Heltec V4 + TFT**.


      Install or update via the web flasher → **https://flasher.wadamesh.com** (or flash the
      `*-merged.bin` at `0x0` with esptool). Devices on beta_5 will see beta_6 on their next update
      check.


      ---


      ### New: RF Monitor app

      - A new **Monitor** app on the app drawer — a live RF sniffer that shows exactly what your
      node is pulling out of the air in real time.

      - A **"Recently heard"** feed lists recent received frames by type (text, advert, ack,
      route-trace…) with **RSSI, SNR and hop count**, colour-coded by type.

      - A **link-margin** readout grades how much headroom your last packet had (green / amber /
      red), alongside a live **packet rate** and a **noise-floor + peak-hold RSSI scope with an
      on-screen dBm scale**.

      - Lays out cleanly in both **portrait and landscape**, so it's readable on the Heltec V4 and
      the T-Deck.


      ### Chat & contacts

      - Direct-message chats now show a **person icon** and channels a **group icon** (instead of
      the old loop / envelope).

      - **Block a non-contact sender by name** — handy for silencing an automated room or repeater
      bot you couldn't block before.

      - Opening a chat or channel **no longer jumps to the newest message** — it keeps your scroll
      position.

      - The contacts **Sort & Filter** popup now closes after you pick a sort option.

      - Fixed the chat/channel **long-press popup**: the close ✕ no longer overlaps the buttons
      while you scroll it.


      ### Time & timezone

      - New **time-zone picker** with named zones (no longer CET-only) — set yours in **Settings →
      System**.

      - Fixed the clock getting **stuck at 1902** and channels showing 1969–1970 dates: GPS no
      longer clobbers the clock with an invalid date, and the time now **survives a reboot**.


      ### Launcher & Wi-Fi

      - **Map tiles now download under Launcher** (the tile cache was wrongly reported as full).

      - **GPS now gets a fix under Launcher.**

      - The setup-wizard **Wi-Fi scan no longer comes up empty** — modem sleep is deferred until
      after you're connected.


      ### Bluetooth

      - Bluetooth now **advertises under your node / profile name** instead of "NimBLE".

      - The **Bluetooth PIN no longer resets** on its own — it's saved and reused across reboots.


      ### Power & performance

      - Turning the screen off now **downclocks the CPU** and enables Wi-Fi modem sleep to save
      power.

      - On the map, your **position dot is drawn before the tiles** so it no longer lags behind when
      panning.


      ### Community

      - Merged map-server and SD-tile rendering fixes contributed by **Vybo** (#11). Thanks!
  - version: beta_5
    name: wadamesh beta_5
    datetime: '2026-06-15T21:19:46Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_5
    prerelease: false
    notes: >-
      Touch firmware **beta_5** for the **LilyGo T-Deck** and **Heltec V4 + TFT**.


      Install or update via the web flasher → **https://flasher.wadamesh.com** (or flash the
      `*-merged.bin` at `0x0` with esptool). Devices on beta_4 will see beta_5 on their next update
      check.


      ---


      ### Contacts

      - Person icon for people and an antenna for repeaters, instead of a generic envelope /
      lightning bolt.

      - **Block / unblock** anyone straight from their popup — blocked contacts get a red person
      icon and their messages are hidden.

      - The list is now a proper table: dedicated **last-heard** and **distance** columns, a **Sort
      & Filter** button, and **multi-select delete** with an are-you-sure prompt and a progress bar
      (favourites are protected — unfavourite them first).

      - Time and distance are smaller and pushed right so names get more room; a name too long for
      two lines scrolls instead of spilling onto a third.

      - Un-favouriting a contact removes its star right away.


      ### Discovered nodes

      - The Discovered list now **survives reboots** (it used to empty every boot) and holds up to
      **48** nodes.

      - New **Discovered settings** (cogwheel): auto-delete the oldest node when full, and
      **auto-delete anything heard via more than N hops** — keeps the list fresh and nearby.

      - The count badge shows **"48!"** when the list is full.

      - Adding a node from Discovered appears in Contacts immediately; a purge-all button sits next
      to Close.


      ### Region & radio

      - **Setting the region / default scope from the official MeshCore app now works** — it used to
      time out (`no_event_received`); public-channel floods are now region-tagged.
      (`companion-v1.16.0.3`, issue #31)

      - **US/Canada** radio preset corrected to the proper **910.525 MHz · 62.5 kHz · SF7** (was 915
      MHz / 250 kHz / SF11).

      - **T-Deck transmit power** restored to the full **+22 dBm** — the SX1262 antenna switch was
      mis-driven, leaking most of the power (~4 mW). (issue #6)

      - Auto-add settings moved to their own dedicated page (out of Radio), reachable from the
      Contacts menu too.


      ### Chats & sound

      - Each chat / channel row now shows the **time of its most recent message** on the right.

      - **Mute messages and/or @-mentions per channel**, from that channel's settings.

      - The **@-mentions screen** has taller rows (fits two lines); tapping a mention **jumps to
      that exact message**.

      - **Volume is now +/- buttons** instead of a hard-to-drag slider; a master **Sound** switch
      silences everything, with independent **Messages** and **@-mention** switches (the @-mention
      chime is distinct, with its own on/off + volume).


      ### Map

      - The map **remembers your zoom and pan** when you leave and come back, instead of snapping
      back to your location every time.

      - Tapping a contact on the map opens a **compact popup** (no Block button there).


      ### Keyboard & input

      - **T-Deck keyboard: backspace deletes at the cursor** instead of always chopping the last
      character, and editing respects where you place the caret.

      - The **Quick replies** page now scrolls so you can reach and edit every slot.


      ### UI polish

      - Refined bottom tab bar — flat icons that take your theme colour with a soft glow under the
      active tab — plus an **unread-count badge** on the Chats icon.

      - App drawer: colourful app icons, the command tile relabelled **"Cmdr"**, the Apps button in
      a contrasting accent, and **three-per-row on the Heltec V4**.

      - Full-screen settings pages with a clear X to close, a subtle new-message chip, and a
      **full-page Signal view** with a live readout and manual refresh.
