      ## Chats

      - **The chats tab has a new look**: a round avatar in each chat's signature colour (the same
      colour its bubbles use) with the first two letters of the name, the **last message previewed**
      under the name, time top-right and the unread count below it.

      - **Channels can have a custom icon**: channel settings → "Chat icon" picks any emoji as its
      avatar (long-press resets). Remembered per channel.

      - **Compact chat mode** (opt-in, chat settings): one dense line per message instead of
      bubbles, with alternating background tones — 2–3× more history on screen; the chats list
      switches to dense single-line rows to match.

      - **Much deeper history on SD cards**: up to **5000 messages** (was 500) with **date
      separators** (Today / Yesterday / day names). *Downgrade note: builds older than beta_29 can't
      read the larger history file — downgrading starts with an empty history.*

      - **Clearer delivery states**: ↑ sent, ✓✓ confirmed, and failed messages say "tap to resend" —
      one tap resends.

      - **Messages sent from the phone app now appear on the device too**, including channel
      messages (DMs already did).

      - **"Repeats heard" works again over Bluetooth** (#94) — the firmware passes repeats of your
      own messages through to BLE without reintroducing the old congestion. Thanks **daryldakine**.

      - Deleting a chat or channel now sticks (deleted messages could survive in storage and
