      ## New


      ### Tanmatsu: ALT accents and language switching (#129, reported by @jochentj)

      - Hold ALT and press a letter to open the accent picker. Keep ALT held and press the letter
      again to cycle through the options; release ALT to insert the highlighted one. Same idea as
      long-press on the touch boards, fully keyboard driven.

      - Double-tap the space bar to switch between your enabled keyboard languages, matching the
