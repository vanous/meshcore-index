    notes: >-
      **wadamesh beta_23 — test build.** Opt in via **Settings → About → "Get test builds (beta)"**,
      or the flasher's Beta toggle.


      ## Fixed


      - **Bluetooth companion reliability — messages and repeater admin.** When a phone or Mac was
      connected over Bluetooth, the device sent it a log entry for *every* LoRa packet it heard,
      which on a busy mesh swamped the Bluetooth link and starved the frames that actually matter.
      It no longer sends that packet log over Bluetooth (USB and Wi-Fi companions still get it), so
      **incoming messages reach the app** and **repeater / room-server admin** (Manage Regions,
      saving parameters) stops timing out and dropping the connection. (#46, #54.)


      Also carried in this test line (from beta_22):

      - **Signal probe** now sends a directed trace "ping" to your nearest repeater, which replies,
      instead of a zero-hop advert nothing answers. Thanks to **Tarmo**.

      - **Contacts discovered while your phone is connected** now also show on the device's own
      screen, not just in the phone app. (#73.)


      Everything from the stable beta_21 is included.
