  - version: beta_2
    name: wadamesh beta_2
    datetime: '2026-06-13T13:52:48Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_2
    prerelease: false
    notes: >-
      Touch firmware for the **LilyGo T-Deck / T-Deck Plus** and **Heltec V4 + TFT**.


      ### What's new since beta_1

      - **WADAMESH boot logo** — the old MESHCOMOD wordmark is replaced by the brand logo: an
      anti-aliased mesh mark with the teal dots, on screen from power-on and carried seamlessly into
      the colour LVGL splash. Brand teal (`#15B6A6`) is now the default UI accent and is in the
      Theme-colour picker.

      - **Wi-Fi scan no longer crashes** — "Wi-Fi on but no network connected" could trip the 5 s
      task watchdog and reboot. The scan is now a single bounded, yielding async pass.

      - **Wi-Fi settings apply live** — saving credentials or scanning no longer prompts for /
      forces a reboot (Wi-Fi and BLE coexist via NimBLE).

      - **Factory reset actually wipes** — on SD-card storage it crashed mid-erase and left
      everything intact; it now wipes SD + NVS cleanly and reboots into a fresh device. (Also fixes
      the file-manager recursive folder delete.)


      ### Install

      Flash the `*-merged.bin` for your board at `0x0` with erase (or use the web flasher at
      flasher.wadamesh.com). The `*.bin` (no `-merged`) is the app-only image for OTA / Launcher.
