      - Accented letters now render at full size at the Large and Huge UI scales instead of
      noticeably smaller. All boards moved to compressed UI fonts to make room for this.


      ### GPS quick reply, by @Yazutsu (#125)

      Your GPS position is the first row in the quick-reply picker, so you can send your current
      coordinates with one tap.


      ### Keyboard language in the chat bar

      While in a chat or channel, the top bar shows the active keyboard language next to the clock
      (only when more than one layout is enabled).


      ## Fixed


      - Keyboard-backlight "Off" preset now actually switches the backlight off and keeps it off, by
      @Yazutsu (#88).

      - Chat history saves to SD are atomic, with a fallback save path when the background worker is
      not armed, so a badly timed reboot can no longer truncate message history, by @scratchdiver
      (#135).

      - T-Deck: a touch controller wedged into a stuck "phantom finger" state (input dead, screen
      never timing out) is now detected and cleared by the driver within seconds. Previously only a
