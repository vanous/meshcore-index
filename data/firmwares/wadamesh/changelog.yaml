  - version: beta_9
    name: wadamesh beta_9
    datetime: '2026-06-20T13:18:47Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_9
    prerelease: false
    notes: >-
      # wadamesh beta_9


      A reliability-focused drop — Wi-Fi recovery, a self-healing chat-history fix, crash-report
      export, plus room-server, map, contacts and app-drawer improvements.


      **Install / update:** flash from [flasher.wadamesh.com](https://flasher.wadamesh.com), grab it
      in LauncherHub, or use the on-device update check (Settings → About).


      ## Stability

      - **Wi-Fi now reconnects on its own** after the link drops — no more rebooting to get back
      online.

      - **Fixed reboot-on-every-received-message:** a corrupted chat-history file could make the
      device reboot whenever a message arrived (and hide your messages). The bad file is now
      detected and reset automatically, so it recovers on its own.

      - **Boot hardening:** NULL-guards on the display draw buffer so a unit with quirky/limited
      memory degrades gracefully instead of getting stuck on the boot logo.


      ## Crash reports

      - After a crash, **Settings → About** shows an **"Export crash report"** button that saves the
      crash dump to the **microSD card** — so you can send it to the devs and get the bug fixed.


      ## Chat & room servers

      - Room-server messages now show the **time each message was actually sent**, not when it
      arrived.

      - Room-server messages now show **who sent them**.

      - **Sharing your contact QR** now produces a valid `meshcore://contact/add?…` code that the
      **MeshCore phone app can scan and import**.

      - Unread counts show **"99+"** instead of an alarming raw number on busy channels.


      ## Map

      - The **reload button for corrupt tiles** now actually clears the cached tiles — **including
      when you're offline** — and the missing/blank "twilight zone" tiles re-download on their own.

      - Fixed tiles not re-fetching at **zoom levels 13–15**.


      ## Contacts

      - **Favourited contacts always appear** in the contact list now, even with hundreds of
      similarly-named contacts (they used to stay hidden until you searched).


      ## App drawer

      - **New icon-size setting** — tap the **cog** at the top-right of the app drawer to switch
      between **Compact** and **Large** (bigger icons + labels, easier to read).

      - **Smoother scrolling** through the app list and the other scrollable lists.


      ---

      **Assets:** `*-merged.bin` = full image (flash at 0x0 / erase). Plain `*.bin` = app-only (OTA
      / Launcher side-load). T-Deck = `wadamesh-tdeck*`, Heltec V4 TFT = `wadamesh-heltec-v4-tft*`.
