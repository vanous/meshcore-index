    notes: >-
      **wadamesh beta_39** (TEST channel) — on top of beta_38.


      Flash from the web installer at **https://flasher.wadamesh.com**, install via Launcher / the
      Tanmatsu store, or grab a `.bin` below.


      ## New

      - **Big translation pass.** Hundreds of strings that were still English — across menus,
      settings, dialogs and the setup flow — are now translated into all 11 non-English languages
      (Dutch, German, French, Spanish, Italian, Russian, Ukrainian, Bulgarian, Serbian, Greek,
      Brazilian Portuguese). Menu rows that carry an icon now translate too, instead of silently
      falling back to English. Pick a language under Settings.

      - **ThinkNode M9** and **RAK WisMesh Tap V2** can now be installed straight from the web
      flasher.


      ## Fixed

      - **Deletes stick now.** Deleting a message, or clearing a whole chat, survives a reboot or a
      hardware reset instead of coming back (reported by Leon P and MrWeavis). The delete used to
      sit in a save that was batched up to 30 seconds later, so a reset in that window undid it.

      - **Deleting is fast.** Chat history is now written compactly — only the messages you actually
      have, instead of the full 5000-slot ring every time — so a delete, a history wipe, or a reboot
      no longer pauses the screen while it saves. Normal message saving is lighter too.

      - **Emoji picker:** the food/object emoji that showed as empty boxes (umbrella, coffee, pizza,
      cake, rocket, camera, phone, laptop, calendar, antenna, e-mail, house, car, watch) now render
      — they were listed but never baked into the font.


      ## Boards

      T-Deck / T-Deck Plus, Heltec V4 + TFT, ThinkNode M9, RAK WisMesh Tap V2 (bins below); Tanmatsu
      ships via the Tanmatsu launcher store. For a Launcher side-load use the app-only `.bin` (not
      `-merged`).
