    prerelease: false
    notes: >-
      The new **stable** build — promoted from the test channel, rolling up the **beta_26** and
      **beta_27** test builds on top of beta_25.


      Flash from the web flasher at **https://wadamesh.com**, update through bmorcelli's Launcher,
      or grab a `-merged.bin` below. Already on wadamesh with a standalone flash? The on-device
      update check will offer it over Wi-Fi.


      ## Fixed

      - **Reboot loop during contact saves** (from beta_26). Internal-flash housekeeping while
      saving the contact list could freeze the device long enough to trip the watchdog and restart
      it — a reboot loop for some users. That save no longer trips it. Thanks to the crash report
      that pinned it down.

      - **Launcher installs no longer offer a broken "Install update"** (from beta_27). Under
      bmorcelli's Launcher the on-device update can't work (no spare slot large enough) and failed
      with "won't fit: Bad Size Given". The button now hides there — the "update available" note
      stays, and you update through the Launcher instead. Thanks to **Keith (KM1USR)** for the
      report.


      ## New — Keyboard backlight control (T-Deck), by @Yazutsu
      ([#85](https://github.com/ALLFATHER-BV/wadamesh/pull/85))

      Settings → Keyboard now has a **Keyboard backlight** slider plus Off / 25 / 50 / 75 / Max
      one-tap presets. Smooth dimming with fine control at the low end, applies to the on and auto
      modes and the new-message flash, and persists across reboots.


      ## Improved — contacts + channels on the microSD card (from beta_26)

      On devices with a microSD card, contacts and channels now live on the card (like chat history
      and map tiles already do). Existing contacts migrate automatically on first boot; your
      identity and settings stay in internal flash, so the node is unchanged.


      **Note:** keep the card inserted afterwards — the contact list lives on it, and an older
      firmware won't look there if you ever downgrade.
