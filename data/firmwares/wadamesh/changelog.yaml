  - version: beta_36
    name: wadamesh beta_36
    datetime: '2026-07-07T09:21:51Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_36
    prerelease: true
    notes: >-
      Test-channel build. Install with the web flasher at https://flasher.wadamesh.com (pick the
      beta channel), via the Launcher, or on-device with the "Get test builds (beta)" toggle in
      Settings > About.


      ## Community fixes and requests


      This beta ships a contributed fix and three community requests. Thank you all.


      ### Store data on SD really works now, by @scratchdiver (#123)


      The "Store data on SD" toggle was silently ignored at boot on Launcher installs: the setting
      was saved to a file the boot code never read, so devices kept using slow internal flash no
      matter what the switch said. @scratchdiver tracked it down and fixed the boot path. A
      follow-up commit on top makes the toggle work in both directions on those installs. If you run
      wadamesh under the Launcher on a busy mesh, flip the toggle once: contacts and settings now
      genuinely move to the SD card, which removes a whole class of slow internal-flash writes.


      ### Symbol passwords everywhere (#122, reported by @smhawkes)


      Long-press any settings field, including the Wi-Fi password, for the Cut / Copy / Paste / All
      / Sym menu. Sym opens a special-character picker with everything the on-screen keyboard does
      not have. Double-tap selects a word.


      ### Lock-screen unread count (#93, requested by @Buko84)


      The lock screen shows an envelope with the number of unread messages under the clock. It
      disappears when there is nothing unread, and it will not burn into the panel (it drifts along
      with the clock).


      ### Australia (Mid) preset (#121, requested by @zindello)


      915.075 MHz, 125 kHz, SF9, CR5, in the region list for both the settings page and the
      first-run wizard.


      ## Also new


      - The Wi-Fi network screens (join, hidden network, saved-network details) are full-screen
      settings pages now instead of cramped popups: title in the top bar, tap the bar to go back,
      proper scrolling with the keyboard open.

      - For Launcher installs: "Save update bin to SD" on the About page downloads the latest
      firmware of your selected channel into a BINS folder on the SD card, named with version and
      channel, ready to flash from the Launcher. The test-builds toggle is now visible on Launcher
      installs too.

      - Groundwork for a new supported device, the Elecrow ThinkNode M9, is in the tree (bring-up by
      ded of SalishMesh, remote-tested on a preproduction unit). Not part of this release's
      binaries.
  - version: beta_35
    name: wadamesh beta_35
    datetime: '2026-07-06T11:38:08Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_35
    prerelease: false
    notes: >-
      Test-channel build focused on the Heltec V4, though every fix applies to both boards.


      ### Fixed


      - **V4: multi-second freezes after receiving messages, including the screen refusing to wake
      from dark mode.** Saving chat history to the internal flash could stall the device up to 6
      seconds (the V4 has no SD card, and internal flash pauses for housekeeping). That save now
      runs on a background task, so the screen and touch stay responsive no matter what storage is
      doing.

      - **Reboot when turning Bluetooth on with Wi-Fi running.** With memory tight, starting
      Bluetooth used to crash the device mid-init. The switch now checks free memory first and
      refuses with a clear message instead. The same protection covers the other direction: turning
      Wi-Fi on with Bluetooth active used to claim "Wi-Fi on" while the radio silently never
      started.

      - **Settings vanishing for one boot after an unlucky reboot.** Settings writes are now
      crash-safe (staged write, then swap), the loader self-heals from the staged copy if a reboot
      lands mid-save, and a genuinely failed save now reports "Couldn't save the name to storage"
      instead of pretending it worked.


      ### Improved


      - **About 30 KB of internal RAM freed** by moving buffers to external PSRAM and dropping
      unused USB components from the build. Internal RAM is what Wi-Fi and Bluetooth both feed on,
      so this is the headroom that makes running both together comfortable again, especially on the
      V4.


      Install with "Beta updates" enabled in Settings > About, via Launcher, or flash a bin below
      (merged bin at 0x0 for a fresh install, plain bin for Launcher/OTA). Boards: LilyGo T-Deck,
      Heltec V4 TFT.



      ---


      **Promoted to stable on 2026-07-06.** If you are updating from beta_33 (the previous stable),
      this release also includes everything from beta_34, most importantly buffered receive: packets
      are now collected by a dedicated background task instead of the UI loop, fixing the "my device
      missed a message a device next to it heard" problem. A safety switch lives in Settings > Radio
      & Mesh ("Buffered receive").
  - version: beta_34
    name: wadamesh beta_34
    datetime: '2026-07-06T09:18:43Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_34
    prerelease: true
    notes: >-
      Test-channel build. This one is significant: it changes how the device collects packets from
      the LoRa radio, and the new path is ON by default so the test channel can prove it before it
      goes anywhere near stable.


      ### The missed-messages fix, explained


      The radio chip holds only one received packet at a time. Until now the firmware collected that
      packet when the main loop got around to it, and that is the same loop that draws the entire
      touch interface. If the screen kept the loop busy while two packets arrived back to back, the
      first packet was silently overwritten. No error, no log entry, just a message your device
      heard but never showed you. That is the "my device missed a message another device right next
      to it heard" report, and it explains why it affected this firmware but not stock MeshCore,
      which has no screen to draw.


      From this build a small dedicated background task collects every packet within about a
      millisecond of it arriving, no matter what the interface is doing. Scrolling the map,
      rebuilding a big chat, saving contacts: none of it can cost you a packet anymore.


      ### Why default ON, and why there is still a toggle


      The receive path is the heart of the device, so this is exactly the kind of change that needs
      real-world hours across different meshes before it can be called done, and it only gets those
      hours if testers actually run it. That is why it ships enabled on the test channel. The safety
      hatch: if you see anything odd with receiving, sending, or the Spectrum analyzer, switch off
      "Buffered receive (experimental)" in Settings > Radio & Mesh. It applies instantly, no reboot,
      and puts you back on the old path. Please report what you saw either way, that is what this
      channel is for.


      You can also watch it work: Settings > About now shows LoRa receive counters. "late-lost"
      counts packets the radio heard but the firmware failed to collect in time. With buffered
      receive on it should stay at zero. Turn the toggle off on a busy mesh and you may watch it
      creep up, which is the old bug happening live.


      ### Also fixed


      - Messages sent by wadamesh no longer carry stray bytes that stock MeshCore devices and some
      companion apps showed as garbage characters after the text (issue #13).

      - A GPS module reporting a bogus date can no longer drag the device clock back to the year
      1902.


      Install with "Beta updates" enabled in Settings > About, via Launcher, or flash a bin below
      (the merged bin at 0x0 for a fresh install, the plain bin for Launcher/OTA). Boards: LilyGo
      T-Deck, Heltec V4 TFT.
  - version: beta_33
    name: wadamesh beta_33
    datetime: '2026-07-05T21:38:17Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_33
    prerelease: false
    notes: >-
      Stable release. Everything since the last stable (beta_31), headlined by the freeze fixes: the
      periodic 1-2 second freezes with Wi-Fi on, and the freezes with MQTT enabled, are both gone.


      A big thank you to **Half Live** for the patient testing behind this one: toggling MQTT and
      Wi-Fi through every combination and photographing the on-device stall diagnostics is exactly
      what pinned both root causes down.


      Install via the [web flasher](https://flasher.wadamesh.com), the on-device updater (Settings >
      About), or Launcher. Fresh install: flash the `-merged` bin at 0x0. Launcher/OTA: the plain
      bin.


      ### Fixed


      - **Periodic 1-2 second freezes with Wi-Fi on.** When a phone app or web client was connected
      over Wi-Fi and that connection went stale (phone asleep, out of range), every received mesh
      packet made the device block on the dead connection. The device now only writes to a
      connection that can accept data immediately, and a connection that stays unresponsive for 10
      seconds is dropped so the client can reconnect cleanly. Real messages are unaffected; they
      re-sync on reconnect.

      - **Freezes with MQTT enabled.** Connecting to the broker (DNS lookup, TCP connect, login)
      could block the device for 2-10 seconds and retried every 15 seconds while the broker was
      unreachable, all on the UI thread. Connection attempts now run fully in the background, and
      writes to an unresponsive broker are skipped instead of waited on. Tip: if your bridge keeps
      reconnecting, check the broker address and credentials. A healthy connection does not retry.

      - **Chat-history saves could hitch the UI on busy meshes.** The history file now writes in a
      few large chunks instead of thousands of tiny ones (the same treatment the contact list got in
      beta_30), and background saves are spaced further apart while messages stream in.

      - **Wrong toast when the favorites list is full.** Favoriting a 17th contact now says
      "Favorites full (max 16)" instead of the incorrect "Removed from favorites".


      ### New


      - **Stall diagnostics in About.** Settings > About lists recent main-loop stalls (over 0.2
      seconds, newest first), so freeze reports can be confirmed or ruled out at a glance. The About
      page also no longer causes a stall of its own while open (computing the firmware image size
      used to checksum the whole app image every second).


      Boards: LilyGo T-Deck, Heltec V4 TFT. Also ships to the Tanmatsu launcher store.
