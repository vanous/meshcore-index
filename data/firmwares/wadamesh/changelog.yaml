  - version: beta_40
    name: wadamesh beta_40
    datetime: '2026-07-10T16:36:42Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_40
    prerelease: true
    notes: >-
      **wadamesh beta_40** (TEST channel), on top of beta_39.


      Flash from the web installer at **https://flasher.wadamesh.com**, install via Launcher / the
      Tanmatsu store, or grab a `.bin` below.


      ## Fixed

      - **Heltec V4 freeze.** Card-less devices could freeze for several seconds at a time. The
      contacts file was being rewritten to internal flash every time a known node re-advertised, and
      that write can trigger a slow flash cleanup that stalls the whole device. Those refreshes are
      now batched, so the file is rewritten far less often; a genuinely new or removed contact still
      saves right away. SD-card devices were never affected.

      - **Long text in other languages** no longer overlaps or gets cut off. Oversized labels now
      shrink to fit on one line instead of clipping or wrapping. This covers the message long-press
      menu (French "Supprimer" was being cut to "Supprime"), the confirmation dialogs, and the
      app-drawer tiles.

      - **Signal graph hint.** On the home screen, the "tap for details" hint no longer overlaps the
      signal readout in longer languages; it moved to the bottom-right corner.


      ## Boards

      T-Deck / T-Deck Plus, Heltec V4 + TFT, ThinkNode M9, RAK WisMesh Tap V2 (bins below); Tanmatsu
      ships via the Tanmatsu launcher store. For a Launcher side-load use the app-only `.bin` (not
      `-merged`).
