      ## Rooms and reliability

      - **Room servers no longer go one-way "frozen"** (#89). The device keeps its room session
      alive with background keep-alives, logs back in automatically when the session drops, adds a
      **"Log in again"** entry to the room chat's menu, and warns when a room only granted read-only
      access. Thanks **EricMW61**.

      - **Room logins can no longer be silently locked out by the device clock.** The device
      remembers the newest timestamp it has used across reboots so it can never fall behind itself,
      a Join with no reply shows a clear error after 20 s (including what the device thinks the time
      is), and it **warns when the device clock and the room server's clock disagree**.

      - The on-device "Install update" hides on mixed/older partition layouts where an update could
      brick mid-flash, and the update check now waits for Wi-Fi to actually have an address and
      retries within a minute instead of showing "couldn't reach the update server" for six hours.


      ## Screen and burn-in

      - **The screen now truly switches off in standby** — before, only the backlight went dark
      while the panel kept displaying the last image, which is exactly what burns in the LCD. The
      panel itself sleeps (wake is instant), a lit lock screen always dims, a screen woken by a
      message re-darkens after 10 s, and the lock clock drifts to avoid ghosting. Thanks
