    notes: >-
      **wadamesh beta_25** is the new **stable** release. It rolls up the beta_22 through beta_25
      test builds on top of the previous stable, beta_21.


      Install from [flasher.wadamesh.com](https://flasher.wadamesh.com), the Launcher, or the
      on-device update check.


      ### Fixed

      - **Signal probe reads a live signal again.** It sends the standard mesh node-discovery
      request that repeaters actually answer (the same one the Ultra and KiekR apps use), so the
      signal reading updates. Thanks to Tarmo for decoding the exact packet.

      - **Bluetooth companion reliability**, especially messages and repeater / room-server admin.
      The device no longer floods the Bluetooth link with a per-packet log (USB and Wi-Fi companions
      still get it), so incoming messages reach the app and admin actions like Manage Regions stop
      timing out (#46, #54).

      - **Contacts show up right away.** A node you discover (even while on another screen, or one
      the phone app adds over Bluetooth) now appears in your contact list immediately, instead of
      only after changing the sort. Thanks to **@1nerdherder** for the report (#73).

      - **Manual telemetry / status requests work first-try** (no more tapping "Request" twice).
      Thanks to **@Vybo** (Dan Vybiral) for the fix (#81).

      - Emoji picker and quick-chat replies: pressing **Esc or the red X closes the popup**, not the
      whole chat.

      - **Lock screen:** you can unlock again after the screen wakes from an incoming message.


      ### New

      - **"Advertise on boot"** toggle in the Advertise app (off by default): opt in to send one
      advert at power-on so peers refresh your details after a reflash (#76).


      ### Tanmatsu (ESP32-P4)

      - **Wi-Fi map tiles now work:** they download and display, cached to the microSD card.

      - **Contacts and message history survive a reboot:** moved to the microSD card, so keep a card
      inserted. Identity and radio settings stay on internal storage.

      - Fixed the crash that stopped the app from booting.

      - Popups fit the screen and scroll; keyboard navigation stays inside an open popup; 2000
      contacts; "Large" UI size by default.


