    notes: >-
      ## wadamesh beta_11


      **Flash it:** [flasher.wadamesh.com](https://flasher.wadamesh.com) (Chrome/Edge, USB) · or
      pull it on-device via **Settings → About → Check for updates** · or side-load through the
      **Launcher** store.


      The headline this round is **full keyboard navigation** — and every key is hotkey-bindable.
      This is the foundation for upcoming keyboard-first devices like the **Tanmatsu T-Pager** that
      have no touchscreen, and it already gives every **T-Deck** a fast, reliable way to drive
      wadamesh entirely from the keyboard.


      ---


      ### ⌨️ Keyboard navigation (new — on by default)

      - Drive the whole UI without the touchscreen: the **WASDZ** cluster moves the on-screen
      selection in the *actual direction* you press (W up, A left, Z down, D right), **S** selects,
      **Q** goes back.

      - Each bottom tab has its own hotkey — **E** Messages, **R** Contacts, **T** Home, **U** Map,
      **I** Settings — shown as a small letter on the tab icon. The Home hotkey mirrors tapping
      Home: press again to flip between Commander and the app drawer.

      - New **scroll up / down** keys (default **F / C**).

      - **Everything is remappable** — directions, select, back, the per-tab hotkeys, and the scroll
