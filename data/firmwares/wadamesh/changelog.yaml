  - version: beta_21
    name: wadamesh beta_21
    datetime: '2026-06-30T15:39:05Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_21
    prerelease: false
    notes: >-
      **wadamesh beta_21 — the first stable build.**


      This is the first release on the new two-channel system. **Stable** is what everyone gets by
      default. If you want new features earlier, flip **Settings → About → "Get test builds
      (beta)"** on a Wi-Fi-updatable device and you'll track the **test** channel instead — for both
      the "update available" check and the firmware you install. Switch back any time.


      Flash or update at **[flasher.wadamesh.com](https://flasher.wadamesh.com)**, or install over
      Wi-Fi from **Settings → About → Install update**.


      ## New


      - **Stable and test update channels.** beta_21 is the first stable build. The new *Get test
      builds (beta)* switch on the About screen lets OTA devices opt into test builds early — it
      points both the update check and the installer at the test channel. Off by default.

      - **MQTT bridge — highly experimental, off by default.** An opt-in bridge that forwards the
      messages your node receives to an MQTT broker you choose, so you can log your mesh or wire it
      into other tools. It is gated behind a privacy consent you must tick, direct messages are
      excluded unless you deliberately turn them on, and the payload can be sealed with an
      encryption key so only you can read it. Use a broker you control, never a public one.
      Experimental — expect changes. *Contributed by @samuelcoustet (#71), reworked for privacy.*

      - **Portugal (Narrow) region preset** — local defaults in one tap. (#74, requested by
      @Salgueiron.)

      - **Saved-contacts counter** in the Contacts overflow menu — how many contacts you have saved
      out of the maximum it can hold, e.g. 42 / 2000. (#72, asked by @Buko84.)


      ## Fixed


      - **The signal probe is strictly zero-hop now.** The auto-discover pulse and the probe behind
      the Signal popup can no longer be re-flooded across the mesh by a repeater — the probe only
      measures the link to whatever hears it first, which is what it was always meant to do.

      - **Your most relevant contacts show when you have a lot of them.** The on-screen list is
      capped for performance but was trimming before sorting, so some contacts dropped out of view.
      It now sorts first, shows the closest matches, and adds a "+N more — search to narrow the
      list" line at the bottom. (#73, reported by @1nerdherder.)

      - **The blocked-users list opened from Contacts** now shows the proper two-line title bar with
      a back button, instead of an unlabelled screen.

      - **The Contacts overflow popup** fits the screen again after the saved-contacts counter was
      added.


      ---


      Everything from beta_20 is included. Big thanks to @samuelcoustet for the MQTT bridge (#71),
      and to @Salgueiron, @Buko84 and @1nerdherder for the reports.


      ### Files


      - **T-Deck** — `wadamesh-tdeck-merged.bin` (full flash @ 0x0) · `wadamesh-tdeck.bin` (Launcher
      / OTA app image)

      - **Heltec V4 TFT** — `wadamesh-heltec-v4-tft-merged.bin` (full flash @ 0x0) ·
      `wadamesh-heltec-v4-tft.bin` (OTA app image)
  - version: beta_20
    name: wadamesh beta_20
    datetime: '2026-06-28T21:37:20Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_20
    prerelease: false
    notes: >-
      wadamesh **beta_20** for the LilyGo T-Deck and Heltec V4 TFT.


      Flash it from your browser at **https://flasher.wadamesh.com**, install it from the Launcher
      app store, or use the bins below. A device already on beta_11 or later will offer the update
      on its own.


      This is a big one. New apps, custom notification sounds, saved Wi-Fi networks, a single chat
      settings screen, the Heltec V4.3 high-gain receiver, and fixes for three reported mesh issues.


      ## New


      - **Spectrum analyzer.** A new app in the drawer that sweeps the LoRa band and draws a live
      spectrum with a waterfall under it, a colour scale on the side and a peak-frequency readout.
      Good for spotting interference or finding a quiet part of the band before you settle on a
      frequency.

      - **Custom notification sounds.** Set your own notification sound from a 16-bit WAV file on
      the SD card, per event, instead of only the built-in chime. There is a separate switch for the
      direct-message chime. Contributed by @Yazutsu in #66.

      - **Saved Wi-Fi networks.** The device remembers more than one network now and can auto-join
      them. Each saved network has its own auto-join switch and can be forgotten on its own.

      - **One chat settings screen.** The gear on a chat or channel row, a long-press on that row,
      and the cog inside an open chat now all open the same screen. Mark as read, mute messages,
      mute mentions, region and scope, share secret, blocked users, and remove or delete are all in
      one place.

      - **Per-channel mute.** Silence the notification sound for a single channel while the rest
      keep chiming.

      - **High-gain receiver for the Heltec V4.3.** The V4.3 front-end module has a roughly 17 dB
      receive amplifier that the firmware never switched on, so every V4.3 shipped with it bypassed.
      There is now a "High-gain receiver (FEM LNA)" toggle under Radio and Mesh, in the Signal
      section. Turning it on can noticeably improve weak-signal reception in quiet or remote spots;
      in a noisy area it can overload the front end, so it is off by default. V4.2 boards do not
      have this amplifier and do not show the toggle. Thanks to Wireless Rocks for the detailed
      report and measurements.

      - **Apps button on the Heltec V4 home screen.** The V4 home screen now has an Apps button next
      to Send advert, so the app drawer is one tap away. The T-Deck and Tanmatsu already had this.

      - **Blocked list is easier to reach.** Open it from Contacts (the overflow menu) and from the
      chat settings screen.

      - **Portuguese (Brazil)** is now a UI language, which brings the total to twelve. Community
      translation.


      ## Fixed


      - **Adverts sent from the touch screen are now relayed by region-scoped repeaters.** The
      advert went out without a region tag, so a repeater set to a single region dropped it, while
      the same advert sent from the phone app got through. The device now tags its flood advert the
      same way the phone companion does. Reported by @EricMW61 in #68.

      - **A message could be transmitted on the wrong channel.** After you added or removed channels
      the cached channel index could drift, so a message typed in one channel was sent on another
      channel's key. It looked right on your own screen but arrived in the other channel. The send
      path now matches the target channel by name at the moment of sending, so this can no longer
      happen.

      - **Room server logins could time out** when the only route to the server was through a
      region-scoped repeater. A new opt-in toggle, "Scope direct messages to region" under Radio and
      Mesh in the Signal section, tags your direct, login and admin messages with your region so a
      region-only repeater will relay them. It is off by default, so cross-region messaging is
      unchanged for anyone who does not need it. Reported by @randelreiss in #64.

      - **The Wi-Fi scan could come back empty.** If a scan ran while the device was already
      connected, the automatic reconnect could cancel it mid-sweep and the list returned zero
      networks. The scan and the reconnect no longer fight over the radio, and the SSID list loads
      reliably again

      …
  - version: beta_19
    name: wadamesh beta_19
    datetime: '2026-06-27T13:10:46Z'
    url: https://github.com/ALLFATHER-BV/wadamesh/releases/tag/beta_19
    prerelease: false
    notes: >-
      **wadamesh beta_19** — touch firmware for the LilyGo T-Deck and Heltec V4 TFT.


      Flash it in your browser at **https://flasher.wadamesh.com**, install it from the Launcher
      store, or use the on-device update check (Settings → About → Check for updates).


      ## New

      - **Airtime / duty-cycle readout** in Radio & Mesh settings — see roughly how much of the
      airtime budget your current spreading factor, bandwidth and coding rate use, plus the
      time-on-air per packet, so you can stay inside regional limits like EU 868.

      - **"Answer telemetry requests" toggle** in Radio & Mesh settings — control whether other
      nodes can pull your battery and environment telemetry.

      - The Radio & Mesh settings page is now grouped into clear **RADIO / MESH / SIGNAL** sections
      so the options are easier to find.


      ## Fixed

      - **Fixed a reboot** that could happen when you closed a scrollable popup — the emoji picker,
      quick replies, the Wi-Fi scan list, the app drawer and similar — while it was still coasting
      from a flick. Thanks to everyone who sent in crash reports.

      - The **accent popup** no longer lingers on screen after you send a message on the T-Deck
      keyboard.

      - **Heltec V4:** the Expansion Kit environment line and mini chart on the Home screen no
      longer overlap the status text or run off the bottom of the display.


