  - version: v0.3.8
    name: MCLite 0.3.8
    datetime: '2026-06-16T09:19:15Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.8
    prerelease: false
    notes: >-
      ## Highlights


      **Less advert spam, more location privacy.**


      ### Added

      - **Location-advert privacy precision.** The location-advert setting (now
      `gps.location_precision`) can coarsen the position you broadcast: **Off · Exact · ~100 m ·
      ~750 m · ~3 km · ~12 km · ~50 km** (Meshtastic-style grid snapping, centred in the cell). Only
      the broadcast advert is coarsened — **telemetry replies to authorized contacts and the in-chat
      GPS insert always use your exact position**. Default off; old `location_advert: true/false`
      configs are read automatically. Scheme adopted from @jason-s13r.

      - **Zero-hop "Local" advert button** on the Heard Adverts screen — announce yourself to
      immediate neighbours without flooding the whole mesh.


      ### Changed

      - **No more periodic flood adverts by default** (#13). MCLite previously flooded a mesh-wide
      advert every ~9 min; on a 110-repeater mesh one device generated ~half of all adverts. Now it
      sends a single flood advert **on boot** and otherwise advertises **on demand** — matching
      stock MeshCore clients. Thanks @stucamp and @jason-s13r.

      - **Opt-in periodic advert** — new `radio.advert_interval_min` field (config tool → Radio)
      re-enables periodic adverts for ad-hoc / SAR / private meshes. Default 0 = off; if set,
      enforced to ≥60 min (720 / 12 h recommended).

      - **GPS button inserts your location into the message** instead of a "Send Location?" confirm
      — append `@ <coords>` to the input, add context, send normally (byte-guarded against the
      160-byte limit).


      ---

      Flash from the web flasher or grab the merged `.bin` below. T-Deck Plus: `mclite-v0.3.8.bin` ·
      T-Watch Ultra: `mclite-watch-v0.3.8.bin`.
  - version: v0.3.7
    name: MCLite 0.3.7
    datetime: '2026-06-15T09:34:57Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.7
    prerelease: false
    notes: >-
      MCLite 0.3.7 — tappable map coordinates, lv_win screen chrome, and on-device screenshots.


      ## Added

      - **Tap a shared location to open it on the map.** A received/sent message containing a GPS
      position — decimal `lat, lon` or MGRS/UTMREF — shows an underlined "Open in map" link under
      the bubble; tapping it opens the map centered there. Touch-only, shown only when map tiles are
      present on SD. Adds a reverse MGRS→lat/lon parser, unit-tested.

      - **Screenshot to SD** (debug aid, off by default). Enable `debug.screenshots` (config tool →
      Display) and capture the current screen to `/screenshots/*.bmp` (24-bit BMP, opens on any PC)
      — T-Deck: **Shift+$**; T-Watch: **double-press the side (PEK) button**. (Top-layer overlays
      like toasts/PIN/SOS aren't captured.)


      ## Changed

      - **Heard Adverts** screen now uses the standard `lv_win` chrome (back arrow + title + action
      buttons) — the first step of rolling consistent screen headers across the app (community PR
      #8, @jason-s13r).


      ## Removed

      - The non-functional Alt+L "insert location" keyboard shortcut (the chat GPS button already
      does this).


      ## Notes

      - Config tool: "Save screenshots" toggle (Display); Security section relayout (Lock + Auto
      Lock on one line, Admin Screen separate).

      - Both boards (T-Deck Plus, T-Watch Ultra) build; 246 native tests pass.
  - version: v0.3.6
    name: MCLite 0.3.6
    datetime: '2026-06-12T09:45:06Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.6
    prerelease: false
    notes: >-
      MCLite 0.3.6 — emoji, three-step volume, and reliability polish.


      ## Added

      - **Emoji in chat** — received emoji render inline (monochrome OpenMoji font with a Montserrat
      fallback, so plain text is unchanged and unknown glyphs degrade gracefully). An on-device
      emoji picker (`display.emoji`, default on, can be disabled) adds a smiley button to compose
      from a curated set, capped to the 160-byte message budget. Incoming/outgoing text is sanitized
      (strips emoji variation selectors, normalizes smart quotes to ASCII). Adopted from the
      @jason-s13r fork; OpenMoji is CC-BY-SA 4.0.

      - **Three-step volume** — the status-bar bell now cycles max → mute → mid → max; the built-in
      chime and custom WAV notifications scale to the level. Default is max (loudness unchanged);
      SOS stays fixed and loud (@jason-s13r, #11).


      ## Changed

      - **`sound.enabled` is now a true master switch.** `false` means fully silent — no
      notifications, no chime, and no SOS sound — and the status-bar bell is hidden. Set `true` (the
      default) for the 3-step volume bell.


      ## Fixed

      - A last-known position restored after reboot no longer reports "~0s ago" before the clock has
      synced — it shows "Last known position" until GPS/NTP re-locks, then the real age.

      - A failed send now shows a "Send failed - try again" toast instead of a silently FAILED
      bubble (still tap-to-retry).

      - Map tile loader hardening: oversized/corrupt PNGs and out-of-range tile coordinates are
      rejected and grey-filled cleanly.


      Both boards (T-Deck Plus, T-Watch Ultra) build; 219 native tests pass.
  - version: v0.3.5
    name: v0.3.5 — i18n cap + config-tool WiFi-wipe fixes
    datetime: '2026-06-11T10:32:26Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.5
    prerelease: false
    notes: >-
      ### Fixed

      - **Translations past ~128 keys reverted to English.** The i18n loader capped SD-loaded
      strings at 128, but the
        language files now hold ~197 keys — so on German/French/Italian every key past the cap silently fell back to
        English (e.g. `canned_5`–`8`, plus the offgrid / firmware-update / WiFi / USB / BLE / map / heard-adverts /
        toast screens). Raised the cap to 256 and added a boot-time warning if a language file ever exceeds it.
      - **Config tool wiped stored WiFi on edit.** The tool's file-import never loaded the `wifi`
      section, so
        importing a device's `config.json`, editing it, and re-exporting produced an empty `wifi` block — clearing
        the device's stored SSID/password on the next copy to SD. WiFi (and the persisted BLE pairing PIN) now
        round-trip correctly, including through the share-link and start-fresh paths.
  - version: v0.3.4
    name: v0.3.4 — Quick replies, auto-GPS refresh, companion advert + fixes
    datetime: '2026-06-11T10:03:31Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.4
    prerelease: false
    notes: >-
      ### Added

      - **Auto-refresh contact GPS** — keeps the map markers / convo-list badges of contacts who
      *don't* broadcast
        their own location fresh, by quietly re-requesting telemetry GPS before the cached fix goes stale. Throttled
        (one request per scan, respects the EU duty cycle, yields to manual requests) and self-limiting (stops asking
        a contact that doesn't answer). New setting `messaging.auto_telemetry`, **default on**, can be disabled.
      - **Per-conversation quick replies** — any contact, channel, or room can carry its own
      `canned` list (max 8)
        that overrides the global quick-reply list *for that chat only*; leave it empty to fall back to the global
        list. Editable per card in the config tool. Turns a conversation into a command menu — e.g. a Home Assistant
        / automation bridge ("Open gate", "Lights on", "Status?").
      - **Last-known location persists across reboots** — the most recent GPS fix is saved to SD
        (`/mclite/last_location.json`, throttled) and restored on boot, so the map opens to your last position
        without waiting for a fresh fix ([@jason-s13r](https://github.com/jason-s13r), #10).
      - **Advertise from the companion app** — the MeshCore phone/desktop app's **Advertise** button
      now works while
        connected (BLE/WiFi/USB); previously it was rejected as an unsupported command. Honours the app's flood vs
        local (zero-hop) option. The on-device advert button and the automatic periodic advert are unchanged.

      ### Changed

      - The device-info / admin screen is now fully localized — every row label routes through the
      translation
        table (de/fr/it) ([@jason-s13r](https://github.com/jason-s13r), #9).
      - Conversation history now loads only the most recent `max_history_per_chat` messages per chat
      at boot
        (previously the whole file was loaded into RAM). Bounds memory if a history file is larger than the cap —
        e.g. after lowering the setting. No visible change; the runtime cap was already in place.

      ### Fixed

      - Telemetry retry is no longer cancelled by the contact-info pop-up's own timeout when the
      mesh's outbound
        queue is busy (the two timers now stay in lockstep) — the retry fires under congestion as intended.
      - Closing the contact-info pop-up now cancels its in-flight telemetry retry, so no stray flood
      request goes
        out for a pop-up you already closed.
      - Muting a chat is now absolute: it silences notifications even for a contact flagged
      `always_sound`
        (`always_sound` still overrides *global* mute, unchanged).
      - Messages that exceed the 160-**byte** limit (e.g. emoji or accented/non-Latin text — which
      can be ≤160
        *characters* but more bytes) are now refused with a "Message too long" toast that keeps your text, instead
        of silently failing to send while still drawing a (failed) bubble.
      - A timed-out telemetry request now releases the radio's single telemetry slot when the
      exchange ends
        (previously the slot stayed held after a no-response request). Without this, **auto-refresh contact GPS**
        would stall for the rest of the session after the first contact that didn't answer, and slow/multi-hop
        contacts could be backed off too eagerly; both are resolved.
      - Auto-refresh no longer lets a single un-sendable contact block the rest of the round-robin,
      and
        `max_history_per_chat: 0` now consistently means "unlimited" on both load and prune (previously prune at 0
        would wipe the conversation).
  - version: v0.3.3
    name: v0.3.3 — Unified contact location + reliability batch
    datetime: '2026-06-10T16:51:48Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.3
    prerelease: false
    notes: >-
      Contact-location and delivery-reliability improvements, plus a batch of community
      contributions from [@jason-s13r](https://github.com/jason-s13r).


      ## Added

      - **Unified contact location** — one source of truth for where a contact is: fresh telemetry
      (accurate) → their advert GPS → a heard advert. The conversation-list **GPS badge** now shows
      for *any* known position (not just telemetry); the **contact info pop-up** shows that position
      even without a telemetry reply (advert-sourced coordinates are marked approximate with `~`),
      offers the **Map** button whenever any position is known, and on a request timeout shows the
      known position instead of a bare "No response". Telemetry stays primary; the 30-minute
      freshness window is unchanged.

      - **Flood-routing retries** for better delivery when a direct path degrades — on **DM**
      retries and on **telemetry-request** retries (with a "Retrying…" state).

      - **Per-chat mute** — opt-in (`messaging.allow_mute`, default off). Long-press a conversation
      to mute; muted chats don't beep or wake the screen (SOS always does), with an indicator in the
      list and chat header.

      - **Vendor row** on the device-info screen showing the firmware's source repo (`owner/repo`) —
      handy with fork flashing.


      ## Fixed

      - Chat scroll-to-bottom is more robust on an empty chat area / on open.


      ## Thanks

      - @jason-s13r for PRs #3–#7.


      Install/update via the [web flasher](https://laserir.github.io/MCLite/tools/web-flasher/), or
      on-device (SD card / WiFi). Binaries: `mclite-v0.3.3.bin` (T-Deck Plus),
      `mclite-watch-v0.3.3.bin` (T-Watch Ultra).


      **Full Changelog**: https://github.com/laserir/MCLite/compare/v0.3.2...v0.3.3
