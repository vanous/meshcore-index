  - version: v0.3.1
    name: v0.3.1 — GPS in adverts + map
    datetime: '2026-06-09T09:01:00Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.1
    prerelease: false
    notes: >-
      Fork-adoption batch (features adopted from the jason-s13r/MCLite fork) plus map polish.


      ## Added

      - **GPS location in adverts** (opt-in, `gps.location_advert`, default off) — broadcast your
      position so contacts see you on their map. Uses MeshCore's native advert location; sends a
      live fix or a still-valid last-known one. Unencrypted broadcast — hence opt-in. Read-only
      status on the admin GPS screen; toggled via the config tool / SD.

      - **General map** — tap the status-bar GPS icon for a map of your own location plus every
      heard node / contact that carries GPS (same chat / repeater / room / sensor symbols as the
      heard-adverts list). Tap a marker for its name; **Reload** button re-scans heard nodes.

      - **NTP time sync** — set the clock from an NTP server over WiFi when GPS hasn't locked (GPS
      still overrides once it does).

      - **@mention** — tap a sender's name in a channel/room to insert `@name `.

      - **Fork-aware OTA** — build-time overridable update repo so forks can self-update.

      - **Web flasher repo/fork picker** — choose which repo's published releases to flash.


      ## Changed

      - Map markers render as filled colored dots (type color + contrasting symbol) so they read
      against any tile; selection ring sits just outside the dot.


      ## Fixed

      - Map markers are reliably tappable (tap-slop dead-zone; wider hit tolerance).

      - Map markers no longer blink out near the viewport edge across zoom levels.


      Install/update via the [web flasher](https://laserir.github.io/MCLite/tools/web-flasher/), or
      on-device (SD card / WiFi). Binaries: `mclite-v0.3.1.bin` (T-Deck Plus),
      `mclite-watch-v0.3.1.bin` (T-Watch Ultra).


      **Full Changelog**: https://github.com/laserir/MCLite/compare/v0.3.0...v0.3.1
  - version: v0.3.0
    name: v0.3.0 — Companion mode (WiFi / USB / BLE)
    datetime: '2026-06-08T12:18:56Z'
    url: https://github.com/laserir/MCLite/releases/tag/v0.3.0
    prerelease: false
    notes: >-
      ## Highlights


      **Companion mode** — bridge the radio to a phone, desktop, or CLI using the standard MeshCore
      companion protocol, in parallel with normal on-device use (messages appear in both):

      - **Bluetooth** — pairs with the official MeshCore iOS/Android apps (6-digit passkey +
      bonding).

      - **WiFi** — reach it from `meshcore-cli`/`meshcore.js`/`meshcore_py` on your LAN.

      - **USB** — wired serial companion.


      One transport at a time; messaging is read-only for config. WiFi and Bluetooth can't run
      together (shared radio/RAM) — the device handles the switch and offers a reboot when needed.


      Also includes the on-device firmware-update fixes and a refreshed README (Quick Start +
      balanced companion docs).


      Install/update via the [web flasher](https://laserir.github.io/MCLite/tools/web-flasher/), or
      on-device (SD card / WiFi). Binaries: `mclite-v0.3.0.bin` (T-Deck Plus),
      `mclite-watch-v0.3.0.bin` (T-Watch Ultra).


      **Full Changelog**: https://github.com/laserir/MCLite/compare/v0.2.2...v0.3.0
