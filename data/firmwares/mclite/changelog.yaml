    url: https://github.com/laserir/MCLite/releases/tag/v0.2.2
    prerelease: false
    notes: >-
      Fixes a stack overflow that crashed the device when installing a firmware update over WiFi
      (the TLS handshake + on-stack buffer exceeded the loop-task stack). WiFi over-the-air updates
      now work end-to-end. SD-card install and USB flashing were unaffected.


      Note: devices on 0.2.1 should update via SD card or USB (the 0.2.1 WiFi installer has the
      crash); 0.2.2 onward updates over WiFi cleanly.
