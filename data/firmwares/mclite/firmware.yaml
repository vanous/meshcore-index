name: MCLite
type: fork
maintainer: laserir
description: >
  A lightweight off-grid communicator firmware for the LilyGo T-Deck Plus and T-Watch Ultra.
  Purpose-built for emergency and outdoor communication — no internet, no cell towers needed.
  SD card configuration, web flasher, and room server support. Compatible with MeshCore apps.
repository: https://github.com/laserir/MCLite
license: MIT
status: active
lifecycle: active
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
features:
  - Web flasher (Chrome/Edge)
  - SD card configuration (one person sets up, copies to everyone)
  - Room server support (up to 8)
  - On-screen keyboard
  - GPS support
  - No accounts, no pairing, no per-device setup
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: false
    wifiAp: false
  operations:
    ota: false
    webFlasher: true
  networking:
    repeater: false
    roomServer: false
    observer: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: false
    lowPowerRx: false
devices:
  # Source: README supported hardware section
  - id: lilygo-t-deck
    status: supported
    notes: T-Deck Plus — primary target with QWERTY keyboard, trackball, GPS.
  # Source: README supported hardware section — T-Watch Ultra
  - id: lilygo-twatch-ultra
    status: supported
    notes: T-Watch Ultra — wrist-worn with AMOLED touchscreen.
