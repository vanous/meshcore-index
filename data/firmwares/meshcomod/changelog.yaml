    prerelease: false
    notes: >-
      **meshcomod companion v1.16.0.1** (on MeshCore 1.16).


      Boards: Heltec V4 (OLED), Heltec V3, Heltec Wireless Paper (E213), Seeed Xiao S3 WIO —
      multi-transport USB + BLE + TCP.


      **Fixes**

      - **BLE no longer fails to start when Wi-Fi credentials are set** (issue #32). On the V4/OLED
      companions, BLE and Wi-Fi now co-init correctly at boot instead of BLE being deferred and
      unable to come up later.


      Flash the `-merged.bin` at 0x0 for a first-time/recovery flash, or the app-only `.bin` at
      0x10000 over a matching partition table.
