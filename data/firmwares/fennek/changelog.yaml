  - version: v1.9.2
    name: Fennek v1.9.2
    datetime: '2026-06-15T15:51:06Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.9.2
    prerelease: false
    notes: >-
      ### Added

      - **`BATTLOG` — opt-in battery & activity logger** (`services/battlog`). When the `BATTLOG`
      build flag is set, the firmware writes one record per event (app switch, audio track, mesh
      radio on, Wi-Fi on/off, standby/wake) **and** a battery probe every 60 s to
      `/.fennek/battery.log` (timestamp + %/mV/charging? + Wi-Fi/mesh status). It's a throttled
      PSRAM ring flushed to SD before standby, and downloadable via the Web file manager — useful
      for diagnosing real-world battery drain. Deliberately zero-cost when the flag is off (all
      `BATTLOG_*` calls compile to nothing).


      🌐 Project page & screenshots: **https://fennek.dumke.me**


      **Full changelog:** [`CHANGELOG.md`](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.9.1
    name: Fennek v1.9.1
    datetime: '2026-06-15T15:51:06Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.9.1
    prerelease: false
    notes: >-
      ### Fixed

      - **Notes never silently lost on a failed SD write.** The save path now clears its dirty flag
      only on a *complete* success; if an SD write or remove fails, the note stays dirty and is
      retried on the next autosave instead of being overwritten on the next editor open.

      - **Just-played track now reaches the scrobble queue before standby.** `power::poll()` stops
      audio (and lets the audio task drain the stop command) *before* the pre-standby Navidrome
      flush, so the current track is enqueued via `noteTrackEnded()` rather than landing in the
      PSRAM ring that deep sleep would otherwise discard.


      **Full changelog:** [`CHANGELOG.md`](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.9.0
    name: Fennek v1.9.0
    datetime: '2026-06-15T15:51:05Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.9.0
    prerelease: false
    notes: >-
      ### Added

      - **Mesh: `contacts reset` console command** + `mesh_client::resetContacts()`. Clears all
      contacts and their persistent mirrors (SPIFFS `/contacts`, SD `/meshcore/contacts.bin`); the
      contact table then rebuilds itself from incoming adverts. Handy when the 64-slot table fills
      up with stale nodes or you want a clean slate.


      **Full changelog:** [`CHANGELOG.md`](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.8.1
    name: Fennek v1.8.1
    datetime: '2026-06-15T15:51:04Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.8.1
    prerelease: false
    notes: >-
      ### Changed

      - **Unified back/home navigation across all apps.** Home is now a visible affordance: the
      status bar shows a house glyph (⌂) outside the launcher and the whole bar taps to Home. Lower
      corner buttons are consistently labelled **"Back"** (exactly one level) —
      audiobook/reader/notes lists and Settings now say "Back" instead of "Home", and the Settings
      back button steps edit → category → root → launcher. Mesh sub-screens dropped their redundant
      second "Home" button, the Files app gained a visible "Back" button, and the reader footer
      tap-zone is labelled "◄ List". Games keep no on-screen back button (exit via the ⌂ glyph;
      keyboard `Backspace`/`Q` still works). Keyboard conventions (`Q` = Home, `Backspace` = one
      level back) unchanged.


      **Full changelog:** [`CHANGELOG.md`](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.8.0
    name: Fennek v1.8.0
    datetime: '2026-06-13T19:18:10Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.8.0
    prerelease: false
    notes: >-
      ## Added

      - **Notes app** (launcher tile 7): a daily-notes model — exactly one note per day, named after
      the local date (`/notes/YYYY-MM-DD.md`). **"+ Today"** opens or appends to today's note; the
      list shows every day newest-first with a first-line preview, and notes can be deleted with a
      confirmation. The editor is append-style (type / Backspace / Enter) with its own word wrap and
      a compact header.

        Persistence is chunked under `spiLock` (never inside `draw()`), with a 30 s autosave and a save on leave; empty notes are removed. Without an SD card it shows "No SD card" + "Search again" like the other apps. The date comes from the local system clock (`timesync`). New console command `notes` runs an SD round-trip / scan self-check (in the style of `books`).

      Localized in DE/IT/SV/EN/ES. Verified on device (clean boot, SD round-trip with UTF-8
      preserved, scan/sort).


      **Full changelog:** [CHANGELOG.md](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.7.1
