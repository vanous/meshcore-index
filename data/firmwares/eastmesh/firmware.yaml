name: EastMesh
type: fork
maintainer: xJARiD
description: >
  EastMesh firmware builds for MeshCore, with MQTT repeaters, WiFi companions, and simple
  release downloads for supported boards. Features an optional local HTTPS config panel on
  supported ESP32 targets, JWT auth using device identity, and battery reporting.
repository: https://github.com/xJARiD/MeshCore-EastMesh
license: MIT
status: active
lifecycle: active
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
  - repeater
  - observer
features:
  - MQTT repeater builds
  - WiFi companion builds
  - Optional local HTTPS config panel (ESP32)
  - JWT auth using device identity
  - Battery reporting on supported targets
  - Observer role support
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: true
    wifiAp: true
  operations:
    ota: true
    webFlasher: false
  networking:
    repeater: true
    roomServer: false
    observer: true
    mqtt: true
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: false
    lowPowerRx: false
devices:
  # Source: README build commands — heltec_v4_repeater_observer, heltec_v4_companion_radio_wifi
  - id: heltec-v4
    status: supported