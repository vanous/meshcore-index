    prerelease: false
    notes: "## MeshCore EastMesh Observer with ESP-NOW Bridge\r\n\r\nEastMesh `observer-eastmesh-bridge-espnow` firmware for MeshCore boards that combine secure MQTT uplink with ESP-NOW bridge support, based on MeshCore firmware `v1.16.0`.\r\n\r\nThis release includes the same Observer updates as `observer-eastmesh-v2026.6.5`, with ESP-NOW bridge support included.\r\n\r\n### What's Changed\r\n\r\n- Same changes as `observer-eastmesh-v2026.6.5`.\r\n- Includes ESP-NOW bridge firmware targets using the `*_repeater_observer_espnow` PlatformIO environment suffix.\r\n\r\n### Breaking Changes\r\n\r\n- `get mqtt.status` output changed from per-broker fields to `p:`/`s:` broker slots; update anything that parses the previous format.\r\n- Saved LetsMesh EU/US broker selections are cleared once on upgrade; re-enable a broker such as MeshMapper if you need a second uplink.\r\n\r\n### Notes\r\n\r\n- This track is separate from `observer-eastmesh`.\r\n- Use `get wifi.status` to confirm the active 2.4 GHz Wi-Fi channel before setting `bridge.channel`.\r\n- `bridge.channel` should match the connected Wi-Fi channel for reliable ESP-NOW bridge operation.\r\n- For maximum heap headroom after setup, disable the web panel with `set web off`.\r\n- `flood.max.advert` controls the hop limit for flooded advert packets.\r\n\r\n### Documentation\r\n\r\n[xjarid.github.io/MeshCore-EastMesh](https://xjarid.github.io/MeshCore-EastMesh/)\r\n\r\n### Flashing\r\n\r\n- [flasher.eastmesh.au](https://flasher.eastmesh.au/)\r\n- [flasher.meshcore.io](https://flasher.meshcore.io/)\r\n\r\n### Assets\r\n\r\n- `.bin` - standard update image\r\n- `-merged.bin` - full ESP32 image for flashing after erase"
