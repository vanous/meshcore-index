name: MeshCoreTerm
type: fork
maintainer: dabeani
description: >
  A retro-themed companion firmware based on MeshCore, featuring a rich on-screen keyboard,
  hardware navigation (D-pad, joystick, trackball), management features for device name, WiFi,
  BLE PIN, radio parameters, and GPS configuration. Supports multiple devices with prebuilt
  binaries and no online update requirement.
repository: https://github.com/dabeani/meshcoreterm
license: NOASSERTION
status: active
lifecycle: active
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
features:
  - Retro-themed UI
  - On-screen keyboard with upper/lower/symbol modes
  - Hardware navigation (D-pad, joystick, T-Deck trackball)
  - Device management (name, WiFi, BLE PIN, radio params, GPS)
  - Status bar with transport badges and battery indicator
  - Persistence via NVS/Preferences
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: false
    wifiAp: true
  operations:
    ota: false
    webFlasher: false
  networking:
    repeater: false
    roomServer: false
    observer: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: false
    lowPowerRx: false
devices:
  # Source: README — supported devices list
  - id: lilygo-t-deck
    status: supported
  - id: sensecap-indicator-espnow
    status: supported
    notes: Seeed SenseCAP Indicator (TFT variant).
  - id: heltec-v4
    status: supported
  - id: thinknode-m3
    status: supported
    notes: Elecrow 3.5" ThinkNode M3.
  - id: thinknode-m5
    status: supported
    notes: Elecrow 7" ThinkNode M5.