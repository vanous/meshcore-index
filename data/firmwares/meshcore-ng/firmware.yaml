name: MeshCoreNG
type: fork
maintainer: MichTronics
maintainerUrl: https://github.com/MichTronics
description: >
  A "Next Gen" fork of MeshCore developed in the Netherlands, focused on making repeaters smarter so
  larger, busier meshes stay stable. It adds a dense-mesh foundation — flood-advert forwarding
  control, congestion/density stats, hardware CAD channel-busy detection, node-based retransmit
  spreading and duplicate-hearing suppression — plus an optional internet bridge for linking isolated
  RF islands, all while staying protocol-compatible with existing MeshCore clients.
repository: https://github.com/MichTronics/MeshCoreNG
website: https://michtronics.github.io/MeshCoreNG/
license: MIT
status: active
latest_version: repeater-v1.1.0
released: '2026-06-19'
lifecycle: active
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
  - repeater
  - room-server
features:
  - Dense-mesh repeater foundation
  - Flood-advert forwarding control (flood.advert.base)
  - Dense stats / congestion & density measurement
  - Manual relay probability + dynamic-mode preparation
  - Hardware CAD channel-busy detection
  - Node-based retransmit spreading
  - Duplicate-hearing retransmit suppression
  - Optional internet bridge (TCP / BLE / RS232 / ESPNow)
  - Low-battery boot & runtime guard
  - Web-based flasher
  - Protocol-compatible with existing MeshCore clients
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: true
    wifiAp: true
  operations:
    webFlasher: true
    ota: true
    bleDfu: true
  networking:
    repeater: true
    roomServer: true
    observer: false
    mqtt: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: true
    lowPowerRx: true
