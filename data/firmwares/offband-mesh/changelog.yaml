      + app in one, flashed at `0x0` after a chip erase. Self-contained, works on a blank chip. |
      **First install / clean setup.** In a web flasher this is the **"Full Firmware"** option. |

      | `*.bin` (ESP32) | **App only** — flashed at the app offset (`0x10000`); the bootloader must
      already be on the chip. | **Updating** an existing node — OTA / **"Update Only."** Keeps the
      device identity + WiFi/MQTT config. |

