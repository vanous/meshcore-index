name: LusoFW
type: fork
maintainer: MeshCore Portugal
maintainerUrl: https://github.com/Meshcore-Portugal
description: >
  A community MeshCore firmware distribution for the Portuguese community, with Portugal-oriented
  radio defaults, duty-cycle enforcement, network time synchronisation, flood-advert controls, and
  curated repeater and bridge builds.
repository: https://github.com/Meshcore-Portugal/lusofw
website: https://meshcore.pt
license: MIT
status: active
lifecycle: active
maturity: stable
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: C++
roles:
  - repeater
features:
  - Portugal-oriented radio and region defaults
  - Duty-cycle enforcement
  - Network time synchronisation
  - Flood-advert scheduling and reduction
  - ESP-NOW and RS-232 repeater bridge builds
  - SX126x boosted receive gain controls
  - Curated browser-flashable releases
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    usbSerial: true
  operations:
    webFlasher: true
    ota: true
  networking:
    repeater: true
    roomServer: false
    observer: false
    mqtt: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: true
    lowPowerRx: false
verification:
  sourceAvailable: true
  releasesAvailable: true
  signedReleases: false
  reproducibleBuilds: false
  ciBuilds: true
  webFlasher: false
  hasDocumentation: true
  lastChecked: '2026-06-25'
  notes:
    - Release assets include SHA-1 checksum files.
    - Published releases are curated repeater and repeater-bridge builds.
