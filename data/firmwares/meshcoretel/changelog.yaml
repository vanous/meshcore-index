    prerelease: false
    notes: "Минорное обновление прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n### Что нового в этой версии:\r\n\r\n#### Веб-панель\r\n- Рядом с публичным ключом узла в разделе \"Info\" появилась кнопка-ссылка на профиль устройства на [meshcoretel.ru](https://meshcoretel.ru/ru). \r\n<img width=\"366\" height=\"154\" alt=\"Screenshot From 2026-06-06 17-50-24\" src=\"https://github.com/user-attachments/assets/5905b996-8156-4504-8a84-383f2c7deff5\" />\r\n\r\n\r\n- В таблице соседей \"Neighbours\" короткие ID теперь тоже являются ссылками на профили соседних узлов на [meshcoretel.ru](https://meshcoretel.ru/ru).\r\n<img width=\"205\" height=\"147\" alt=\"Screenshot From 2026-06-06 17-49-59\" src=\"https://github.com/user-attachments/assets/6bb9f0ba-1780-46b5-b673-b153fbc094c7\" />\r\n\r\n\r\n- Для `boot` в истории событий \"Events\" теперь отображается причина перезагрузки — например, `power on`, `software reset`, `panic/exception` и т.д.\r\n<img width=\"281\" height=\"276\" alt=\"Screenshot From 2026-06-06 17-52-39\" src=\"https://github.com/user-attachments/assets/5b9738c1-d30a-4618-b17b-c88b6878f8a2\" />\r\n\r\n\r\n- Для `low memory` в истории событий \"Events\" теперь отображается сколько свободной памяти оставалось в тот момент.\r\n\r\n#### CLI\r\n- Команда `get pwrmgt.bootreason` теперь работает на ESP32: показывает причину последней перезагрузки устройства.\r\n<img width=\"284\" height=\"205\" alt=\"Screenshot From 2026-06-06 17-54-07\" src=\"https://github.com/user-attachments/assets/eb993e2b-edfc-4abf-8cbe-2850d8bd96b8\" />\r\n\r\n\r\n#### Синхронизация времени\r\n- Устройство теперь автоматически использует NTP-сервер, который предоставляет DHCP-сервер в локальной сети (если он его передаёт). Это полезно в изолированных сетях без доступа к интернету, где есть свой NTP-сервер.\r\n\r\n#### Исправления\r\n- Исправлен редкий сбой MeshCore-прошивки при приёме LoRa-пакетов максимального размера.  Сбой проявлялся крайне редко, но мог приводить к перезагрузке устройства.\r\n- Исправлен баг: график ошибок приёма пакетов переставал обновляться и показывал нули после длительной работы устройства.\r\n\r\n### Жаркое лето\r\n\r\nВо многих городах установилилась теплая погода и графики температуры MCU поползли вверх. Чтобы снизить температуру в прошивке предусмотрены режимы сбережения энергии для Wi-Fi, которые заметно снижают тепловую нагрузку на чип без какой-либо деградации функциональности и стабильности в большинстве случаев.\r\n\r\nВключаются эти режимы командами `set wifi.powersaving min` и `set wifi.powersaving max`.\r\n\r\nПо умолчанию энергосбережение для Wi-Fi отключено:\r\n```\r\nget wifi.powersaving\r\n> none\r\n```\r\nПопробуйте начать с `min` и проследить стабильность Wi-Fi с MQTT и Web в этом режиме. Если всё хорошо, можете попробовать и `max`. Температура чипа в этих режимах заметно снизится.\r\n\r\nТекущий режим также отображается на веб-панели в разделе \"Stats\":\r\n\r\n<img width=\"209\" height=\"79\" alt=\"Screenshot From 2026-06-06 17-48-06\" src=\"https://github.com/user-attachments/assets/21ab0269-831e-4d02-a9d0-c22e9ba9b766\" />\r\n\r\n\r\n### В составе релиза:\r\n- `*-merged.bin` — полная версия (рекомендуется при первой прошивке)\r\n- `*.bin` — только сам код приложения (настройки сохраняются)\r\n\r\nПрошивка также доступна в веб-прошивальщике от Мешкартеля:\r\n\r\n - <https://meshcoretel.ru/ru/flasher> - под заголовком _Прошивки наблюдателя от VBart_"
