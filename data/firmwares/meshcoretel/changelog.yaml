  - version: repeater-mqtt-meshcoretel-v1.2.0
    name: Repeater v1.16.0-vbart-meshcoretel-v1.2.0
    datetime: '2026-06-07T16:54:54Z'
    url: https://github.com/VBart/MeshCoreTel-firmware/releases/tag/repeater-mqtt-meshcoretel-v1.2.0
    prerelease: false
    notes: "Новая версия прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n## Что нового в этом релизе\r\n\r\n### Основа: обновление до официальной MeshCore v1.16.0\r\n\r\nПрошивка обновлена до последней официальной версии MeshCore v1.16.0, которая включает улучшения и исправления от сообщества разработчиков.\r\n\r\n### Новое: управление усилителем приёма (LNA) на устройствах Heltec с FEM\r\n\r\n**Кого касается:** владельцев устройств Heltec, оснащённых внешним модулем усиления сигнала (FEM — Front-End Module), например с чипом KCT8103L (Heltec v4.3).\r\n\r\n**Что такое LNA:** Low Noise Amplifier — малошумящий усилитель на пути приёма сигнала. Когда он включён, устройство лучше слышит слабые сигналы от удалённых узлов сети.\r\n\r\n**Что изменилось:**\r\n\r\n- Официальная v1.16.0 **отключила LNA по умолчанию** на устройствах Heltec с FEM. В данной же прошивке **сохранено включённое состояние по умолчанию** для повторителя.\r\n- Добавлена новая настройка `radio.fem.rxgain`, которая позволяет через CLI-команды включать и отключать LNA без перезагрузки (и тем более без перепрошивки) устройства:\r\n\r\n```\r\nget radio.fem.rxgain        # посмотреть текущее состояние\r\nset radio.fem.rxgain on     # включить LNA (лучший приём)\r\nset radio.fem.rxgain off    # выключить LNA\r\n```\r\n\r\nТекущее значение сохраняется при перезагрузках. Все CLI-команды можно выполнять через [веб-интерфейс](https://vbart.github.io/MeshCoreTel-firmware/web-panel/).\r\n\r\nОбращаю внимание, что LNA усиливает и сигнал и шумы — это нормально.\r\n\r\n#### С включенным LNA на Heltec v4.3:\r\n```\r\n> set radio.fem.rxgain on\r\nOK - LoRa FEM RX gain on\r\n```\r\n<img width=\"424\" height=\"268\" alt=\"Screenshot From 2026-06-07 19-46-59\" src=\"https://github.com/user-attachments/assets/e89a07ba-e2a3-4de1-9ff6-09f5d8a2bdaa\" />\r\n\r\n#### И с выключенным:\r\n```\r\n> set radio.fem.rxgain off\r\nOK - LoRa FEM RX gain off\r\n```\r\n<img width=\"424\" height=\"268\" alt=\"Screenshot From 2026-06-07 19-47-19\" src=\"https://github.com/user-attachments/assets/20537fe6-88f4-4dc1-81bf-2fe32f3a022d\" />\r\n\r\n## Изменения из 1.16.0:\r\n\r\nНиже приведу наиболее интересный список изменений, унаследованных из официальной прошивки 1.16.0 для повторителей на базе ESP32.\r\n\r\n### Увеличение преамбулы для низких SF\r\n\r\nПри SF ≤ 8 (быстрые режимы) преамбула увеличена с 16 до **32 символов**. На низких SF у радио меньше времени на захват сигнала, поэтому более длинная преамбула снижает вероятность пропуска начала пакета.\r\n\r\n### Расширенный ACK (6 байт вместо 4)\r\n\r\nACK-пакеты теперь содержат **6 байт** вместо 4: добавлены байт номера попытки отправки и случайный байт. Это устраняет редкие коллизии при дедупликации пакетов и готовит почву для поддержки более 4 попыток доставки прямых сообщений в будущих версиях приложения. **Повторители должны быть обновлены до 1.16.0 раньше, чем приложение начнёт использовать эту функцию.**\r\n\r\n### Новые настройки ограничения хопов\r\n\r\n**`flood.max.advert` (по умолчанию: 8)**\r\nОтдельный лимит хопов для пакетов-объявлений (advert). Раньше объявления ограничивались общим `flood.max`. Теперь можно задать меньший радиус распространения объявлений, не трогая лимит для обычных сообщений. [1](#2-0) \r\n\r\n**`flood.max.unscoped` (по умолчанию: 64, то есть фактически выключено)**\r\nОграничивает хопы для flood-пакетов, у которых **нет метки региона**. В MeshCore пакеты бывают двух видов: с меткой региона — они позволяют повторителям фильтровать трафик по географии, и без метки — они распространяются по всей сети без географической фильтрации. Этот параметр позволяет отдельно ограничить именно такие \"безрегиональные\" пакеты.\r\n\r\n### Значение по умолчанию для интервала flood-объявлений\r\n\r\nЗначение по умолчанию для `flood.advert.interval` изменено с **12 до 47 часов**. Параметр по-прежнему настраивается командой `set flood.advert.interval <часы>`.\r\n\r\n### Исправление бага: обновление соседей через flood-адверты\r\n\r\nЕсли соседний повторитель использовал `path.hash.mode` 1 или 2, его flood-адверты не обновляли запись\n…"
