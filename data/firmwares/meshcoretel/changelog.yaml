    prerelease: false
    notes: "Корректирующий релиз прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n### Основные изменения:\r\n - Временная недоступность NTP больше не прерывает работу MQTT, если за последние сутки время синхронизировалось\r\n - Адреса NTP-серверов для синхронизации времени изменены на `0.ru.pool.ntp.org`, `ntp.ix.ru` и `ntp21.vniiftri.ru`\r\n - Добавлена сборка прошивки для [`DIY ESP32S3 N16R8 E22 Back2back`](https://garden.struchkov.dev/ru/files/ESP32-S3-E22-%D1%81%D1%85%D0%B5%D0%BC%D0%B0-NanoVHF-v3.04.pdf)\r\n - Убран вариант сборки прошивки для `Station G2` с включенным логированием пакетов в серийные порт\r\n \r\n ### В составе релиза:\r\n - `*-merged.bin` - полная версия (рекомендуется при первой прошивке)\r\n - `*.bin` - только сам код приложения (настройки сохраняются)\r\n\r\nПрошивка также доступна в веб-прошивальщике от Мешкартеля:\r\n\r\n - <https://meshcoretel.ru/ru/flasher> - под заголовком _Прошивки наблюдателя от VBart_"
