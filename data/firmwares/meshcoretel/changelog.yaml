    name: Repeater v1.15.0-vbart-meshcoretel-v1.1.1
    datetime: '2026-05-16T15:39:44Z'
    url: https://github.com/VBart/MeshCoreTel-firmware/releases/tag/repeater-mqtt-meshcoretel-v1.1.1
    prerelease: false
    notes: "Корректирующий релиз прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n**О чём релиз:** исправлена досадная проблема с OTA — после прошивки панель могла сообщать, что устройство не загрузилось, хотя это было не так. Также ещё улучшена отзывчивость веб-интерфейса и устранены огрехи в отображении графиков.\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n## Изменения по сравнению с версией v1.1.0\r\n\r\n### Исправление во встроенном в веб-панель OTA-обновлении\r\n\r\nПосле успешной прошивки панель могла ждать минуту и показать `\"Device did not come back online. =(\"`, хотя устройство загружалось нормально, **не пугайтесь**. Это происходило из-за того, что CI-сборки всегда генерируют новый самоподписной сертификат, и браузер блокировал проверочное соединение.\r\n\r\nРанее, когда это тестировалось при локальной сборке, сертификат между сборками не менялся и всё работало, но в релизных сборках сертификат всегда отличается, а из соображений безопасности разработчики браузеров ошибку сертификата сделали неотличимой от ошибки подключения. После прошивки нужно просто в браузере перезагрузить страницу и согласиться принять новый сертификат.\r\n\r\nТеперь, вместо попыток опроса устройства, отображается 10-секундный обратный отсчёт с автоматическим переходом на страницу входа.\r\n\r\n### Производительность\r\n\r\n**Включены \"TLS session tickets\"**: браузер теперь возобновляет HTTPS-сессию без полного RSA-рукопожатия — веб-интерфейс открывается заметно быстрее при повторных подключениях.\r\n\r\n### Графики трендов\r\n\r\n- Ложный нулевой столбец в начале графика пакетов и нулевой минимум диапазона из-за этого — устранены.\r\n- Диапазон min/max для пакетов теперь учитывает сумму RX и TX, а не только RX.\r\n- Аномальный скачок на стыке сессий при восстановлении истории с SD-карты — исправлен.\r\n- Синхронизация подсветки между графиками теперь по временно́й метке — разные графики больше не выделяют разные моменты времени.\r\n- Исправлена подсветка крайних столбцов на столбчатых графиках (пакеты, спутники GPS).\r\n\r\n### Прочее\r\n\r\n- Кнопки в неактивном состоянии больше не подсвечиваются при наведении.\r\n\r\n---\r\n\r\nБраузер теперь может кэшировать TLS-сессию в течении суток с момента последнего обращения.  Это избавляет от необходимости каждый раз считать сессионые ключи, что в разы снижает нагрузку на устройство и устраняет задержку для новых подключений.\r\n\r\nБыло:\r\n```\r\n$ openssl s_time -connect heltec:443 -time 10\r\n\r\n\r\nNow timing without session id reuse.\r\nstarting\r\n**********\r\n\r\n10 connections in 0.02s; 500.00 connections/user sec, bytes read 0\r\n10 connections in 11 real seconds, 0 bytes read per connection\r\n```\r\n\r\nСтало:\r\n```\r\n$ openssl s_time -connect heltec:443 -time 10 -reuse\r\n\r\n\r\nNow timing with session id reuse.\r\nstarting\r\nrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrr\r\n\r\n142 connections in 0.12s; 1183.33 connections/user sec, bytes read 0\r\n142 connections in 11 real seconds, 0 bytes read per connection\r\n```\r\n\r\nСтало на порядок быстрее."
  - version: repeater-mqtt-meshcoretel-v1.1.0
    name: Repeater v1.15.0-vbart-meshcoretel-v1.1.0
    datetime: '2026-05-11T08:54:46Z'
    url: https://github.com/VBart/MeshCoreTel-firmware/releases/tag/repeater-mqtt-meshcoretel-v1.1.0
    prerelease: false
    notes: "Вышла новая версия прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n## Основные изменения v1.1.0\r\n\r\n### Безопасность\r\n**OTA-обновление прошивки через HTTPS** — раньше использовался отдельный HTTP-сервер без шифрования и аутентификации. Теперь загрузка идёт через основной HTTPS-сервер с проверкой токена, прогресс-баром и автоматическим опросом устройства после перезагрузки.  Старый ElegantOTA пока ещё остался доступен по команде `start ota`.\r\n\r\n<img width=\"784\" height=\"173\" alt=\"Screenshot From 2026-05-11 11-48-53\" src=\"https://github.com/user-attachments/assets/0bf938e0-da07-4d41-a9b6-91bebbf07e8d\" />\r\n\r\n### Новые метрики и графики\r\n- **Core 0 Util** — загрузка ядра 0 (Wi-Fi, MQTT, HTTP, LwIP) как 60-секундное скользящее среднее текущее значение и в виде графика.\r\n- **RX Error Rate** — доля ошибок приёма среди всех пакетов.  График с цветовыми зонами: зелёный (0–20 %), жёлтый (20–45 %), красный (45–100 %).\r\n- **Температура MCU** — график с цветовой индикацией пороговых значений в 75 °C и 95 °C.\r\n- **RX/TX трафик раздельно** — график пакетов теперь стековая диаграмма: RX (фиолетовый) снизу, TX (голубой) сверху.\r\n\r\n### Улучшения страницы статистики\r\n- Синхронно подсвечиваются точки на всех графиках в той же временной позиции при наведении курсора мыши.\r\n- Мин/макс диапазон рядом с текущим значением для каждого графика.\r\n- Мигающий индикатор `refreshed >Xm ago` в заголовке Stats, если данные не обновлялись более минуты.\r\n- Кнопка авто-обновления `↻` с обратным отсчётом 60 секунд.\r\n\r\n### Настройки\r\n- **MQTT IATA** — свободный ввод вместо фиксированного списка из 24 городов; список автодополнения загружается динамически из API.\r\n- **Пресеты радио** — подгрузка актуальных пресетов из MeshCoreTel, предпросмотр настроек перед сохранением, предупреждение о необходимости перезагрузки после применения.\r\n\r\n### Интерфейс\r\n- Переключатель темы (☾/☀) теперь есть и на странице логина.\r\n- Инфо-панель показывает тип устройства вместо бесполезного \"Client Version\".\r\n- Карточки переупорядочены: Radio + Packets вместе, Wi-Fi + Memory вместе; RX-метрики везде идут перед TX.\r\n- Поле ввода команд очищается после нажатия Enter, убрана сбивающая с толку подсказка на месте ввода.\r\n\r\n<img width=\"899\" height=\"993\" alt=\"Screenshot From 2026-05-11 11-53-47\" src=\"https://github.com/user-attachments/assets/08fe3533-9dbf-461c-9aab-0bc0b1fed7f0\" />\r\n\r\n### В составе релиза:\r\n- `*-merged.bin` — полная версия (рекомендуется при первой прошивке)\r\n- `*.bin` — только сам код приложения (настройки сохраняются)\r\n\r\nПрошивка также доступна в веб-прошивальщике от Мешкартеля:\r\n\r\n - <https://meshcoretel.ru/ru/flasher> - под заголовком _Прошивки наблюдателя от VBart_"
