    notes: "Первая релизная сборка прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n### Основные изменения:\r\n - Добавлена поддержка MQTT-брокера MeshCoreTel\r\n - Исправлено падение, приводящее к перезагрузке при ранних ошибках подключения к MQTT-брокеру LetsMesh\r\n - Исправлены LWT-сообщения, JSON в них теперь не обрезается \r\n - Удалена поддержка MQTT-брокера EastMesh Australia\r\n - Убрана замена пробелов и точек на подчеркивания в передаваемой в MQTT модели устройства\r\n \r\n \r\n<img width=\"906\" height=\"573\" alt=\"Screenshot From 2026-04-28 19-42-08\" src=\"https://github.com/user-attachments/assets/f84b7038-a182-4aa2-b03b-621292134b29\" />\r\n\r\n \r\n ### В составе релиза:\r\n - `*-merged.bin` - полная версия (рекомендуется при первой прошивке)\r\n - `*.bin` - только сам код приложения (настройки сохраняются)"
