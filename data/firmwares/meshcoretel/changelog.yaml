    notes: "Корректирующий релиз прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\nВ данном релизе устранены ошибки при запуске OTA (обновление через Wi-Fi) из веб-интерфейса, а также исправлена проблема с отключением самого интерфейса.\r\n\r\n```\r\n> start ota\r\nStarted: http://192.168.0.42/update (WiFi: MyHomeNet)\r\n```\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n### Основные изменения:\r\n - Исправлена ошибка: устройство больше не перезагружается при нажатии кнопки «Start OTA» или вводе команды `start ota` в веб-интерфейсе.\r\n - Оптимизация OTA: при активном Wi-Fi-соединении обновление теперь происходит через текущую сеть без создания точки доступа «MeshCore-OTA». В интерфейсе отображается корректный IP-адрес.\r\n - Стабильность: команда `set web off` теперь работает корректно, не вызывая зависаний или перезагрузки устройства.\r\n\r\n ### В составе релиза:\r\n - `*-merged.bin` - полная версия (рекомендуется при первой прошивке)\r\n - `*.bin` - только сам код приложения (настройки сохраняются)\r\n\r\nПрошивка также доступна в веб-прошивальщике от Мешкартеля:\r\n\r\n - <https://meshcoretel.ru/ru/flasher> - под заголовком _Прошивки наблюдателя от VBart_"
  - version: repeater-mqtt-meshcoretel-v1.0.3
    name: Repeater v1.15.0-vbart-meshcoretel-v1.0.3
    datetime: '2026-05-06T21:12:29Z'
    url: https://github.com/VBart/MeshCoreTel-firmware/releases/tag/repeater-mqtt-meshcoretel-v1.0.3
    prerelease: false
    notes: "Корректирующий релиз прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\nВ данном релизе в разы улучшена стабильность и отзывчивость работы веб-панели.\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n### Основные изменения:\r\n - Исправлены случайные перезагрузки устройства при открытии веб-панели по HTTPS\r\n - Вместо ECDHE теперь используется RSA-шифрование для HTTPS-соединений в веб-интерфейсе\r\n - Устранены зависания браузера при работе с веб-панелью\r\n - Страницы веб-панели теперь могут кэшироваться браузером\r\n\r\nНагрузочный тест HTTPS-интерфейса до изменений:\r\n```\r\n$ wrk -c 2 -t 2 https://heltec/\r\nRunning 10s test @ https://heltec/\r\n  2 threads and 2 connections\r\n  Thread Stats   Avg      Stdev     Max   +/- Stdev\r\n    Latency    97.82ms   13.59ms 144.37ms   72.00%\r\n    Req/Sec     9.90      2.97    20.00     89.80%\r\n  51 requests in 10.00s, 167.94KB read\r\n  Socket errors: connect 0, read 0, write 0, timeout 1\r\nRequests/sec:      5.10\r\nTransfer/sec:     16.79KB\r\n```\r\n\r\nА это свежей версии:\r\n```\r\n$ wrk -c 2 -t 2 -d 20s https://heltec/\r\nRunning 20s test @ https://heltec/\r\n  2 threads and 2 connections\r\n  Thread Stats   Avg      Stdev     Max   +/- Stdev\r\n    Latency    82.48ms   90.48ms   1.03s    97.76%\r\n    Req/Sec    14.18      5.05    20.00     57.86%\r\n  480 requests in 20.02s, 1.49MB read\r\nRequests/sec:     23.97\r\nTransfer/sec:     76.25KB\r\n```\r\n\r\nПри этом в браузере веб-панель стала работать заметно шустрее.\r\n\r\n ### В составе релиза:\r\n - `*-merged.bin` - полная версия (рекомендуется при первой прошивке)\r\n - `*.bin` - только сам код приложения (настройки сохраняются)\r\n\r\nПрошивка также доступна в веб-прошивальщике от Мешкартеля:\r\n\r\n - <https://meshcoretel.ru/ru/flasher> - под заголовком _Прошивки наблюдателя от VBart_"
  - version: repeater-mqtt-meshcoretel-v1.0.2
    name: Repeater v1.15.0-vbart-meshcoretel-v1.0.2
    datetime: '2026-05-05T20:20:58Z'
    url: https://github.com/VBart/MeshCoreTel-firmware/releases/tag/repeater-mqtt-meshcoretel-v1.0.2
    prerelease: false
    notes: "Корректирующий релиз прошивок для MeshCoreTel-повторителей с поддержкой MQTT и веб-интерфейсом для конфигурирования и мониторинга.\r\n\r\n### Базируется на прошивках:\r\n - MeshCore v1.15.0\r\n - EastMesh v1.3.11\r\n\r\n### Основные изменения:\r\n - Потоки обработки MQTT-очереди и HTTP(S)-запросов строго закреплены за ядром, не учавствующим в обработке LoRa-пакетов\r\n - Понижен приоритет потока обработки HTTP(S)-запросов, чтобы не мешать обработке MQTT-очереди\r\n \r\nДанные изменения призваны исключить любую возможность помешать обрабатывать LoRa-пакеты и, тем самым, избежать внесения каких-либо задержек в работу репитера от использования функциональности MQTT и веб-интерфейса. А работа MQTT получила приоритет над обслуживанием [веб-панели](https://vbart.github.io/MeshCoreTel-firmware/web-panel/) и [веб-API](https://vbart.github.io/MeshCoreTel-firmware/api/) запросов.\r\n\r\nСписок процессов с приоритетами и привязкой в версии `v1.0.1` и ранее:\r\n```\r\nTask                  Prio  Core\r\n----                  ----  ----\r\nloopTask                 1     1\r\nmqtt_task                5   ANY\r\nhttpd                    5   ANY\r\ntiT                     18     0\r\nwifi                    23     0\r\nesp_timer               22     0\r\nipc0                    24     0\r\nipc1                    24     1\r\nIDLE0                    0     0\r\nIDLE1                    0     1\r\n```\r\nВ текущей версии `v1.0.2`:\r\n```\r\nTask                  Prio  Core\r\n----                  ----  ----\r\nloopTask                 1     1\r\nmqtt_task                5     0\r\nhttpd                    2     0\r\ntiT                     18     0\r\nwifi                    23     0\r\nesp_timer               22     0\r\nipc0                    24     0\r\nipc1                    24     1\r\nIDLE0                    0     0\r\nIDLE1                    0     1\r\n```\r\n \r\n ### В составе релиза:\r\n - `*-merged.bin` - полная версия (рекомендуется при первой прошивке)\r\n - `*.bin` - только сам код приложения (настройки сохраняются)\r\n\r\nПрошивка также доступна в веб-прошивальщике от Мешкартеля:\r\n\r\n - <https://meshcoretel.ru/ru/flasher> - под заголовком _Прошивки наблюдателя от VBart_"
