name: MeshCore Wio Tracker L1 Pro
type: fork
maintainer: sosprz
description: >
  A companion firmware fork dedicated to the Seeed Wio Tracker L1 Pro, with T9 text input,
  on-screen keyboard, hardware keyboard support, RX log, repeater stats, and page navigation.
  Ships prebuilt UF2 files for easy flashing.
repository: https://github.com/sosprz/Meshcore-Wio-Tracker-L1-Pro
license: MIT
status: active
lifecycle: active
maturity: stable
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
features:
  - T9 text input
  - On-screen keyboard
  - Hardware keyboard support
  - RX log
  - Repeater stats
  - Page navigation
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: false
    wifiAp: false
  operations:
    ota: false
    webFlasher: false
  networking:
    repeater: false
    roomServer: false
    observer: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: false
    lowPowerRx: false
devices:
  # Source: repo README — dedicated firmware for Wio Tracker L1 Pro
  - id: wio-tracker-l1-pro
    status: supported