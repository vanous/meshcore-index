    prerelease: false
    notes: >-
      - **Full sound mute on startup/reset** - Saved `Sound: OFF` is now applied before the startup
      tone is requested, so rebooting or resetting does not produce audio while muted.
  - version: v1.15.79
    name: v1.15.79
