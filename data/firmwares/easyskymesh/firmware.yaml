name: EasySkyMesh
type: fork
maintainer: IoTThinks
description: >
  A power-saving oriented MeshCore firmware with experimental, advanced features and bug fixes aimed
  at ultra-low-power repeater and sensor deployments. Targets extended battery life (e.g. ~16µA
  power-off) with the intent of upstreaming improvements into MeshCore.
repository: https://github.com/IoTThinks/EasySkyMesh
website: https://iotthinks.com
license: MIT
status: active
lifecycle: active
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - repeater
  - sensor
features:
  - Ultra-low-power operation (~16µA power-off)
  - Sensor integration
  - Auto-reboot / watchdog
  - Long-range mesh messaging
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: false
    wifiAp: true
  operations:
    ota: true
    webFlasher: false
  networking:
    repeater: true
    roomServer: false
    observer: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: true
    lowPowerRx: true
devices:
  - id: heltec-v3
    status: supported
  # Source: alias of heltec-v3, same target heltec_v3; release assets confirm Heltec_WSL3
  - id: heltec-wsl3
    status: supported
  # Source: release notes power table + release assets Heltec_v4
  - id: heltec-v4
    status: supported
  # Source: alias of heltec-v4, same target heltec_v4
  - id: heltec-v4-exp
    status: supported
  # Source: release notes power table (Heltec T096)
  - id: heltec-t096
    status: supported
  - id: heltec-t114
    status: supported
  - id: rak-4631
    status: supported
  - id: uart-solar-node-station
    status: supported
  # Source: release notes power table (Xiao S3, C3)
  - id: xiao-esp32s3
    status: partial
    notes: Power-saving figures vary by board revision.
  # Source: release notes power table (Xiao C3)
  - id: xiao-esp32c3
    status: supported
  # Source: release notes power table (Xiao NRF52)
  - id: xiao-nrf52
    status: supported
