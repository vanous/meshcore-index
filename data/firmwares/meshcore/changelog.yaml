releases:
  - version: room-server-v1.16.0
    name: Room Server Firmware v1.16.0
    datetime: '2026-06-06T15:54:36Z'
    url: https://github.com/meshcore-dev/MeshCore/releases/tag/room-server-v1.16.0
    prerelease: false
    notes: >-
      ## Download


      Latest firmwares are in the [flasher.meshcore.io](https://flasher.meshcore.io/)


      ## Change Log


      ### New Features


      -   New CLI config var ‘flood.max.unscoped’
      [#2661](https://github.com/meshcore-dev/MeshCore/pull/2661)

      -   New CLI config var ‘flood.max.advert’
      [#2702](https://github.com/meshcore-dev/MeshCore/pull/2702)

      -   longer preamble now for lower SF. (32 for SF<=8, 16 for SF>8)
      [#1954](https://github.com/meshcore-dev/MeshCore/pull/1954)

      -   app/companion can now do anon\_req/response with non-contact nodes
      [#2672](https://github.com/meshcore-dev/MeshCore/pull/2672)

      -   companion auto-shutdown, disabled when on external power, new UI warning on display
      [#2663](https://github.com/meshcore-dev/MeshCore/pull/2663)

      -   new ‘region def …’ CLI command [#2540](https://github.com/meshcore-dev/MeshCore/pull/2540)

      -   extended ACK support [#2594](https://github.com/meshcore-dev/MeshCore/pull/2594)

      -   app/companion can now compose and send raw packets
      [#2543](https://github.com/meshcore-dev/MeshCore/pull/2543)

      -   companion can now override default scope to explicit unscoped
      [#2492](https://github.com/meshcore-dev/MeshCore/pull/2492)


      ### Enhancements


      -   All ESP repeaters, power saving improvements
      [#1687](https://github.com/meshcore-dev/MeshCore/pull/1687)

      -   nRF companions, power saving [#2286](https://github.com/meshcore-dev/MeshCore/pull/2286)


      ### New device support


      -   NEW: LilyGo T-Echo Card support
      [#2517](https://github.com/meshcore-dev/MeshCore/pull/2517)

      -   NEW: LilyGo T-Impulse Plus support
      [#2522](https://github.com/meshcore-dev/MeshCore/pull/2522)

      -   NEW: Station G3 support [#2515](https://github.com/meshcore-dev/MeshCore/pull/2515)

      -   NEW: Heltec Mesh Node T1 support
      [#2520](https://github.com/meshcore-dev/MeshCore/pull/2520)

      -   new Xiao S3 variants (repeater, companion, etc)
      [#2383](https://github.com/meshcore-dev/MeshCore/pull/2383)


      ### Bug fixes and Other


      -   RP2040 target build fixes. [#2684](https://github.com/meshcore-dev/MeshCore/pull/2684)

      -   companion protocol max frame size increase (now 176)
      [#2022](https://github.com/meshcore-dev/MeshCore/pull/2022)

      -   RAK Wismesh Tag fixes [#2664](https://github.com/meshcore-dev/MeshCore/pull/2664)

      -   Bug fix: repeater neighbor discovery fail when path.hash.mode != 0

      -   RAK4631, now using Bosch driver for BME680 sensor
      [#2634](https://github.com/meshcore-dev/MeshCore/pull/2634)

      -   enable radio.rxgain CLI command for LR1110 (T1000e)
      [#2235](https://github.com/meshcore-dev/MeshCore/pull/2235)

      -   default flood advert interval now 47 hours (was 12)
      [#2608](https://github.com/meshcore-dev/MeshCore/pull/2608)

      -   Client repeat (off-grid) EU freq change (from 869.0 to 869.495)
      [#2604](https://github.com/meshcore-dev/MeshCore/pull/2604)

      -   CLI validation on rxdelay, txdelay and direct.txdelay
      [#2443](https://github.com/meshcore-dev/MeshCore/pull/2443)

      -   Heltec T096, sensor node support
      [#2576](https://github.com/meshcore-dev/MeshCore/pull/2576)

      -   Heltec E290 USB companion fix [#2562](https://github.com/meshcore-dev/MeshCore/pull/2562)

      -   WiFi companion, reconnect logic redesigned for non-blocking
      [#2493](https://github.com/meshcore-dev/MeshCore/pull/2493)

      -   RAM usage reduced for older boards
      [#2497](https://github.com/meshcore-dev/MeshCore/pull/2497)

      -   nRF variants, CustomLFS lib upgrade to v2.2
      [#2519](https://github.com/meshcore-dev/MeshCore/pull/2519)

      -   T-Echo Lite, fixes to RXEN, TXEN and TCXO
      [#2511](https://github.com/meshcore-dev/MeshCore/pull/2511)

      -   KISS modem frame timeout fixes [#2490](https://github.com/meshcore-dev/MeshCore/pull/2490)

      -   sensor manager redesign [#2327](https://github.com/meshcore-dev/MeshCore/pull/2327)

      -   startup tune suppressed if sound pref off
      [#2460](https://github.com/meshcore-dev/MeshCore/pull/2460)

      -   added KISS Modem variants for most boards
      [#2620](https://github.com/meshcore-dev/MeshCore/pull/2620)
      [#2432](https://github.com/meshcore-dev/MeshCore/pull/2432)

      -   Adafruit nRF BLE fork, to prevent lockup during rapid connect/disconnect
      [#2430](https://github.com/meshcore-dev/MeshCore/pull/2430)

      -   RAK3401 companion, analog button support
      [#2436](https://github.com/meshcore-dev/MeshCore/pull/2436)

      -   Heltec boards, LNA disabled by default
      [#2439](https://github.com/meshcore-dev/MeshCore/pull/2439)

      -   new splash screens [#2424](https://github.com/meshcore-dev/MeshCore/pull/2424)

      -   Sensecap Solar Tx LED fix [#2157](https://github.com/meshcore-dev/MeshCore/pull/2157)

      -   new repeater variant: Heltec V4 expansion kit
      [#2326](https://github.com/meshcore-dev/MeshCore/pull/2326)

      -   new T-Echo Lite non-shell companion variants
      [#2503](https://github.com/meshcore-dev/MeshCore/pull/2503)
      [#2353](https://github.com/meshcore-dev/MeshCore/pull/2353)

      -   T-Echo Lite, battery measure fix
      [#2287](https://github.com/meshcore-dev/MeshCore/pull/2287)

      -   RAK4631, sx1262 reset pin fix [#2008](https://github.com/meshcore-dev/MeshCore/pull/2008)

      -   Heltec T096, Wireless Tracker: FEM/LNA enable by default
      [#2340](https://github.com/meshcore-dev/MeshCore/pull/2340)

      -   R1 Neo, shutdown fix [#2371](https://github.com/meshcore-dev/MeshCore/pull/2371)

      -   Heltec V4, set adc.multiplier support
      [#2335](https://github.com/meshcore-dev/MeshCore/pull/2335)


      ## Limiting Unscoped Traffic


      The new `flood.max.unscoped` CLI config variable is specifically for limiting unscoped flood
      traffic. Like `flood.max`, it drops unscoped flood packets which have already had a given
      number of hops. By default it is 64, which is essentially _off_.


      ## Limiting Advert Traffic


      The new `flood.max.advert` CLI config variable is specifically for limiting adverts. Like
      `flood.max`, it drops advert packets which have already had a given number of hops. By default
      it is **8**.


      ## New Preamble


      When using the lower Spreading Factors, the radio has less time to _lock onto_ an incoming
      packet, so this change gives the faster SF’s a longer preamble, and thus decreasing the chance
      of the preamble being missed. For SF <= 8, the preamble is now 32 symbols.


      ## Improved Region Discovery in Mobile App


      The new companion firmware, and latest app, will be able to do ad-hoc requests to near by
      repeaters _without_ having to add them to contacts first. This will streamline both repeater
      discovery, and region discovery.


      ## New `region def` Command


      Defining regions via the CLI is currently quite verbose, and the latest CLI handling
      introduces a new `region def...` command which has a short-hand notation for defining regions,
      especially ones which have deep nesting.


      See the [CLI Command Reference](https://docs.meshcore.io/cli_commands/) for more details.


      ## Extended ACK Support


      The latest firmwares introduce support for ‘extended ACKs’, which are 6 bytes instead of 4.
      The extra bytes contain an extended attempt number, and additional random byte. This is in
      preparation for a later app feature which will enable much more than 4 attempts for direct
      messages. For now, repeaters will have to be updated first.


      ## Companion Raw Packets


      The latest companion firmwares now enable apps to compose the _full_ packet, ie. headers, path
      and payload. This can correspond with the existing RxLog ability, so app can do its own raw
      send and receive of packets.
