name: MeshCore-Evo
type: fork
maintainer: mattzzw
description: >
  An improved repeater-focused fork of MeshCore that bundled pending upstream PRs and improvements
  for dense meshes — notably flood-advert traffic mitigation and enhanced `denyf *` handling.
  Largely superseded once official 1.16.0 added native flood traffic management.
repository: https://github.com/mattzzw/MeshCore-Evo
website: https://meshcore.io
license: MIT
status: maintenance
lifecycle: maintenance
maturity: beta
distribution: community
lineage:
  kind: fork
  upstreamFirmwareId: meshcore-official
  upstreamRepository: https://github.com/meshcore-dev/MeshCore
runtime:
  framework: arduino
  language: cpp
roles:
  - companion
  - repeater
  - room-server
features:
  - Flood-advert traffic mitigation
  - Enhanced denyf "*" handling
  - Tuned for dense repeater meshes
  - Tracks upstream MeshCore releases
capabilities:
  protocol:
    meshcoreCompatible: true
  transports:
    ble: true
    usbSerial: true
    nativeTcp: true
    wifiAp: true
  operations:
    ota: true
    webFlasher: false
  networking:
    repeater: true
    roomServer: true
    observer: false
    kissModem: false
  hardware:
    gps: true
    display: true
    sensors: true
    lowPowerRx: true
devices:
  - id: heltec-v3
    status: supported
  # Source: alias of heltec-v3, same target heltec_v3; release assets confirm Heltec_WSL3
  - id: heltec-wsl3
    status: supported
  - id: heltec-t114
    status: supported
  - id: rak-4631
    status: supported
  # Source: alias of rak-4631, same target rak4631
  - id: atlavox-m1
    status: supported
  # Source: alias of rak-4631, same target rak4631
  - id: atlavox-beacon
    status: supported
  # Source: alias of rak-4631, same target rak4631
  - id: rak-wismesh-repeater-mini
    status: supported
  # Source: alias of rak-4631, same target rak4631
  - id: yetiwurks-basestation
    status: supported
  - id: uart-solar-node-station
    status: supported
  - id: lilygo-t-beam-sx1262
    status: supported
  - id: xiao-esp32s3
    status: supported
  - id: station-g2
    status: partial
    notes: Builds available; less frequently tested than core repeater boards.
