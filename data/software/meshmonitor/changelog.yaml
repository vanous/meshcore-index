    notes: >-
      # MeshMonitor v4.8.2


      Patch release centered on **packet observability**. It adds a **Unified Packet Monitor** that
      aggregates packet activity across every connected source, plus a dedicated **MeshCore Packet
      Monitor** (OTA capture via `LogRxData`) with click-to-open packet decoding and support for
      MeshCore hashtag (`#`) channels. Telemetry gets unit auto-scaling for current/power and
      humanized uptime, the dashboard map gains rich per-source/per-protocol node popups and a
      persisted Show Waypoints toggle, and the traceroute history limit is now configurable. It also
      ships a batch of stability and rendering fixes — orphaned-transport teardown on reconnect,
      correct epoch handling for `rxTime=0`, real temperature value conversion, additive map
      visibility toggles, and reachable MeshCore mobile tabs.


      ## Features


      ### Packet Monitoring

      - **Unified Packet Monitor across all sources** (#3252) — cross-source packet monitor
      aggregating activity from every connected source into one view, with distribution and type
      breakdown.

      - **MeshCore Packet Monitor via LogRxData** (#3268) — opt-in capture of MeshCore OTA packets
      through the `LogRxData` stream, persisted to `meshcore_packet_log`, with its own monitor view.

      - **Decode packet contents in a click-to-open modal** (#3273) — click any captured MeshCore
      packet to open a modal that decodes its contents.


      ### MeshCore

      - **Hashtag channel support** (#3277) — recognize and handle MeshCore hashtag (`#`) channels.

      - **Dashboard neighbor links, saved-password neighbor queries, on-demand remote console**
      (#3259).


      ### Telemetry

      - **Auto-scale current/power units and humanize uptime** (#3261).

      - **Clickable source jump buttons on Unified Telemetry** (#3262) — sticky header with pills
      that smooth-scroll to each source's card grid and highlight the active section.

      - **Configurable traceroute history limit** (#3258).


      ### Map

      - **Rich dashboard map node popup** with per-source/per-protocol breakdown (#3256).

      - **Persisted Show Waypoints visibility toggle** (#3253) — alongside the existing Show RF /
      UDP / MQTT / Traceroute toggles.


      ## Bug Fixes

      - **Tear down orphaned transport on reconnect** (#3270) — fixes a per-source TCP
      disconnect/reconnect cycle.

      - **Include MeshCore OTA packets in Unified Packet Monitor** (#3274).

      - **Stop rxTime=0 from rendering messages at Unix epoch (Dec 1969)** (#3263).

      - **Convert temperature values, not just unit labels** (#3260).

      - **Make RF/UDP/MQTT visibility toggles additive per node** (#3257).

      - **Make all MeshCore mobile bottom-bar tabs reachable** (#3254).


      ## Documentation

      - **Physical LoRa hardware compose example** for meshtasticd (#3267).


      ## Issues Resolved

      - #3277 Hashtag channels not supported in MeshCore

      - #3270 v4 source-manager TCP flap: per-source disconnect/reconnect cycle

      - #3268 MeshCore Packet Monitor via LogRxData

      - #3262 Unified Telemetry navigation buttons

      - #3261 MeshCore telemetry

      - #3253 Waypoints visibility control

      - #3252 Unified packet monitor view


      ## New Contributors

      - 🎉 @wilhel1812 made their first contribution in #3258


