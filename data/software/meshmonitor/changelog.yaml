      protocols, the map picks up a per-node **Hide from Map** toggle, and Node Details gets a
      15m–7d telemetry time-range selector. This release also wires up newer AirQualityMetrics
      fields and lands a broad set of correctness fixes — most notably a replay guard that stops
      powered-off nodes from appearing "recently heard" via replayed/retained MQTT frames, a
      NodeInfo position-precision guard, RE2 hardening of user-supplied regexes, and per-source
      scoping fixes for traceroute history and neighbor-info display. Under the hood, `server.ts`
      was substantially decomposed into focused route modules and the test suite migrated onto a
      shared `createTestDb` helper. Upgrading is drop-in — no manual migration or configuration
      changes required.


