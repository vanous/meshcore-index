    notes: >-
      # MeshMonitor v4.10.1


      This release is headlined by **Automated Remote Favorites Management** — a new section on a
      node's Remote Admin page that keeps the favorites list current on remote infrastructure nodes,
      preserving Meshtastic's zero-hop cost between favorited routers as your mesh changes.
      MeshMonitor discovers a target's direct neighbors from its NeighborInfo broadcasts and/or from
      traceroutes that pass through it, filters them to configurable infrastructure roles, and sends
      `set-favorite` admin commands on a schedule. Favorite commands are no longer blind:
      MeshMonitor captures the firmware's routing ACK and surfaces the result (confirmed / no-ack /
      rejected) on both the automatic ledger and the manual Set/Remove Favorite buttons, and the
      re-favorite pass prioritizes un-confirmed assignments to recover any that didn't stick. A
      configurable Maximum neighbor age reuses recent on-file NeighborInfo instead of re-requesting
      it, saving airtime. Also in this release: a global toggle to disable link previews,
      per-channel notification sounds, guided firmware half-flash recovery, and several MeshCore and
      UI fixes.


      ## Features


      - **Automated Remote Favorites Management for infrastructure nodes** (#3420, #3424, #3426) —
      discovery via NeighborInfo + traceroutes, role filtering, routing-ACK confirmation, and
      on-file neighbor reuse. Closes #2608.

      - **Global toggle to disable link previews** (#3418) — a Settings → Link Previews toggle plus
      a `LINK_PREVIEWS_ENABLED=false` env override, enforced across all message surfaces
      (Meshtastic, MQTT, MeshCore). Closes #3416.

      - **Guided firmware half-flash recovery** (#3415) — a guided flow to clear a half-flashed flag
      from a failed firmware upgrade, with an online check first. Closes #3413.

      - **Per-channel notification sounds** (#3412) — selectable per-channel "new message" tones
      from a bundled set of original, runtime-synthesized sounds (plus Silent and Preview), scoped
      per source. Thanks @rancur!


      ## Bug Fixes


      - **DM notification sound row + per-source channel-sound scoping** (#3414)

      - **MeshCore: decode packed `out_path_len`** to fix the hop count for 2-byte path hashes
      (#3422, closes #3421)

      - **MeshCore: persist `batteryMv`** to `meshcore_nodes` after a telemetry poll (#3419)

      - **Auto-favorite checkboxes** now sit beside their labels instead of stacked (#3423)


      ## Other


      - Translations update from Hosted Weblate (#3340)


      ## Issues Resolved


      - #2608 — Automated Remote Favorites Management for Infrastructure Nodes

      - #3413 — Button to remove half-flashed flag from a failed firmware upgrade

      - #3416 — Disable link preview

      - #3421 — Correct PATH readout


      ## Upgrade


      ```bash

      # Docker

      docker pull ghcr.io/yeraze/meshmonitor:4.10.1

      docker compose down && docker compose up -d


      # Helm

      helm repo update

      helm upgrade meshmonitor meshmonitor/meshmonitor --version 4.10.1

      ```


      No breaking changes. The database migrations (084–086) that back Automated Remote Favorites
      Management run automatically on first boot.


      **Full Changelog:** https://github.com/Yeraze/meshmonitor/compare/v4.10.0...v4.10.1


