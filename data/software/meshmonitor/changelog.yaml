      ### Added

      - **MeshCore Virtual Node: configure the physical node from a companion app** — Config/admin
      commands sent from a companion app connected to a MeshCore Virtual Node are now forwarded to
      the real node (gated on the source's **Allow admin commands** setting), instead of being
      silently dropped with an `unhandled frame: code=142`. Covers node rename, radio params, TX
      power, advertised position, channel setup, and the "other params" bundle (telemetry-visibility
      modes, advert location policy, manual-add-contacts). When the flag is off, the app now
      receives an explicit rejection rather than a hang. Also adds the previously-missing **Allow
      admin commands** checkbox to the MeshCore Edit Source dialog (it was absent and hardcoded off,
      so the setting could never be enabled from the web UI). (#3904, #3905, #3906, #3907, #3910)

      - **Map: fade node markers by age instead of a hard cutoff** — On both the Dashboard map and
      Map Analysis, node markers now fade smoothly toward transparent as they age instead of popping
