      Patch release: bug fixes across automation, configuration, favorites, MeshCore, telemetry, and
      messaging.


      ## Bug Fixes

      - **Timed Events fired across all sources (#3479)** — timer-trigger result writes are now
      source-scoped, so a timed event only runs on the source it was configured for.

      - **Saving Traffic Management / Status Message config failed (#3464)** — the generic
      module-config save route now accepts both module types (previously rejected with "Invalid
      module type").

      - **Auto Favorites wrongly reported firmware as unsupported (#3482)** — the firmware-support
      cache is keyed by version and no longer sticks on "unsupported" after a reconnect.

      - **MeshCore Share Contact failed silently (#3481)** — the real failure reason now reaches the
      user, with a faster 10s timeout instead of a silent ~30s hang.

      - **Delivered icon missing on own replies in Firefox on Android (#3477)** — CSS flex-sizing
      fix; desktop was unaffected.

      - **Air-quality particle counts never collected or graphed (#3483)** — underscore-before-digit
      protobuf fields are now read in their snake_case form, so all six particle bins are stored and
      graphed.


      Full details in the [changelog](https://github.com/Yeraze/meshmonitor/blob/main/CHANGELOG.md).


