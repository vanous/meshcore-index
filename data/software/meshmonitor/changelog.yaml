      # MeshMonitor v4.12.0


      A large feature release headlined by two new capabilities: a node/builder-based **Automation
      Engine** ("when this happens, do that" — triggers → conditions → actions, with variables, `{{
      }}` token substitution, geofence/schedule/system triggers, an "Apprise notify"/"Run a script"
      action set, and an in-app dry-run tester), and **MeshCore Regions/Scopes** (per-channel and
      per-source scope tagging, a Discover Regions sweep, per-message scope overrides, a
      saved-regions catalog, and received-message scope display). It also lands a deep round of
      multi-source correctness work — channel/backup/permission queries are now consistently scoped
      by `sourceId` (closing a cross-source permission leak), the unified message feed no longer
      drops messages, and MQTT channels are identified by name **and** key. Position history was
      substantially fixed: every fix now renders with full backward pagination, hover/click tooltips
      with hop count and direct-heard SNR work, and `ground_speed` is correctly treated as km/h (it
      was being inflated ~3.6×). MeshCore gains channel unread indicators, a "heard repeaters"
      badge, per-message hop/route lines, a live byte-accurate character counter, on-demand
      telemetry polling, and a manual Define-Path editor with 1/2/3-byte hash widths. Other
      highlights: customizable login branding via env vars, Null-Island position filtering, richer
      Map-Analysis node popups, git-native LXC templates with in-place updates, and a hardened
      PostgreSQL `channel_database` rebuild path. The documentation site was brought current with
      all of the above, including a new Automation Engine page. This release supersedes the
      4.12.0-rc1/rc2 pre-releases.


