      # MeshMonitor v4.10.1


      This release is headlined by **Automated Remote Favorites Management** — a new section on a
      node's Remote Admin page that keeps the favorites list current on remote infrastructure nodes,
      preserving Meshtastic's zero-hop cost between favorited routers as your mesh changes.
      MeshMonitor discovers a target's direct neighbors from its NeighborInfo broadcasts and/or from
      traceroutes that pass through it, filters them to configurable infrastructure roles, and sends
      `set-favorite` admin commands on a schedule. Favorite commands are no longer blind:
      MeshMonitor captures the firmware's routing ACK and surfaces the result (confirmed / no-ack /
      rejected) on both the automatic ledger and the manual Set/Remove Favorite buttons, and the
      re-favorite pass prioritizes un-confirmed assignments to recover any that didn't stick. A
      configurable Maximum neighbor age reuses recent on-file NeighborInfo instead of re-requesting
      it, saving airtime. Also in this release: a global toggle to disable link previews,
      per-channel notification sounds, guided firmware half-flash recovery, and several MeshCore and
      UI fixes.


