    notes: >-
      ## Hotfix for 4.11.1 startup crash (PostgreSQL / MySQL)


      4.11.1 fails to boot on PostgreSQL/MySQL backends that have an existing Auto-Acknowledge
      configuration. Migration 093 (the Auto-Acknowledge 2×2 matrix backfill) inserted `settings`
      rows without the table's NOT NULL `createdAt`/`updatedAt` columns, aborting database
      initialization with `null value in column "createdAt" … violates not-null constraint` — a
      restart loop. On SQLite the violation was silently swallowed, so the matrix settings were
      never written.


      ### Fixed

      - Migration 093 now supplies `createdAt`/`updatedAt` in all three backends (SQLite /
      PostgreSQL / MySQL). A regression test runs the migration against a real settings table.


      ### Recovery

      Affected instances recover automatically on upgrade to 4.11.2 — migration 093 was never marked
      complete (it threw before committing), so it re-runs and now succeeds, correctly migrating
      your auto-ack settings. No manual database changes are required.


      **Full changelog:** see CHANGELOG.md → [4.11.2].

