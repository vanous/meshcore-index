    notes: >-
      MeshMonitor 4.11.0 is the general-availability release of the 4.11 line (consolidating
      `v4.11.0-rc1` and `v4.11.0-rc2`). The headline is the **MeshCore virtual node** — connect the
      MeshCore mobile app to a MeshMonitor-managed MeshCore device over WiFi, the MeshCore
      counterpart to the existing Meshtastic Virtual Node Server. MeshCore also gains name-aware
      contact forwarding-path editing, role-based map icons, and a node-type map filter. Across both
      protocols, the map picks up a per-node **Hide from Map** toggle, and Node Details gets a
      15m–7d telemetry time-range selector. This release also wires up newer AirQualityMetrics
      fields and lands a broad set of correctness fixes — most notably a replay guard that stops
      powered-off nodes from appearing "recently heard" via replayed/retained MQTT frames, a
      NodeInfo position-precision guard, RE2 hardening of user-supplied regexes, and per-source
      scoping fixes for traceroute history and neighbor-info display. Under the hood, `server.ts`
      was substantially decomposed into focused route modules and the test suite migrated onto a
      shared `createTestDb` helper. Upgrading is drop-in — no manual migration or configuration
      changes required.


      ## ✨ Features


      - **MeshCore virtual node — connect the MeshCore app over WiFi** (#3540, #3535) — expose a
      managed MeshCore device as a virtual node the MeshCore app connects to over TCP/WiFi (default
      port `5000`, per-source enablement, admin commands blocked by default, private-key export
      always blocked).

      - **MeshCore: define a contact's forwarding path by repeater name** (#3550) — first-class,
      name-aware path editor, on by default.

      - **MeshCore node-type icons + map filtering** (#3563, #3546) — role-based markers (repeater /
      room server / sensor / companion) and a Node Types filter with legend.

      - **Per-node "Hide from Map" toggle** (#3565, #3549) — suppress a node's map marker everywhere
      while keeping it visible in lists, DMs, and the packet monitor.

      - **Node list export — CSV / HTML** (#3537, #3499) — export the Nodes view (respecting current
      filters/sort) for mesh upgrade planning.

      - **Telemetry time-range selector in Node Details** (#3530) — 15m–7d range buttons on the Node
      Details graphs, persisted and shared with Device Info.

      - **Position-history map: a marker at every fix, points-only mode, hover tooltip** (#3495,
      #3492).

      - **Newer AirQualityMetrics fields wired up** (#3517, #3507) — `particles_40um`,
      `pm40_standard`, formaldehyde trio, and PM-sensor extras now graphed.

      - **Native OIDC group → role mapping** (#3489, #3485) — map IdP groups to admin/login via
      `OIDC_GROUPS_CLAIM` / `OIDC_ADMIN_GROUPS` / `OIDC_ALLOWED_GROUPS`.

      - **UI tweaks + map unification pass** (#3561, #3557) — "Messages" → "Node Details" nav,
      clickable map-popup source rows, unified tile/legend/GeoJSON toggles, and more.


      ## 🐛 Bug Fixes


      - **Offline nodes kept appearing "recently heard" from replayed packets** (#3569) — new replay
      guard ignores stale `lastHeard` refreshes from retained/replayed MQTT frames.

      - **NodeInfo could overwrite high-precision positions with lower-precision ones** (#3516,
      #3513) — precision-downgrade guard added.

      - **User-supplied regexes hardened against ReDoS** (#3544) — all user/admin regexes now
      compiled with RE2 (resolves 4 CodeQL alerts).

      - **Traceroute History mixed in rows from every source** (#3566) — history now scoped to the
      active source.

      - **Map "Show Neighbor Info" disagreed with the Map Analysis Neighbors view** (#3560) —
      freshness filters aligned.

      - **Per-node position override ignored on the multi-source dashboard map** (#3559, #3551).

      - **SaveBar only saved the active section** (#3558, #3552) — grouped sections now save
      together via "Save All".

      - **MeshCore DM contact list nearly empty while node/map view was full** (#3554) — in-memory
      contacts seeded from the durable DB rows on connect.

