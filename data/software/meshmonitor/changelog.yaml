      ### Fixed

      - **MeshCore: local companion node showed blank battery** — `getAllNodes()` pushed the live
      in-memory `get_self_info` node (which has no battery field) over the DB-persisted row instead
      of merging onto it, so the Node Info panel and dashboard saw the companion's own
      `batteryMv`/`uptimeSecs` as blank even though the telemetry poller was persisting them. The
      persisted row is now merged as a base, and the poller stamps `isLocalNode: true` so the flag
      reflects reality. Adds low-battery diagnostics. (#3884, #3896)

      - **MeshCore: "Notify on Low Battery" never fired for Apprise-only / companion setups** —
      Closes two concrete gaps found by tracing the low-battery scan-and-deliver pipeline
      end-to-end, including making companion battery persistence observable and covering the
      Apprise-only delivery path. (#3884, #3899)

      - **Auto-delete-by-distance was not truly per-source** — Only meshtastic_tcp sources ran a
      per-source scheduler; mqtt_broker, mqtt_bridge, and meshcore fell through to a global
      singleton that scanned nodes across all sources with the global threshold/home coordinate.
      Auto-delete-by-distance is now genuinely per-source for every source type. (#3901, #3902)

