      - **MeshCore neighbor query crashed on PostgreSQL/MySQL** (#3602) —
      `meshcore_neighbor_info.timestamp` / `.createdAt` were 32-bit `INTEGER`/`INT` but store
      millisecond-epoch values that overflow int32; widened to `BIGINT` (migration 096).

      - **`downlinkEnabled`/`uplinkEnabled: false` reverted to true after restart** (#3598) — proto3
      elides boolean `false`, and a `?? true` fallback re-inflated user-disabled channel flags on
      device reconnect; both now default to `false`.

      - **Position history dropped SNR for directly-heard (0-hop) nodes** (#3593) — SNR is now
      captured per-fix and shown in the tooltip; the same 0 dB-drop guard was fixed on the central
