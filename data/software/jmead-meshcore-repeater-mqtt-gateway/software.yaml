# Source: https://github.com/jmead/Meshcore-Repeater-MQTT-Gateway (verified 2026-07-03)
name: MeshCore MQTT Gateway
kind: gateway
status: active
maturity: beta
description: >-
  Gateway firmware that bridges MeshCore LoRa mesh networks with MQTT brokers,
  enabling bidirectional message flow between LoRa devices and MQTT-based
  applications. Runs as a full MeshCore repeater with WiFi connectivity,
  serial configuration menu, persistent NVS storage, real-time statistics,
  remote MQTT commands, NTP clock sync, and TLS support. Targets ESP32 +
  LilyGo LoRa32 V2.1 hardware.

