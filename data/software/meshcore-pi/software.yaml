name: meshcore-pi
kind: library
status: active
maturity: experimental
description: >-
  Python implementation of the MeshCore protocol intended for Raspberry Pi and
  other Linux devices. Supports SX1262 interfaces via SPI (Waveshare LoRa HAT,
  HT-RA62) and ESP-NOW communication via WiFi monitor mode. Can act as
  companion, room server, or repeater simultaneously, and bridge between LoRa
  and ESP-NOW meshes with multiple interfaces.

