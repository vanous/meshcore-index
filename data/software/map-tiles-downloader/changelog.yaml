  - version: v1.3.6
    name: v1.3.6
    datetime: '2026-05-11T14:03:18Z'
    url: https://github.com/tekk/map-tiles-downloader/releases/tag/v1.3.6
    prerelease: false
    notes: >-
      Bug fix release: force UTF-8 stdio so `mt-downloader list regions` and other commands work on
      Windows consoles (which default to cp1252 and could not encode non-ASCII region names like
      *Łódź* or *Kočovce*).
  - version: v1.3.5
    name: v1.3.5
    datetime: '2026-05-11T11:42:28Z'
    url: https://github.com/tekk/map-tiles-downloader/releases/tag/v1.3.5
    prerelease: false
    notes: >-
      Patch release. Documentation: README now describes the region-name behavior introduced in
      v1.3.4.
  - version: v1.3.4
    name: v1.3.4
    datetime: '2026-05-11T11:03:48Z'
    url: https://github.com/tekk/map-tiles-downloader/releases/tag/v1.3.4
    prerelease: false
    notes: >-
      Show human-readable region names in country menus.


      Resolves admin1 codes to real names where possible:

      - US states via geonamescache's get_us_states()

      - Other countries: each admin1 is labeled with its most populous city (e.g. "08 (around
      Toronto)"), making the geonames adm1 numbers identifiable.


      Fixes #3.
