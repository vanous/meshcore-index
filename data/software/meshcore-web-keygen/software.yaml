name: MeshCore Web Key Generator
short_name: Web Keygen
kind: utility
status: active
maturity: stable
description: >-
  Browser-only Ed25519 key generator for creating MeshCore identities with
  custom hexadecimal public-key prefixes, helping operators avoid short-prefix
  collisions without sending private keys to a server.

maintainers:
  - name: agessaman
    url: https://github.com/agessaman

repository: https://github.com/agessaman/meshcore-web-keygen
website: https://agessaman.github.io/meshcore-web-keygen/
license_type: source-available

languages:
  - javascript
  - rust

latest_version: v0.4
released: 2025-12-27

platforms:
  - web
interfaces:
  - web
capabilities:
  - key-management

install:
  - type: web
    url: https://agessaman.github.io/meshcore-web-keygen/
  - type: source
    url: https://github.com/agessaman/meshcore-web-keygen

popularity:
