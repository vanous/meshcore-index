# Source: https://github.com/Brent-A/mcsim (verified 2026-07-03)
name: MCSim
kind: utility
status: active
maturity: experimental
description: >-
  Deterministic simulation framework for MeshCore LoRa mesh networking firmware.
  Enables testing and analysis of mesh network behavior, radio propagation, and
  protocol performance. Simulates repeaters, companions, and room servers with
  real-time visualization via Rerun, configurable topologies via YAML, terrain-aware
  radio propagation using the NTIA Irregular Terrain Model, and full packet export
  to JSON with decoded MeshCore packet structure.

