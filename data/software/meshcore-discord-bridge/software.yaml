name: MeshCore Discord Bridge
kind: bot
status: active
maturity: beta
description: >-
  Bidirectional Node.js bridge between MeshCore channels and Discord, with
  multi-channel and multi-server routing, message chunking, flood protection,
  paced send queues and administrator pause controls.

maintainers:
  - name: Hude06
    url: https://github.com/Hude06

repository: https://github.com/Hude06/MeshCoreDiscordBridge
license_type: source-available

languages:
  - javascript

latest_version: v1.2
released: 2026-02-23

platforms:
  - linux
  - macos
  - windows
interfaces:
  - cli
  - headless
connections:
  - serial
  - usb
  - http
  - websocket
node_roles:
  - companion
capabilities:
  - messaging
  - channels
  - automation
  - notifications
  - bridging

install:
  - type: source
    url: https://github.com/Hude06/MeshCoreDiscordBridge
    command: npm install && pm2 start main.js --name mesh-bridge

