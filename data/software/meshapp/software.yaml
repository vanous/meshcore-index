name: MeshApp
kind: client
status: active
maturity: beta
description: >-
  Java/JavaFX desktop client for Meshtastic and MeshCore devices. Supports
  parallel TCP, USB/serial and BLE connections; chat, node list with filters and
  map, telemetry history and charts, LoRa packet inspector, Lua scripting,
  device settings, and offline map tile downloads.

