# Source: https://github.com/agessaman/meshcore-packet-capture (verified 2026-07-03)
name: MeshCore Packet Capture
kind: monitoring
status: active
maturity: stable
description: >-
  Standalone Python script for capturing and analyzing packets from MeshCore
  companion radios. Connects via BLE, serial or TCP and outputs structured
  data to console, file and MQTT broker. Designed for companion radios only;
  for repeaters and room servers use meshcoretomqtt instead.

maintainers:
  - name: agessaman
    url: https://github.com/agessaman

repository: https://github.com/agessaman/meshcore-packet-capture
license: MIT

languages:
  - python

latest_version: v2.0.0
released: 2026-06-22

platforms:
  - linux
  - macos
  - windows

interfaces:
  - cli

connections:
  - ble
  - serial
  - tcp
  - mqtt

node_roles:
  - companion

capabilities:
  - monitoring
  - packet-analysis
  - telemetry

install:
  - type: pypi
    package: meshcore-packet-capture
    url: https://pypi.org/project/meshcore-packet-capture/
    command: pipx install meshcore-packet-capture
  - type: source
    url: https://github.com/agessaman/meshcore-packet-capture

