name: MeshForge
kind: utility
status: active
maturity: beta
description: >-
  Cloud-based firmware builder and web flasher for LoRa mesh devices. Compiles
  PlatformIO projects in the cloud and flashes them directly from the browser —
  no local toolchain needed. Supports any GitHub project URL by swapping
  github.com for meshforge.org. Includes community extensions, shareable build
  profiles, and build caching for faster repeated compilations.

