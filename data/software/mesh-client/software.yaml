name: mesh-client
kind: client
status: active
maturity: stable
description: >-
  Cross-platform Electron desktop client for Meshtastic, MeshCore and Reticulum
  (LXMF) on macOS, Linux and Windows. Supports BLE, USB serial, Wi-Fi/TCP and
  MQTT; keeps local SQLite history, routing diagnostics, 16-language UI, TAK CoT
  gateway, PKI remote admin, mapping, telemetry and automated CI releases.

