    name: 5.15.0
    datetime: '2026-05-10T00:53:50Z'
    url: https://github.com/Colorado-Mesh/mesh-client/releases/tag/v5.15.0
    prerelease: false
    notes: "## Summary\r\n  This release includes significant improvements to internationalization (i18n), MQTT reliability, Meshtastic device connectivity, and a variety of UI/UX enhancements and bug fixes.\r\n\r\n##  🚀 New Features   \r\n                                                                                                                                                                                                                \r\n- i18n & Global Support: Completed the initial rollout for internationalization, including the translation framework and updated issue templates.\r\n- Chat UX Improvements: Enhanced the chat interface for a smoother messaging experience and display hops if we know them.                                                                                                                                      \r\n-  MQTT Mirroring: Added support for MQTT mirroring to improve data redundancy and feed management.\r\n- Internal Diagnostics: Introduced new diagnostic tools and expanded test coverage across the application.\r\n\r\n##  🐞 Bug Fixes   \r\n                                                                                                                                                                                                               \r\n- MeshCore & Console Logging: Fixed contact threshold issues and implemented disk-safe console logging to prevent performance bottlenecks.\r\n- Meshtastic Serial/Web Streams: Improved error handling for serial and Web Streams connections before the MeshDevice is fully initialized.\r\n- MQTT Reliability:\r\n  - Fixed UX issues during MQTT reconnection.                                                                                                                                                                             \r\n  - Improved LetsMesh identity handling within MeshCore.\r\n  - Configuration & Awaits: Corrected await logic in Meshtastic configuration to ensure settings are applied reliably.\r\n- Documentation & Templates:\r\n   - Updated MeshCore MQTT identity documentation.\r\n   - Updated GitHub issue templates for better clarity.\r\n\r\n##  🛠️ Maintenance & Chores\r\n\r\n- Dependency version bumps\r\n\r\n\r\n**Full Changelog**: https://github.com/Colorado-Mesh/mesh-client/compare/v5.14.2...v5.15.0"
  - version: v5.14.2
    name: 5.14.2
    datetime: '2026-05-04T13:37:53Z'
    url: https://github.com/Colorado-Mesh/mesh-client/releases/tag/v5.14.2
    prerelease: false
    notes: "This release includes critical fixes for database schema upgrades and map visualization improvements.\r\n\r\n  Bug Fixes\r\n\r\n   - Map: Hidden MeshCore contact pins (Chat, Repeater, Room, Sensor) on the Meshtastic map view to prevent duplicate/cluttered node markers in dual-stack environments.\r\n   - Database: Resolved a schema upgrade failure where duplicate reaction rows would prevent the creation of the idx_reaction_dedup unique index. The upgrade process now automatically dedupes existing reaction records\r\n     before applying the index.\r\n\r\n  Performance & Stability\r\n\r\n   - Schema Upgrades: Added structural deduplication for message reactions to ensure smooth transitions for users with existing duplicate data.\r\n\r\n  Chore\r\n\r\n   - Updated dependencies.\r\n\r\n**Full Changelog**: https://github.com/Colorado-Mesh/mesh-client/compare/v5.14.1...v5.14.2"
  - version: v5.14.1
    name: 5.14.1
    datetime: '2026-05-03T23:27:38Z'
    url: https://github.com/Colorado-Mesh/mesh-client/releases/tag/v5.14.1
    prerelease: false
    notes: "This update focuses on core stability, database performance, and refined connectivity handling for both Meshtastic and MeshCore protocols.\r\n\r\n  🚀 Features\r\n\r\n   * Declarative Database Schema Sync: Replaced the linear migration ladder with a robust, declarative schema sync system. This ensures structural integrity and simplifies future upgrades. (#388)\r\n   * Message Retention Caps: Introduced configurable SQLite message retention limits (default: 4000 messages) with automatic startup pruning to prevent database bloat and maintain performance. (#387)\r\n   * BLE MTU-Aware Writes: Enhanced Noble (BLE) integration with MTU-aware chunking, improving reliability across different operating systems (especially macOS) and hardware quirks.\r\n   * Read-Only Database Export: Improved the \"Export Database\" feature to use a read-only snapshot (VACUUM INTO), avoiding potential locking conflicts with active transactions. (#391)\r\n   * Proactive Node Identity: (Meshtastic) The client now proactively requests NODEINFO for nodes that send messages without a known identity, reducing \"Unnamed\" rows in the node list.\r\n   * Hybrid RF+MQTT Icons: Node lists and detail panels now feature hybrid icons to clearly distinguish nodes reachable via both RF and MQTT.\r\n   * Windows Long Path Support: Embedded a longPathAware manifest in the packaged Windows executable to improve handling of deep file paths.\r\n\r\n  🛠 Fixes\r\n\r\n   * MeshCore Hop Count Preservation: Fixed an issue where hop counts were lost or reset to zero during RF disconnects or first-connect sequences.\r\n   * MQTT Hardening: Improved ingestion logic to strip null padding and filter \"junk\" traffic from global brokers, significantly reducing log noise and parse failures.\r\n   * macOS Update Flow: Fixed the unresponsive \"Download\" button in the update footer on macOS; it now correctly opens the GitHub release page.\r\n   * Dual-Protocol GPS Fixes: Resolved conflicts in GPS and Map refresh logic when switching between Meshtastic and MeshCore protocols.\r\n   * MeshCore Altitude Support: Now correctly parses and displays altitude from Cayenne LPP telemetry payloads.\r\n   * Name Sanitization: Strips null padding and control characters from MeshCore manufacturer strings.\r\n\r\n  🎨 UI & UX Improvements\r\n\r\n   * Collapsible Danger Zone: The \"Destructive Actions\" section in the App Panel is now collapsible to prevent accidental clicks.\r\n   * Enhanced Signal Pulse: Updated the radar pulse animation with inclusive one-liners and protocol-aware colors (Meshtastic green / MeshCore cyan).\r\n   * Footer Refresh: Added a new tagline footer with direct links to the community Discord, GitHub, and Website.\r\n   * FAB Positioning: Repositioned the \"Back to top\" button to avoid overlapping with UI elements.\r\n   * Log Analyzer Expansion: Added new categories for database errors, TAK server issues, and protocol-specific events.\r\n\r\n  📚 Documentation\r\n\r\n   * README & A11y: Comprehensive updates to the technical stack, keyboard shortcuts, and accessibility checklist.\r\n   * Troubleshooting: Expanded guides for BLE MTU interpretation and Windows path limitations.\r\n   * MeshCore Parity: Updated the MeshCore vs. Meshtastic parity matrix.\r\n\r\n\r\n**Full Changelog**: https://github.com/Colorado-Mesh/mesh-client/compare/v5.14.0...v5.14.1"
  - version: v5.14.0
    name: 5.14.0
    datetime: '2026-05-01T00:13:45Z'
    url: https://github.com/Colorado-Mesh/mesh-client/releases/tag/v5.14.0
    prerelease: false
    notes: "## Features\r\n- Add Windows taskbar grouping and window state persistence\r\n- Tapback reactions use showEmojiPanel() on macOS/Windows and emoji-picker-element on Linux\r\n- Replace hardcoded emoji picker with native panel on macOS/Windows and emoji-picker-element on Linux\r\n\r\n## Bug Fixes\r\n- Label self-transmitted TELEMETRY_APP packets as LOCAL in sniffer and stats\r\n- Focus text input on mousedown so showEmojiPanel() sees a settled first responder on click\r\n- Defer showEmojiPanel() by one rAF so focus settles before the OS panel opens\r\n- Preserve foreign LoRa RF rows when refreshing telemetry diagnostics\r\n- Meshtastic tapbacks, packet_id migration, and reaction sanitization\r\n- Normalize large uint32 node IDs to unsigned in MQTT and DB paths\r\n- Suppress repeated ServiceEnvelope decode failures\r\n- Add timestamps to console output in main process\r\n- Harden emoji handling against invalid codepoints and log spam\r\n- Harden log-service for CodeQL log-injection and http-to-file-access\r\n- Sanitize main-process console echo for CodeQL log injection\r\n\r\n## CodeQL Fixes\r\n- Align CodeQL disk barriers and add http-to-file suppressions\r\n- Console newline barriers + loadable MaD pack semver\r\n- Embed MaD barriers for log sanitizers + layout check\r\n- Satisfy CodeQL log-injection on console echo and debug paths\r\n\r\n## Maintenance\r\n- Update readme to outline running locally\r\n- Bump dependencies \r\n\r\n\r\n**Full Changelog**: https://github.com/Colorado-Mesh/mesh-client/compare/v5.13.0...v5.14.0"
  - version: v5.13.0
    name: 5.13.0
    datetime: '2026-04-28T21:38:29Z'
    url: https://github.com/Colorado-Mesh/mesh-client/releases/tag/v5.13.0
    prerelease: false
    notes: "Features\r\n   * Diagnostics: Added noisy node detection to the diagnostics panel.\r\n   * Telemetry: Clarified Meshtastic telemetry mesh interval versus local client refresh.\r\n   * Diagnostics: Track portnum from MQTT position updates for enhanced diagnostics.\r\n\r\nFixes\r\n   * Diagnostics: Baseline connected-node RF counters after diagnostics clear.\r\n   * Diagnostics: Add POSITION_APP to detect noisy node threshold branches.\r\n   * Diagnostics: Wired processNodeUpdate into onPositionPacket and onTelemetryPacket.\r\n   * Diagnostics: Improved noisy node detection for position requests via MQTT.\r\n   * UI/UX: Stabilized config apply UX and fixed position hydration.\r\n   * Updater: Fixed periodic update checks and ensured the amber badge indicator for available updates functions correctly.\r\n\r\nChores\r\n   * Bump dependencies\r\n\r\n\r\n**Full Changelog**: https://github.com/Colorado-Mesh/mesh-client/compare/v5.12.1...v5.13.0"
