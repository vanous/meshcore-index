# Source: https://github.com/persistentcache/Lora-Wideband-Decoder (verified 2026-07-03)
name: Lora Wideband Decoder
kind: monitoring
status: active
maturity: beta
description: >-
  Self-hosted wideband intercept receiver for LoRa traffic. Captures IQ from any
  SoapySDR-compatible SDR or bladeRF, demodulates and decodes Meshtastic, LoRaWAN
  and MeshCore across SF7–SF12 at 62.5, 125, 250 and 500 kHz bandwidths.
  Surfaces decoded packets, node identities and a live spectrum waterfall in a
  local Flask web UI. Runs at 28 Msps wideband on a multi-core host.

