    notes: "# Major Features\r\n\r\n* Support for 2 and 3 byte hash prefix (this includes path tracing).  \r\n_NOTE: Path trace has a bug in meshcore firmware for 3 byte prefix._\r\n* Discover nearby repeaters.\r\n* Mini map added to top of Repeater Login (if location known).\r\n\r\n\r\n## What's Changed\r\n* Add Contacts by @toma63 in https://github.com/venamartin/meshtrax/pull/8\r\n\r\n\r\n**Full Changelog**: https://github.com/venamartin/meshtrax/compare/v1.3.7...v1.4.0"
