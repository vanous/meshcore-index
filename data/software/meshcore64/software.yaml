name: MeshCore64
kind: client
status: active
maturity: alpha
description: >-
  Commodore 64 MeshCore chat client using a SwiftLink-compatible serial
  cartridge to connect to a TCP companion bridge, with channel and direct
  messaging, delivery acknowledgements and persistent configuration.

image: demo.png
screenshots:
  - file: demo.png
    caption: MeshCore channel messaging on a Commodore 64

