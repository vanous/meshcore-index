# Source: https://github.com/openhop-dev/openhop_repeater (verified 2026-07-03)
# Source: formerly github.com/rightup/pyMC_Repeater, renamed to openhop_repeater
name: openHop Repeater
also_known_as:
  - pyMC Repeater
kind: gateway
status: active
maturity: beta
description: >-
  Lightweight Python MeshCore repeater daemon built on openhop_core for
  Pi-class and embedded Linux hardware. Supports direct SX1262 SPI radios,
  CH341 USB-to-SPI adapters, pyMC TCP/USB modems and KISS serial modems.
  Forwards LoRa packets, exposes a web dashboard, and provides configuration
  tools for radio setup, policy management, monitoring and integrations.
  Server for [[software:pymc-console|pyMC Console]].

image: logo.png
screenshots:
  - file: dashboard.png
    caption: Repeater status and packet monitoring dashboard
  - file: statistics.png
    caption: Repeater traffic and performance statistics

maintainers:
  - name: Treehouse-00
    url: https://github.com/Treehouse-00
  - name: openHop
    url: https://github.com/openhop-dev

repository: https://github.com/openhop-dev/openhop_repeater
license: MIT

languages:
  - python
  - shell

platforms:
  - linux
  - docker
  - proxmox
  - raspberry-pi
interfaces:
  - web
  - headless
connections:
  - serial
  - usb
  - http
node_roles:
  - repeater
capabilities:
  - remote-administration
  - monitoring
  - telemetry
  - packet-analysis

install:
  - type: bare-metal
    package: Python / systemd
    url: https://github.com/openhop-dev/openhop_repeater#installation
    command: sudo bash ./manage.sh install
  - type: docker-compose
    url: https://github.com/openhop-dev/openhop_repeater#docker-compose
    command: docker compose up -d --force-recreate --build
  - type: proxmox-lxc
    url: https://github.com/openhop-dev/openhop_repeater#proxmox-lxc-installation
  - type: source
    url: https://github.com/openhop-dev/openhop_repeater

popularity:
  githubStars: 220
  githubForks: 59
  githubWatchers: 13
  githubOpenIssues: 22
  githubContributors: 22
  lastChecked: 2026-07-03

verification:
  sourceAvailable: true
  releasesAvailable: false
  signedReleases: false
  ciBuilds: true
  hasDocumentation: true
  lastChecked: 2026-07-03
  notes:
    - Formerly pyMC_Repeater; renamed to openhop_repeater as part of the openHop rebrand.
    - Supports native SPI SX1262 radios, CH341 USB-to-SPI adapters, pyMC TCP/USB modems and KISS serial modems; SX1302/SX1303 concentrators are not supported.
    - Web dashboard at http://<repeater-ip>:8000 with setup, monitoring, logs, configuration and update tools.

tags:
