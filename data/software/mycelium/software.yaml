description: >-
  Open-source MeshCore client for messaging on mesh networks. Supports radio
  connection settings, direct messaging, map view, and traceroute. Under active
  development with planned features including channel messaging, GPS forwarding,
  file sharing, Codec2 voice messages, and userscripts.

