# Source: https://github.com/taedryn/mesh-citadel (verified 2026-07-03)
name: Mesh-Citadel BBS
kind: bot
status: active
maturity: alpha
description: >-
  MeshCore-connected BBS inspired by Citadel BBSes from the 1980s. Lightweight
  system designed to run on a solar-powered Raspberry Pi Zero with a low-power
  nRF52-based LoRa node running USB companion firmware. Supports user
  registration, login, room navigation, message reading and posting, private
  mail, and a permission system. Communicates over MeshCore via py-meshcore.

