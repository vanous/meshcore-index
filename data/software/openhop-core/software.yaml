# Source: https://github.com/openhop-dev/openhop_core (verified 2026-07-03)
# Source: formerly github.com/pyMC-dev/pyMC_core, renamed to openhop_core
name: openHop Core
also_known_as:
  - pyMC Core
kind: library
status: active
maturity: beta
description: >-
  Python reimplementation of the MeshCore protocol and routing stack for building
  mesh nodes and applications, with encrypted messaging, identity management,
  event handling and optional direct SX1262 radio support over SPI. Compatible
  with the original MeshCore protocol. Available on PyPI as pymc-core.

image: pymc.png

maintainers:
  - name: openHop
    url: https://github.com/openhop-dev

repository: https://github.com/openhop-dev/openhop_core
documentation: https://openhop-dev.github.io/openhop_core/
license: MIT

languages:
  - python

latest_version: 1.0.12
released: 2026-05-22

platforms:
  - linux
  - raspberry-pi
interfaces:
  - api
  - headless
connections:
  - spi
  - serial
  - usb
  - websocket
node_roles:
  - companion
  - repeater
capabilities:
  - messaging
  - contacts
  - channels
  - monitoring
  - telemetry
  - packet-analysis
  - key-management

install:
  - type: pypi
    package: pymc-core
    url: https://pypi.org/project/pymc-core/
    command: pip install pymc-core
  - type: pypi
    package: pymc-core[hardware]
    url: https://pypi.org/project/pymc-core/
    command: pip install "pymc-core[hardware]"
  - type: source
    url: https://github.com/openhop-dev/openhop_core

popularity:
  githubStars: 82
  githubForks: 34
  githubWatchers: 6
  githubOpenIssues: 7
  githubContributors: 10
  lastChecked: 2026-07-03

verification:
  sourceAvailable: true
  releasesAvailable: true
  signedReleases: false
  ciBuilds: true
  hasDocumentation: true
  lastChecked: 2026-07-03
  notes:
    - Formerly pyMC_Core; renamed to openhop_core as part of the openHop rebrand.
    - Releases are published to PyPI as pymc-core rather than GitHub Releases.
    - Direct hardware support targets Raspberry Pi-class systems with SX1262 SPI radios; protocol components can be used without radio extras.
    - The project describes itself as protocol-compatible but not yet as optimized as the original MeshCore C++ implementation.

tags:
  - sdk
  - protocol
  - routing
  - sx1262
  - raspberry-pi

last_reviewed: 2026-07-03
