# Source: https://github.com/meshcore-dev/meshcore.js (verified 2026-07-03)
name: MeshCore.js
kind: library
status: active
maturity: stable
description: >-
  Official JavaScript library for interacting with MeshCore devices running
  Companion Radio firmware. Connects over BLE and USB Serial in the browser,
  and over TCP/WiFi and USB Serial in Node.js. Provides packet construction,
  decryption, and connection management for building web and Node.js MeshCore
  clients.

