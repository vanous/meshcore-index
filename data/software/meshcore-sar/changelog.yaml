  - version: v2026.0412.1
    name: 2026.0412.1
    datetime: '2026-04-12T20:47:49Z'
    url: https://github.com/dz0ny/meshcore-sar/releases/tag/v2026.0412.1
    prerelease: false
    notes: >-
      Release assets are published for all supported build targets:

      - Android (`.apk`)

      - Linux (`.tar.gz`)

      - macOS (`.dmg`)

      - Windows (`.zip`)

      - iOS unsigned (`-ios-unsigned.ipa`, `-ios-runner-app.zip`)


      Windows status: currently unusable. The BLE stack on Windows is broken, so BLE features do not
      work.


      iOS manual signing and install:

      1. Download `*-ios-unsigned.ipa` (or `*-ios-runner-app.zip`) from this release.

      2. Re-sign it with your Apple Development/Distribution certificate and provisioning profile.

      3. If you used `*-ios-runner-app.zip`, create a signed `.ipa` from `Runner.app` during
      signing.

      4. Install the signed `.ipa` on your iPhone using Apple Configurator 2 or Xcode (Devices and
      Simulators).
