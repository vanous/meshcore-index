name: LiteScope
kind: monitoring
status: active
maturity: beta
description: >-
  Lightweight, self-hosted dashboard for monitoring MeshCore networks. Ingests
  MQTT telemetry from one or more brokers, stores it in SQLite and serves a
  real-time React UI with live packet feeds, node analytics, channel
  decryption, observer timelines, network analytics, Leaflet maps, live packet
  trace playback and a raw-hex decoder.

