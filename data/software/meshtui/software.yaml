# Source: https://github.com/ekollof/meshtui (verified 2026-07-03)
# Source: https://ekollof.github.io/meshtui/
name: MeshTUI
kind: client
status: active
maturity: beta
description: >-
  Comprehensive terminal user interface client for MeshCore devices. Built with
  Textual, provides real-time chat with contacts and channels, message delivery
  tracking with ACK and retry logic, device management, contact management,
  channel creation with auto-hash, remote node administration, persistent
  message history, and BLE/TCP/serial connections. Includes experimental TCP
  proxy mode for exposing serial/BLE devices over TCP.

maintainers:
