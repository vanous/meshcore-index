# Source: https://github.com/KMX415/meshpoint (verified 2026-07-03)
name: Meshpoint
kind: gateway
status: active
maturity: beta
description: >-
  Open-source Meshtastic and MeshCore base station running on Raspberry Pi 4
  with an SX1302/SX1303 LoRa concentrator. Receives on 8 channels simultaneously
  (SF7–SF12), transmits natively with up to 27 dBm, and provides a full browser
  dashboard with chat, node discovery, radio configuration and live packet feed.
  MeshCore traffic supported through a USB companion. Optionally syncs to
  Meshradar cloud for multi-site mesh intelligence.

