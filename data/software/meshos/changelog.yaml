  - version: v1.0.9
    name: MeshOS v1.0.9
    datetime: '2026-06-25T14:00:26Z'
    url: https://github.com/andymux/meshos-releases/releases/tag/v1.0.9
    prerelease: false
    notes: >-
      ## MeshOS Companion v1.0.9


      Pairs with the new **MeshOS 2.0 — "Unified Companion + Repeater"** firmware.


      ### Repeater & mesh control

      - **Configurable repeater** — turn your radio into a repeater and choose what it relays:
      everything, selected regions, or nothing — with hop limits and loop detection, all from the
      app.

      - **Spam control** — block noisy channels by `#hashtag` or hash, view live per-channel mesh
      statistics to spot rogue channels, and toggle whether the public channel is repeated.

      - **Stronger user blocking** — blocked users are no longer repeated on channels you hold the
      key for, enforced on the device even while your phone is disconnected.


      ### Firmware updates

      - **Wi-Fi (OTA) firmware updates** straight from the app — no cable required (Wi-Fi-capable
      radios).


      ### Chat & UI

      - **Clear All Messages** from a channel's menu.

      - **Colourful map** option (layers button on the map screen).

      - Tidied sent-message popup — clearer LoRa vs AirLink repeat labels.

      - Settings reorganised under a **Repeater** section.


      ---

      Download **MeshOS-v1.0.9.apk** and open it to install. Existing users upgrade in place — your
      contacts, chats and licence are preserved.
  - version: v1.0.8
    name: MeshOS v1.0.8
    datetime: '2026-06-13T12:44:10Z'
    url: https://github.com/andymux/meshos-releases/releases/tag/v1.0.8
    prerelease: false
    notes: >-
      ## MeshOS v1.0.8


      ### Block users by name — now with wildcards

      - New **Blocked Users** screen (Settings → Messaging) — block an exact username, or use a
      **wildcard pattern** to catch several at once:
        - `*` matches any text · `?` matches a single character
        - e.g. `*bot`   `spam*`   `*casino*`
      - Great for spammers who append changing text (like a timestamp) to their name — one pattern
      such as `*meshcore*spammer*` blocks every variant.

      - Blocking is now **complete** — a blocked sender is hidden from:
        - the channel conversation,
        - the chat-list preview (no more last-message leak),
        - the unread badge, and
        - notifications.

        Their messages are still stored, so unblocking brings them straight back.

      ---

      **Verify your download** (SHA-256):

      `37318e42adbb411daf31aa0fc09bf710c5782f988eb6ca9f3d8496f9cb08477a`
  - version: v1.0.7
    name: MeshOS v1.0.7
    datetime: '2026-06-08T11:18:37Z'
    url: https://github.com/andymux/meshos-releases/releases/tag/v1.0.7
    prerelease: false
    notes: >-
      ## MeshOS v1.0.7


      ### AirLink ↔ LoRa Bridge

      - Bridge your local Bluetooth **AirLink** mesh to the **LoRa (MeshCore)** network — messages
      now relay both ways automatically.

      - **Direct messages** bridge across AirLink and LoRa too, not just channel chat.

      - When your phone is acting as the bridge, your **own** messages go out on **both**
      transports.

      - New **"Bridged" indicators**: actively-bridged channels show green icons in the chat list
      and a green badge in the conversation header.

      - Each message now shows which network it travelled on (**AirLink / LoRa** tags), and on the
      MeshCore side you'll see the **LoRa repeat count** (✓ x1) as repeaters carry it.

      - **Store-and-forward** now replays missed **DMs** as well as channel messages when you walk
      back into range.


      ### MeshOS Unified Companion Firmware Support

      - One firmware now runs **BLE, Wi-Fi and USB** companions — no more flashing a different
      variant for each connection type.

      - **Configure Wi-Fi companions right in the MeshOS app** — pick the network and connect over
      Wi-Fi.

      - Download the MeshCore unified firmware to your device from
      https://www.meshcore.co.uk/configurator


      ### Fixes

      - Fixed AirLink occasionally needing a manual **off/on toggle to start** after a fresh
      install.

      - Fixed **duplicate messages** appearing when returning to AirLink range.

      - Fixed old channel history showing after deleting a channel and re-adding one by QR.

      - An AirLink channel and a LoRa channel sharing the same key now always appear as **one
      chat**.


      ### Other

      - Add a contact by **QR code now works on macOS**.

      - **"Start on boot"** option for always-on nodes (Android).

      - Settings tidy-up.


      ---

      **T-Deck / T-Pager owners:** MeshOS firmware **1.3.7+** is AirLink-enabled, so those devices
      can act as an AirLink ↔ MeshCore bridge with this app.


      **Verify your download** (SHA-256):

      `aedccc2bbec4d7c82374390a93ed114cd81d2310c479981046a4bf9b2cdc0cf0`
