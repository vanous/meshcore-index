name: PokeMesh
kind: bot
status: active
maturity: experimental
description: >-
  Collaborative Pokémon FireRed game operated through MeshCore channel
  commands, using vote-based emulator input and a local vision-language model
  to summarize each game state within mesh message limits.

screenshots:
  - file: game.png
    caption: Pokémon FireRed emulator state
  - file: processed.png
    caption: Preprocessed game view for local vision analysis
  - file: chat.jpg
    caption: PokeMesh commands and game summaries in MeshCore chat

maintainers:
  - name: Idrees Hassan
    url: https://github.com/IdreesInc

repository: https://github.com/IdreesInc/PokeMesh
website: https://discord.gg/6yxE9prcNc
license: GPL-3.0-only

languages:
  - python
  - shell

platforms:
  - linux
interfaces:
  - cli
  - headless
connections:
  - serial
  - usb
node_roles:
  - companion
capabilities:
  - messaging
  - channels
  - automation

install:
  - type: source
    url: https://github.com/IdreesInc/PokeMesh

popularity:
