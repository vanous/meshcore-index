name: MeshCore Proxy
kind: utility
status: active
maturity: stable
description: >-
  TCP proxy that enables remote access to a locally-connected MeshCore
  companion radio. Connects to a MeshCore radio via USB serial or Bluetooth LE
  and exposes it over TCP, allowing remote clients like meshcore-cli, Home
  Assistant, and MeshCore apps to interact with the radio as if directly
  connected.

