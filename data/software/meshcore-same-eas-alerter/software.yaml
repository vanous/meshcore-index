name: MeshCore SAME EAS Alerter
kind: integration
status: active
maturity: beta
description: >-
  Lightweight tool that forwards SAME (Specific Area Message Encoding) Emergency
  Alert System warnings over a local MeshCore network. Connects an RTL-SDR via
  USB to receive over-the-air weather alerts and a MeshCore companion node via
  serial or TCP to broadcast alerts to the mesh. Operates without WiFi or internet.

