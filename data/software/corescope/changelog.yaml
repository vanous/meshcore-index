      # CoreScope v3.8.3


      **Upgrade urgency: High** — contains a stored XSS fix. Public dashboards should upgrade
      immediately.


      _187 commits since v3.8.2 (47 substantive + 140 auto-generated coverage bumps). Every bullet
      ends with a commit SHA — `git show <sha>` to verify._


      ## Highlights


      - **The live map is buttery now.** Packet animations and node pulses moved off SVG-per-frame
      onto a hardware-accelerated canvas overlay — 60 FPS even when the mesh is firing on all
      cylinders. (#1490, 914f8694; #1521, 75a38f02)

      - **Dashboards and APIs feel snappier under load.** `/api/observers` p95 dropped from ~10.8s
      to sub-second on busy meshes, `/api/stats` is no longer re-scanning the observations table
      every 15s for the navbar, and per-observer analytics stopped re-parsing every timestamp three
      times. (#1483, 13bdee57; #1516, 38506001)

      - **Stored XSS class closed — same class as CVE-2026-45323.** Mesh-advertised node names and
      observer names were rendered to the DOM unescaped on
      app/nodes/observers/packets/live/analytics/route-view/area-map; a payload like `<img src=x
      onerror=…>` executed. All sinks now escape; follow-up audits closed three more XSS sinks, an
      unbounded-`limit` DoS, and several log-injection paths. New CI gate hard-fails PRs that
      reintroduce either class. (#1537, f15b6779; #1539, 53339e08; #1540, 800d61c3; #1544, 7b430450;
      #1543, e4a21fc9)

      - **Cross-domain embeds.** `?embed=1` on `/#/map` and `/#/channels` strips the chrome, and a
      new `CORS_ALLOWED_ORIGINS` env unlocks Home Assistant / Grafana panel embeds. (#1500,
      367265eb)

      - **The map's region filter now actually filters the map.** Selecting a region hides
      non-region nodes by default; a "Show all nodes" toggle preserves the old behavior. (#1501,
      28713fab)

      - **Observers with broken clocks now name themselves.** Observers emitting zone-less
      timestamps get a ⚠️ chip on the observer list and a banner on detail with fix instructions —
      no more "why is this observer showing 1970?" support tickets. (#1480, 43b93c6b)

      - **Operators with big DBs no longer wait minutes for ingestor startup.** Heavy index builds
      run in the background via a new async-migration runner; the ingestor accepts packets
      immediately on boot. (#1541, e438451d)

      - **Fresh deploys can decrypt #Public out of the box.** Default Public channel key now ships
      in `channel-rainbow.json`. (#897, 451b5e88)


