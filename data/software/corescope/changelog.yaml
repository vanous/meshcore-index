      CoreScope just got eyes everywhere. This release drops **path inspection**, **color-by-hash
      markers**, **clock skew detection**, **full channel encryption**, an **observer graph**, and a
      pile of robustness fixes that make your mesh network feel like it's being watched by someone
      who actually cares.


      134 commits, 105 PRs merged, 18K+ lines added. Here's what shipped.


      ---


      ## 🚀 New Features


      ### Path-Prefix Candidate Inspector (#944, #945)

      The marquee feature. Click any path segment and CoreScope opens an interactive inspector
      showing every candidate node that could match that hop prefix - plotted on a map with scoring
      by neighbor-graph affinity and geographic centroid. Ambiguous hops? Now you can see *why*
      they're ambiguous and pick the right one.


      **Why you'll love it:** No more guessing which `0xA3` is the real repeater. The inspector lays
      out every candidate, scores them, and lets you drill in visually.


      ### Color-by-Hash Packet Markers (#948, #951)

      Every packet type gets a vivid, hash-derived color - on the live feed, map polylines, and
      flying-packet animations. Bright fill with dark outline for contrast. No more monochrome blobs
      - you can visually track packet flows by color at a glance.


      ### Node Filter on Live Page (#924, #771)

      Filter the live packet stream to show only traffic flowing through a specific node. Pick a
      repeater, see exactly what it's carrying. That simple.


      ### Clock Skew Detection (#746, #752, #828, #850)

      Full pipeline: backend computes drift using Theil-Sen regression with outlier rejection
      (#828), the UI shows per-node badges, detail sparklines, and fleet-wide analytics (#752).
      Bimodal clock severity (#850) surfaces flaky-RTC nodes that toggle between accurate and
      drifted - instead of hiding them as "No Clock."


      **Why you'll love it:** Nodes with bad clocks silently corrupt your timeline. Now they glow
      red before they ruin your analysis.


      ### Observer Graph (M1+M2) (#774)

      Observers are now first-class graph citizens. CoreScope builds a neighbor graph from
      observation overlaps, scores hop-resolver candidates by graph edges (#876), and uses
      geographic centroid for tiebreaking. The observer topology is visible and queryable.


      ### Channel Encryption - Full Stack (#726, #733, #750, #760)

      Three milestones landed as one: DB-backed channel message history (#726), client-side PSK
      decryption in the browser (#733), and PSK channel management with add/remove UX and message
      caching (#750). Add a channel key in the UI, and CoreScope decrypts messages client-side - no
      server-side key storage. The add-channel button (#760) makes it dead simple.


      **Why you'll love it:** Encrypted channels are no longer black boxes. Add your PSK, see the
      messages, search history - all without exposing keys to the server.


      ### Hash Collision Inspector (#758)

      The Hash Usage Matrix now shows collision details for all hash sizes. When two nodes share a
      prefix, you see exactly who collides and at what size.


      ### Geofilter Builder - In-App (#735, #900)

      The geofilter polygon builder is now served directly from CoreScope with a full docs page
      (#900). No more hunting for external tools. Link from the customizer, draw your polygon, done.


      ### Node Blacklist (#742)

      `nodeBlacklist` in config hides abusive or troll nodes from all views. They're gone.


      ### Observer Retention (#764)

      Stale observers are automatically pruned after a configurable number of days. Your observer
      list stays clean without manual intervention.


