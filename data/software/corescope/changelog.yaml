      ## Highlights


      - **Your relay timelines survive a restart.** Before v3.9.0, every container restart left
      repeater nodes with empty hop histories until live traffic replayed enough adverts to
      re-attribute. Now the relay-hop index is rebuilt from `path_json` during cold load — per-relay
      timelines, hop counts, and route stats are intact the moment the server says it's ready.
      (#1643, 938153dd)

      - **`/api/nodes` stops silently truncating at 500 rows.** The hard cap was hiding nodes from
      the map, analytics and packets pages on any mesh of meaningful size — without any warning. Now
      properly paginated across every consumer, with internal UI requests bypassing the per-page
      clamp. (#1607, 26105748; #1637, 9002b25b; #1589, 7421ead9)

      - **Hide your own node from a public dashboard with a prefix rename.** New
      `hiddenNamePrefixes` config (default `["🚫"]`) drops matching nodes from `/api/nodes*` while
      keeping DB rows for analytics — same convention other MeshCore dashboards already follow, no
      DB surgery, no permanent loss of history. (#1655, 825b2648)

