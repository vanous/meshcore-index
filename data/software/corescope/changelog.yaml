      Supersedes [v3.8.0](https://github.com/Kpa-clawbot/CoreScope/releases/tag/v3.8.0) (released
      earlier today, before this perf fix landed)._


      ## ⚡ Patch in v3.8.1: `/api/nodes` TTL fix


      Community contribution from **@efiten** (#1425). The `repeaterEnrichTTL` was 15 seconds but
      the background recomputer runs every 5 minutes — so the cache was stale for 4m45s out of every
      5min. On dense hop-graph deployments that meant 18s `/api/nodes` cold-miss responses. TTL is
      now derived as `2 * recomputer interval` so the cache stays warm between ticks. Measured 18.6s
      → ~0.5s on the contributor's prod mesh (analyzer.on8ar.eu).


      If you already deployed v3.8.0, just upgrade to v3.8.1 — same image semantics, drop-in.


      ---


      Three weeks, 135 merged PRs. The headline is the **Route Viewer redesign** — packets and the
      paths they travel, finally rendered as one coherent story. Underneath: startup-window
      improvements for large DBs, a near-complete mobile chrome overhaul.


      ---


      ## 🗺️ NEW: Route Viewer


      The new route viewer (`route-view.js` + `route-view.css`) puts packet context, observer paths,
      and resolved hops in one sidebar — and reflows cleanly to a bottom sheet on mobile.


      - **Packet context block** in the sidebar header — per-type fact list (ADVERT
      name/role/sig/pubkey, DM src→dst with encryption state, GRP_TXT channel + decrypted preview,
      TRACE official-vs-observed hops, PATH src→dst with payload-source chips). Merges
      `pkt.decoded_json` + `obs.decoded_json` and falls back to byte-level `raw_hex` parsing for
      encrypted DMs.

      - **Multi-path picker** — chip per unique observer-path (`<count>/<total>` + hex hop string).
      Click to isolate; "All" renders an edge-deduplicated UNION view (each unique edge once, stroke
      weight = observer count).

      - **Deep-link URLs** — `#/map?packet=<hash>&obs=<id>`. Bookmarkable, shareable, single source
      of truth. sessionStorage flow removed.

      - **Hop resolution priority chain** — server `resolved_path` → shared `HopResolver`
      (observer-IATA-aware, same as packets page) → raw prefix. Kills a whole class of "route view
      named hops differently than packet detail" bugs.

      - **Markers** — uniform 22 px filled circle with seq number inside, hollow endpoint ring for
      SRC/DST, double concentric ring on SRC=DST loops, spider-fan for sub-14 px collisions
      debounced to `zoomend`.

      - **Colorblind-preset live colors** — `routeRamp` per preset (viridis / plasma /
      pure-luminance) written to `--mc-rt-ramp-0..4` CSS vars and hot-recoloured on
      `cb-preset-changed` / `theme-changed`.

      - **Desktop chrome** — drag-to-resize sidebar persisted to localStorage, Material/Drive-style
      collapse chevron centred on the right edge.

      - **Mobile bottom sheet** — anchored above bottom-nav + safe-area inset, thin summary line
      when collapsed (`TYPE · N hops · X km · M obs`), expands to ~75 vh. All three legacy mobile
      detail panels closed on route entry.


      Closes: #1418, #1419, #1422 · PR #1423


      Related map work that landed this cycle: role-aware marker shapes + outline rings (#1334),
      WCAG 2.2 AA pass on cluster bubbles + role pills + multi-byte labels (#1357), thinner
      always-on marker outline (#1347).


      ---


      ## ⚡ Startup


      - **Hot startup window** — new `packetStore.hotStartupHours` config loads only N hours of
      packet history synchronously and fills the rest in background daily chunks. Large DBs
      (multi-GB) no longer block the HTTP listener on a full-retention load before serving traffic
      (#1187).

      - **Ingestor now owns the neighbor-graph and all schema migrations**; the server is read-only.
      Removes a class of startup races where two processes raced the same migration (#1286, #1289).


      ---


      ## 🔬 NEW: Protocol decoder coverage


      The MeshCore decoder now handles every documented payload type, with the legend updated
      end-to-end so operators see real names instead of `Type 6`.


