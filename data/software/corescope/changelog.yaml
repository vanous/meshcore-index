      ## CoreScope v3.5.2


      ### 🔧 New: `corescope-decrypt` CLI

      Standalone tool for retroactive channel message decryption. Decrypt hashtag channel messages
      from your SQLite database — even packets ingested before the channel key was configured.


      ```bash

      corescope-decrypt --channel "#test" --db meshcore.db --format irc

      corescope-decrypt --channel "#wardriving" --db meshcore.db --format json --output
      messages.json

      corescope-decrypt --channel "#sf" --db meshcore.db --format html --output viewer.html

      ```


      Three output formats: JSON (full metadata), HTML (interactive viewer), IRC/log (greppable
      plain text). Included in the Docker image at `/app/corescope-decrypt`. Only works with hashtag
      channels (`#name`) — the `public` channel uses a pre-shared key, not hashtag derivation.


      ### ⚡ Eviction redesign

      Replaced `HeapAlloc`-based eviction with self-accounting `trackedBytes` counter. No more
      cascading eviction on large databases. High/low watermark hysteresis + 25% safety cap.


      ### 📊 Cache invalidation tuning

      Wired the `invalidationDebounce` config (was dead code). Default cooldown 10s → 300s.
      Collision cache only clears on new nodes. Expected cache hit rate: 7% → 50-80%.


      ### 🔬 Multi-byte capability

      Repeater multi-byte detection integrated into Hash Adopters table. Filter buttons fixed. TRACE
      packets excluded from suspected detection (pre-1.14 repeaters can forward multi-byte TRACEs).


      ### 🐛 Fixes

      - Relay-only nodes now appear as alive (path hop indexing + debounced DB touch)

      - Live feed timestamps refresh every 10s (no more stale "10s ago")

      - Perf page shows tracked memory, not heap

      - SQLite busy_timeout on all write connections

      - Dockerfile includes `internal/sigvalidate`


