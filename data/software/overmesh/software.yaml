# Source: https://github.com/Slofi/overmesh (verified 2026-07-03)
name: OverMesh
kind: client
status: active
maturity: beta
description: >-
  Self-hosted dashboard for Meshtastic and MeshCore. Runs entirely on your own
  machine with no cloud, no account and no subscription. Provides a unified
  interface for both networks with live node map, chat, direct messages,
  multi-radio support, Mesh Sense activity monitoring, bot tools, offline map
  tiles, radio settings, and in-app notifications.

