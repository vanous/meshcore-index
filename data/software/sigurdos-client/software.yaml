name: SigurdOS Client
kind: client
status: active
maturity: alpha
description: >-
  Cross-platform Flutter MeshCore client forked from MeshCore Open, adding a
  SigurdOS pixel-art theme while retaining messaging, maps, device management
  and repeater administration over BLE, USB and TCP.

image: sigurdos.png
screenshots:
  - file: contacts.jpg
    caption: Mesh contacts
  - file: chat.jpg
    caption: Encrypted direct messaging
  - file: map.jpg
    caption: Mesh map and node positions
  - file: channels.jpg
    caption: Channel messaging

