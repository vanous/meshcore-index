  - version: beta-0.04.0
    name: beta-0.04.0 — message info, forward, canned responses, pinned contacts
    datetime: '2026-05-21T22:20:09Z'
    url: https://github.com/hermes-gadget/SigurdOS-client/releases/tag/beta-0.04.0
    prerelease: true
    notes: >-
      ## Changes


      ### New Features

      - **Message Info**: long-press any message to see delivery metadata (status, trip time, hop
      count, retries, message ID)

      - **Forward**: send a message to another contact or channel from the long-press menu

      - **Canned Responses**: quick-preset bar above the composer with common field phrases (OK,
      ETA?, etc.)

      - **Pinned Contacts**: pin frequent contacts to the top of your contacts list, persisted
      across sessions

      - **Solid Nav Bar**: removed the liquid-glass blur effect from the bottom navigation bar for a
      cleaner look


      ### Technical

      - 30 files changed, +2335 / -117 lines

      - 0 new lint issues

      - Version: 0.2.0+1


      ### APK

      Attached below (built via CI)
