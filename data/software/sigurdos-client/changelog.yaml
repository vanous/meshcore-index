    name: SlopOS Client beta-0.02.0
    datetime: '2026-05-19T00:42:30Z'
    url: https://github.com/hermes-gadget/SigurdOS-client/releases/tag/beta-0.02.0
    prerelease: true
    notes: >-
      ## SlopOS Client — Beta 0.02.0


      Initial SlopOS-branded APK release, forked from
      [meshcore-open](https://github.com/zjs81/meshcore-open) by [zjs81](https://github.com/zjs81).


      ### What's included

      - **Dark Discord-inspired pixel theme** — deep black (#0F0F0F) surfaces, cyan (#00BFFF)
      accents, PressStart2P/PixelifySans fonts

      - **SlopOS logo and icon set** — launcher icons for all densities

      - **Full MeshCore feature set**: BLE/USB/TCP companion, messaging, channels, map, repeater hub

      - **GPL-3.0-or-later** license


      ### Install

      - Download the APK below

      - Or add `https://github.com/hermes-gadget/SlopOS-client` to
      [Obtainium](https://obtainium.imranr.dev/)


      ### Upstream

      All credit for the core Flutter client, BLE protocol integration, and cross-platform
      architecture goes to [meshcore-open](https://github.com/zjs81/meshcore-open).
