  - version: 0.8.0
    name: MeshCorium v0.8.0 — Mobile UI & Maps (stable)
    datetime: '2026-05-25T21:49:03Z'
    url: https://github.com/PEG4TRON/MeshCorium/releases/tag/0.8.0
    prerelease: false
    notes: >-
      ## Mobile UI & Maps (stable)


      - **Mobile Responsive UI**: All major views (Maps, Contacts, Messages, Settings, Repeater
      Management) adapted for 1024px breakpoint with dedicated mobile shells, bottom-sheet overlays,
      and bottom docks.

      - **Maps**: Map provider selector (OSM Raster / OFM Liberty), reliable tile loading through
      local proxy, fixed OSM raster fallback template.

      - **SSE fixes**: Cascading disconnection prevention when resuming background sessions.

      - **Read tracking**: Fixed read marker on mobile back navigation, channel unread key mismatch,
      loadNewerMessages auto-mark.

      - **Systemd service**: Unit with automatic ttyACM0/ttyUSB* permission fix, multi-device
      support (nRF52, ESP32-S3, ESP32+CP2102/CH340).

      - **Architecture**: `useIsMobile`, `useUpdateCheck`, `shellPanels.js`, `contactRoutes.js`,
      `statusText.js`.

      - **Desktop unchanged**: All existing transports (USB, BLE, Wi-Fi/LAN, Docker) remain fully
      functional.


      ---


      ## Мобильный UI и карты (стабильный)


      - **Мобильный адаптивный UI**: Все основные виды (Карты, Контакты, Сообщения, Настройки,
      Управление репитерами) адаптированы для 1024px с выделенными мобильными оболочками, оверлеями
      и нижними доками.

      - **Карты**: Выбор источника карт (OSM Raster / OFM Liberty), надёжная загрузка тайлов через
      локальный прокси, исправлен шаблон OSM raster.

      - **Исправления SSE**: Предотвращение каскадных разрывов при возобновлении фоновых сессий.

      - **Трекинг прочитанного**: Исправлен маркер прочтения при возврате на мобильном, несовпадение
      ключей unread каналов, авто-отметка loadNewerMessages.

      - **Systemd-сервис**: Юнит с автоматическим исправлением прав ttyACM0/ttyUSB*, поддержка
      нескольких устройств.

      - **Архитектура**: `useIsMobile`, `useUpdateCheck`, `shellPanels.js`, `contactRoutes.js`,
      `statusText.js`.

      - **Десктоп без изменений**: Все транспорты (USB, BLE, Wi-Fi/LAN, Docker) полностью
      работоспособны.
