    notes: >-
      # Changelog


      ## v0.8.2 — Auto-Update Fix (2026-06-18)


      ### Service & Deployment

      - **CRITICAL FIX**: Added missing `--supervise` flag to systemd service `ExecStart` line in
      `meshcorium-launcher.sh`. Without this flag, the launcher ran in default `--run` mode —
      starting the Python process directly without the supervisor loop that handles GitHub release
      checks and the self-update lifecycle. This prevented automatic update discovery from working
      in all previous releases that used systemd.


      - **Impact**: After this fix, `meshcorium.service` runs `meshcorium-launcher.sh --supervise`
      instead of `meshcorium-launcher.sh` (default `--run`). The supervisor now polls GitHub every
      30 minutes for new releases, writes `.meshcorium_update_available` flag file, and manages the
      full install/rollback lifecycle via `updater.sh`.


      - **Upgrade note**: Existing installations can fix the systemd unit without reinstalling by
      running the provided fix script:
        ```bash
        cd /opt/MeshCorium && curl -sSL https://raw.githubusercontent.com/PEG4TRON/MeshCorium/main/fix-autoupdate.sh | bash
        ```
        The script detects the installation, creates a backup, patches `ExecStart`, validates with `systemd-analyze verify`, and restarts the service. Alternatively, run `meshcorium-launcher.sh --install` to recreate the unit from the corrected template.

      ---


      ## v0.8.1 — Mobile UX & Quality (2026-06-18)


      ### Map provider fallback

      - Unified MapLibre provider selection and fallback behavior across all secondary maps: message
      route maps, repeater geo picker, and contact route editor now honor the saved `map_provider`
      setting just like the main Maps page.

      - Extracted shared map provider constants, style builders, tile proxy rewriting, provider
      normalization, and raster fallback helpers into `web/src/lib/mapLibre.js`.

      - Added a 6-second map style boot timeout and error-triggered fallback from OpenFreeMap / OFM
      Liberty to OSM Raster for secondary map sheets, matching the main Maps page behavior.

      - Continued routing both OpenFreeMap and OSM raster tile requests through the local
      `/api/tiles/proxy` endpoint to avoid direct LAN/browser tile loading problems.


      ### Map settings and data filtering

      - Added a persisted `map_max_distance_km` client setting with a default of 400 km and a
      supported range of 1–20000 km.

      - Added desktop and mobile Maps UI controls for changing the maximum contact-rendering
      distance. Contacts outside the configured home-node radius are filtered from map display.


      ### Settings and update UX

      - Added a manual update-check button next to the displayed version in Settings → About.

      - Corrected the Settings/About fallback display version for this release.


      ### Docker and release packaging

      - Added `.meshcorium_version` to the Docker runtime image so containerized `/api/update/check`
      reports the same `0.8.1` version as the normal launcher build.

      - Updated Docker Compose image/release metadata to `0.8.1` / `0.8.1--map-fixes`.

      - Added the previously omitted helper script `download_meshcore_node_svgs.py` to the Docker
      runtime copy list, keeping root Python files explicit in the Dockerfile.

      - Kept the cleaned release tree rules from v0.8.0: runtime data, logs, caches, virtual
      environments, and node modules are excluded from release artifacts.


