  - version: 0.7.1
    name: MeshCorium v0.7.1 -- BUGFIX
    datetime: '2026-05-21T11:04:54Z'
    url: https://github.com/PEG4TRON/MeshCorium/releases/tag/0.7.1
    prerelease: false
    notes: >-
      Fixed a bug where chats with a large number of unread messages did not load all the way to the
      most recent messages.


      **What was the problem:** when opening a chat where many new messages had accumulated, the app
      loaded messages starting from the first unread one and showed only a limited window around it.
      Scrolling down stopped at the edge of that window and did not load the newer messages that had
      arrived since. The only way to see them was to close and reopen the chat, or refresh the page.


      **What was fixed:**

      - scrolling down now automatically loads the next batch of newer messages, the same way
      scrolling up loads older ones;

      - the «scroll to newest» button now loads all the way to the really newest message in the
      database without stopping at the edge of the local window.


      ---


      Исправлен баг, при котором чаты с большим количеством непрочитанных сообщений не догружали
      переписку до самых свежих сообщений.


      **В чём была проблема:** при входе в чат, где накопилось много новых сообщений, приложение
      начинало показывать переписку от первого непрочитанного и отображало только ограниченное окно
      вокруг него. Скролл вниз упирался в край этого окна и не подгружал новые сообщения, пришедшие
      позже. Увидеть их можно было только переоткрыв чат или обновив страницу.


      **Что исправлено:**

      - скролл вниз теперь автоматически подгружает следующую порцию более новых сообщений — так же,
      как скролл вверх подгружает более старые;

      - кнопка «пролистать к самому новому» теперь догружает всё до действительно последнего
      сообщения в базе, не останавливаясь на краю локального окна.
  - version: 0.7.0
    name: MeshCorium v0.7.0 -- Docker + USB + BLE + WIFI/LAN
    datetime: '2026-05-17T17:35:45Z'
    url: https://github.com/PEG4TRON/MeshCorium/releases/tag/0.7.0
    prerelease: false
    notes: >-
      MeshCorium v0.7.0 promotes Wi-Fi/LAN TCP transport into the published release profile
      alongside Docker, USB serial, and BLE. This release aligns the runtime so post-connect
      behavior is transport-aware across USB, BLE, and Wi-Fi/LAN, improves message bootstrap and
      dialog preview consistency, and keeps the Docker bundle building the current frontend and
      backend directly from the release tree.


      Key changes:

      - official Wi-Fi/LAN TCP transport release support through a manual `host:port` connection
      flow;

      - transport-aware active session routing for post-connect runtime behavior across views;

      - bootstrap queue drain immediately after session readiness, so queued messages load without
      waiting for an extra push event;

      - transient Wi-Fi frame timeouts are treated as idle gaps instead of fatal disconnects;

