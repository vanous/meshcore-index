# Source: https://github.com/matthewdgreen/meshcore_sim (verified 2026-07-03)
name: meshcore_sim
kind: utility
status: active
maturity: experimental
description: >-
  Discrete-event simulator for MeshCore mesh networks. Each simulated node runs
  the real MeshCore routing and cryptography code as a standalone subprocess;
  a Python orchestrator wires them together over simulated radio links with
  configurable loss, latency, SNR, RSSR, and adversarial behaviour. Includes
  topology visualiser and supports privacy-protocol experiments.

