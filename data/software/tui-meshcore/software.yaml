name: TUI MeshCore
kind: client
status: active
maturity: alpha
description: >-
  Linux terminal client built with Textual and pyMC_core, providing onboarding,
  regional and hardware presets, encrypted direct and channel messaging, contact
  discovery and persistent SQLite history.

image: screenshot.png

maintainers:
  - name: guax
    url: https://github.com/guax

repository: https://github.com/guax/tui-meshcore
license: GPL-3.0-only

languages:
  - python

platforms:
  - linux
interfaces:
  - tui
connections:
  - serial
  - usb
node_roles:
  - companion
capabilities:
  - messaging
  - contacts
  - channels
  - node-configuration

install:
  - type: source
    url: https://github.com/guax/tui-meshcore
    command: pip install -e . && tui-meshcore

