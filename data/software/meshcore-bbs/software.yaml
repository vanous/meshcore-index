# Source: https://github.com/carsten-walther/MeshCore-BBS (verified 2026-07-03)
name: MeshCore BBS
kind: bot
status: active
maturity: alpha
description: >-
  Store-and-forward bulletin board system that runs on a MeshCore companion
  radio over a LoRa mesh. Users interact entirely via direct messages using a
  simple !command protocol — no special app support required. The BBS attaches
  to a MeshCore device running Companion firmware via USB serial, TCP or BLE,
  stores messages in a local SQLite database and delivers them on demand.

