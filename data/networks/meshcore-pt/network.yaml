name: Portugal
also_known_as:
  - MeshCore Portugal
short_name: MeshCore PT
description: >-
  Portuguese MeshCore community coordinating national off-grid LoRa mesh
  messaging through meshcore.pt, with published 433.375 MHz and 869.618 MHz
  radio settings, local hardware guides, map tools and LusoApp resources.
scope: national
status: active
visibility: public
area: area.geojson

coverage:
  countries:
    - PT

# Radio values published on the 433 MHz & 868 MHz network cards at
# https://www.meshcore.pt/en/home — they match the MeshCore app
# presets, so each radio carries an `app_preset` foreign key tracked for drift
# by .github/workflows/app-presets.yml.
radios:
  - name: Popular 433 MHz network
    description: Most-used Portugal mesh; the site recommends 433 MHz hardware for broader existing compatibility.
    frequency: '433'
    frequency_mhz: 433.375
    bandwidth_khz: 62.5
    spreading_factor: 9
    coding_rate: 4/6
    tx_power_dbm: 10
    public_channel: Public
    app_preset: 'Portugal 433'
  - name: Growing 868 MHz network
    description: Secondary/growing Portugal mesh on the 868 MHz band.
    frequency: '868'
    frequency_mhz: 869.618
    bandwidth_khz: 62.5
    spreading_factor: 7
    coding_rate: 4/6
    tx_power_dbm: 27
    public_channel: Public
    app_preset: 'Portugal 868'

community:
  website: https://www.meshcore.pt/en/home
  telegram: https://t.me/+z4dJQa_YI4M3ZTVk
  facebook: https://www.facebook.com/groups/1393610475082383/
  youtube: https://www.youtube.com/playlist?list=PLkxRrxBLBVAW3s5Iy0EjCyQQIyNbThlnb
  contact: meshcorept@gmail.com

maps:
  - name: MeshCore Portugal map
    url: https://www.meshcore.pt/en/map

resources:
  getting_started: https://www.meshcore.pt/en/home
  links:
