name: Bay Area MeshCore
also_known_as:
  - Bay Area Meshcore
short_name: Bay Area MC
description: >-
  Active MeshCore community in the San Francisco Bay Area and Central Coast of
  California, with 700+ nodes spanning from Cotati to San Jose. Runs on the US
  915 MHz band with a CoreScope analyzer and Discord community.
scope: regional
status: active
visibility: public
area: area.geojson

coverage:
  countries:
    - US

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/8
  path_hash_mode: 2-Byte
  public_channel: Public

community:
  website: https://bayareameshcore.org/
  discord: https://discord.gg/q59JzsYTst

analyzers:
  # Source: Shodan/Censys scan 2026-06-26 — CoreScope at 20.109.157.39 (699 nodes, Bay Area CA)
  - name: CoreScope
    url: http://20.109.157.39
  # Source: GitHub CoreScope issues — staging instance for Bay Area mesh (50 nodes, same set as 20.109.157.39)
  - name: analyzer-stg.00id.net
    url: http://analyzer-stg.00id.net

resources:
  getting_started: https://bayareameshcore.org/
  links:
    - name: Firmware Flasher
      url: https://meshcore.io/flasher