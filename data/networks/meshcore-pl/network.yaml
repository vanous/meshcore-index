  - MeshCore Poland
short_name: MeshCore PL
description: >-
  Polish LoRa MeshCore community building a nationwide emergency/off-grid mesh
  network on the EU/UK Narrow preset, coordinated through lorameshcore.pl with
  setup guides, repeater guidance, analyzer documentation and community links.
scope: national
status: active
part_of:
  - eu-uk-narrow
visibility: public
