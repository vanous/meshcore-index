# Source: https://wiki.seeedstudio.com/LoRa_E5_Dev_Board/
# Source: https://wiki.seeedstudio.com/LoRa-E5_STM32WLE5JC_Module/
name: Seeed Studio Wio-E5 Dev Board
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-wio-e5-dev-board
official: true
product_url: https://wiki.seeedstudio.com/LoRa_E5_Dev_Board/
description: >-
  Compact Wio-E5 development board for STM32WLE5JC / LoRaWAN prototyping with
  external antenna and GPIO breakouts. Intended for quick bring-up and radio
  testing rather than a finished enclosure.
image: wio-e5-dev.svg
transports:
  - usb
price:
  # Source: https://forum.seeedstudio.com/t/wio-e5-development-kit-can-not-be-recognized-by-my-laptop-and-arduino/272560
  amount: 27
  currency: USD
  asOf: 2026-06
hardware:
  mcu:
    model: stm32wl
    flashMb: 0.25
    # Source: https://files.seeedstudio.com/products/317990687/res/STM32WLE5JC%20Datasheet.pdf
    ramKb: 64
  radios:
    - technology: lora
      chip: stm32wl
      bands:
        - '868'
        - '915'
        - '923'
      txPowerDbm: 22
  display:
    status: none
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: 2*AA battery holder
    batteryChemistry: alkaline
    charging: false
    solarInput: false
    # Source: https://wiki.seeedstudio.com/LoRa_E5_Dev_Board/
    consumptionIdleMa: 0.0021
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  wifi:
    status: none

# Community 3D-printable enclosures and accessories hosted on Printables.
# `image` is the model's social cover thumbnail (remote URL); `url` links to the printable.
prints:
  - name: "Wio-E5 Grove Case"
    type: enclosure
    author: "406FPV"
    url: "https://www.printables.com/model/535202-wio-e5-grove-case"
    image: "https://media.printables.com/media/prints/535202/images/4316279_6b70a8dc-4662-4b17-b1f8-8a6f6d9b8ca1/thumbs/cover/1200x630/jpg/20230724_134013.jpg"
    likes: 5
