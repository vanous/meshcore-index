description: >-
  High-power LoRa radio module built around the SX1262, delivering 30 dBm
  (1 W) output with an integrated LNA and optional band-pass filter. SPI
  interface. Available in 868 MHz and 915 MHz variants. Used as the RF
  front-end in several MeshCore-compatible boards including the MeshSmith
  PiMesh-1W, Photon-1W, and EtherMesh-1W.
