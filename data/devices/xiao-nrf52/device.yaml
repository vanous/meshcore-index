# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.seeedstudio.com/XIAO_BLE/
# Source: https://wiki.seeedstudio.com/xiao_nrf52840%26_wio_SX1262_kit_for_meshtastic/
name: Seeed Studio Xiao nRF52 WIO
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao-wio
aliases:
  - Seeed XIAO nRF52840 + Wio-SX1262 Kit
  - XIAO nRF52840 + Wio-SX1262 Kit
image: xiao_nrf52.svg
official: true
product_url: https://wiki.seeedstudio.com/XIAO_BLE/
refs:
  mesh-sh-device: seeed-xiao-nrf52840-wio-sx1262-kit
roles:
  - companion
  - repeater
  - room-server
description: >-
  Thumb-sized nRF52840 board used as the host board in the Seeed XIAO nRF52840
  + Wio-SX1262 kit. The base board provides BLE, USB flashing, and a compact
  wearable-friendly footprint; LoRa comes from the separate Wio-SX1262 module.
transports:
  - ble
  - usb
# Single SKU; XIAO nRF52840 Wio-SX1262 bundle.
# Source: https://www.seeedstudio.com/Seeed-XIAO-BLE-nRF52840-p-5201.html (SKU 102010448).
variants:
  - name: 868/915MHz
    sku: '102010448'
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://wiki.seeedstudio.com/XIAO_BLE/
    # Source: https://wiki.seeedstudio.com/xiao_nrf52840%26_wio_SX1262_kit_for_meshtastic/
    ramKb: 256
  display:
    status: none
  gnss:
    status: none
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
  leds:
    status: present
    description: User/status LED
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
    # Source: https://wiki.seeedstudio.com/XIAO_BLE/
    batteryConnector: JST-PH 2-pin (external)
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: PCB
price:
  # Source: https://www.seeedstudio.com/Seeed-XIAO-BLE-nRF52840-p-5201.html
  # Source: https://forum.seeedstudio.com/t/xiao-nrf52840-wio-sx1262-kit-for-meshtastic-no-sensor-passthru/292616
  amount: 13
  currency: USD
  asOf: 2026-06
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
