# Source: https://heltec.org/project/meshpocket/
# Source: https://resource.heltec.cn/download/MeshPocket/datasheet/MeshPocket_1.0.1.pdf
name: Heltec MeshPocket
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-meshpocket
aliases:
  - MeshPocket Qi2
  - MeshPocket Power Bank
  - MeshPocket Qi2 Magnetic Charging Power Bank
image: heltec_meshpocket.svg
datasheet: datasheet.pdf
flasherListed: true
refs:
  mesh-sh-device: meshpocket-qi2-magnetic-charging-power-bank
product_url: https://heltec.org/project/meshpocket/
price:
  amount: 60
  currency: USD
  asOf: 2026-06
description: >-
  Heltec MeshPocket is a compact nRF52840 + SX1262 LoRa node integrated into a
  power bank with Qi2 magnetic wireless charging, dual USB-C (5V input/output),
  and a small LCD display. Designed for Meshtastic and MeshCore portable mesh
  networking with 4000+ mAh battery and low-power BLE companion mode.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
# Source: https://heltec.org/project/meshpocket/ (variation data embedded in product page).
# Base 5000mAh grey variant per band; other battery/color SKUs exist.
variants:
  - name: 863~870MHz
    sku: ZC-301-1-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-301-1
    bands:
      - '915'

hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/meshpocket-qi2-magnetic-charging-power-bank
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '868'
        - '915'
      txPowerDbm: 20
      antenna: IPEX-1.0
  display:
    status: present
    technology: e-ink
    size: 2.13
    resolution:
      width: 122
      height: 250
    colors: monochrome
  leds:
    status: present
    description: Status LEDs
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 5000
    charging: true
    # Source: https://mesh-sn.de/en/devices/details/meshpocket-qi2-magnetic-charging-power-bank
    batteryChemistry: li-po
    pmic: BQ25970
    # Source: https://mesh-sn.de/en/devices/details/meshpocket-qi2-magnetic-charging-power-bank
    consumptionIdleMa: 8
    consumptionTxMa: 164
  physical:
    dimensionsMm:
      width: 102
      height: 74.1
      depth: 17
    weightG: 220
  expansion:
    - type: header-2.54
      count: 1
      pins: 10
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
