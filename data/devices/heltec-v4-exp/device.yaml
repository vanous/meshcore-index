# Source: https://heltec.org/project/wifi-lora-32-v4-expansion-housing/ (variation data embedded in product page).
# Base touch-screen, no GNSS, no battery variant; other front-panel/GNSS/battery SKUs exist.
variants:
  - name: 863~928MHz
    sku: ZC-326-2
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 2
    # Source: https://mesh-sn.de/en/devices/details/heltec-wifi-lora-32-v4
    ramKb: 2048
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 28
      antenna: SMA
  display:
    status: present
    technology: display
    size: 2
    resolution:
      width: 320
      height: 240
    touch: true
    colors: color
  gnss:
    status: none
  leds:
    status: present
    description: Status LEDs
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    # Source: https://mesh-sn.de/en/devices/details/heltec-wifi-lora-32-v4
    consumptionIdleMa: 20
    consumptionTxMa: 120
  expansion:
    - type: b2b-female
      count: 1
    - type: l76k-gnss
      count: 1
  enclosure:
    builtIn: true
  physical:
    dimensionsMm:
      width: 52
      height: 52
      depth: 15
    weightG: 200
  environmental:
    operatingTempC:
      min: -20
      max: 70
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

