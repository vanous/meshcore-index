# Source: https://heltec.org/project/mesh-node-t114/
name: Heltec T114
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-t114
aliases:
  - Heltec Mesh Node T114 V2
  - Mesh Node T114
  - Heltec Mesh Node T114
  - HT-n5262
image: heltec_t114.svg
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/mesh-node-t114/
refs:
  mesh-sh-device: heltec-mesh-node-t114-v2
price:
  # Source: https://heltec.org/project/mesh-node-t114/
  amount: 18
  currency: USD
  asOf: 2026-06
description: >-
  Compact nRF52840 + SX1262 development board for Meshtastic/MeshCore and
  LoRaWAN. Optional 1.14-inch TFT display and L76K GNSS module, dual battery and
  solar connectors, IPEX-1 LoRa antenna, and USB-C. No built-in battery.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-node-t114-v2
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: present
    technology: display
    controller: LH114T-IF03
    size: 1.14
    resolution:
      width: 135
      height: 240
    colors: color
    touch: false
  gnss:
    status: present
    chip: L76K
  leds:
    status: present
    description: Status LEDs
  input:
    - type: button
      description: user button
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    batteryConnector: SH1.25-2P
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-node-t114-v2
    consumptionIdleMa: 11
    consumptionTxMa: 85
  physical:
    dimensionsMm:
      width: 53
      height: 29
      depth: 8
    # Source: https://mesh-sn.de/hardware/details/heltec-mesh-node-t114-v2
    weightG: 10
  expansion:
    - type: header-2.54
      count: 2
      pins: 13
    - type: connector
      count: 1
      pins: 8
      interfaces:
        - GNSS
  environmental:
    operatingTempC:
      min: -20
      max: 70
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
