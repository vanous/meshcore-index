# Source: meshcore-dev/MeshCore variants/xiao_rp2040/platformio.ini
# Source: https://wiki.seeedstudio.com/XIAO-RP2040/
name: Seeed Studio XIAO RP2040
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao
official: true
product_url: https://wiki.seeedstudio.com/XIAO-RP2040/
description: >-
  Tiny RP2040 XIAO board with USB flashing, a 14-pin footprint, and the
  standard Seeed user and charge LEDs. Suited to small companion-side
  controller projects and lightweight peripheral glue logic.
image: xiao-rp2040.svg
roles:
  - companion
  - repeater
  - room-server
transports:
  - usb
hardware:
  mcu:
    model: rp2040
    flashMb: 2
    # Source: https://wiki.seeedstudio.com/XIAO-RP2040/
    ramKb: 264
  radios:
    - technology: lora
      chip: sx1262
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  leds:
    status: present
    description: User LED, power LED, and RGB LED
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
  display:
    status: none
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: false
    solarInput: false
price:
  # Source: https://www.seeedstudio.com/XIAO-RP2040-v1-0-p-5026.html
  # Source: https://forum.seeedstudio.com/t/xiao-esp32s3-sx1262-lorawan-wiki-example/292535
  amount: 9
  asOf: 2026-06
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  wifi:
    status: none

