# Source: meshcore-dev/MeshCore variants/tiny_relay/platformio.ini + boards/tiny_relay.json
name: Tiny Relay
vendorId: yaoyao
kind: product
lifecycle: active
familyId: yaoyao-tiny-relay
product_url: https://www.st.com/en/microcontrollers-microprocessors/stm32wle5cc.html
official: true
description: >-
  Minimal STM32WLE5CC relay target for MeshCore builds, intended for tiny
  always-on nodes and experimentation with a low-cost LoRa-enabled MCU.
transports:
  - usb
hardware:
  mcu:
    model: stm32wl
    flashMb: 0.25
    # Source: https://www.st.com/en/microcontrollers-microprocessors/stm32wle5cc.html
    ramKb: 64
  radios:
    - technology: lora
      chip: stm32wl
  display:
    status: none
  gnss:
    status: none
  power:
    batterySupported: false
    batteryBuiltIn: false
    charging: false
    solarInput: false
    # Source: https://www.st.com/en/microcontrollers-microprocessors/stm32wle5cc.html
    consumptionIdleMa: 4.82
    consumptionTxMa: 87
interfaces:
  usb:
    connector: unknown
    capabilities:
      - power
      - serial
      - flashing
  wifi:
    status: none
