# Source: https://docs.rakwireless.com/Product-Categories/Meshtastic/WisMesh-Tap/Quickstart/ (RAKWireless/rakwireless-docs GitHub) · https://docs.rakwireless.com/Product-Categories/WisNode/RAK10701-L/Datasheet/
name: RAK WisMesh Tag
vendorId: rak
kind: product
lifecycle: active
familyId: rak-wismesh
aliases:
  - WisMesh Tag
  - WisMesh Tap
  - RAK10701
image: rak_wismesh_tag.svg
official: true
refs:
  mesh-sh-device: rak-wismesh-tag
price:
  # Source: https://store.rakwireless.com/products/wismesh-tag-meshtastic-gps-lora-tracker-ip66
  amount: 39
  currency: USD
  asOf: 2026-06
product_url: https://docs.rakwireless.com/Product-Categories/Meshtastic/WisMesh-Tap/Quickstart/
description: >-
  All-in-one Meshtastic node based on the RAK10701 Field Tester, with a
  320×240 TFT touchscreen and on-screen keyboard for phone-free messaging.
  nRF52840 + SX1262, integrated GNSS, 3200 mAh battery, and RP-SMA LoRa
  antenna. Pre-flashed with Meshtastic firmware.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/rak-wismesh-tag
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: RP-SMA
  display:
    status: present
    technology: display
    size: 2.8
    resolution:
      width: 320
      height: 240
    colors: color
    touch: true
  gnss:
    status: present
    chip: MIA-M10Q
  leds:
    status: present
    description: Status LEDs
  input:
    - type: button
      description: power button (hold 5s on/off, double-click forced uplink, single-click sleep/wake)
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 3200
    batteryChemistry: li-po
    batteryConnector: JST1.25-2
    charging: true
    # Source: https://mesh-sn.de/en/devices/details/rak-wismesh-tag
    consumptionIdleMa: 5
    consumptionTxMa: 82
  enclosure:
    builtIn: true
  physical:
    dimensionsMm:
      width: 100
      height: 75
      depth: 38
    weightG: 244
  environmental:
    operatingTempC:
      min: -10
      max: 60
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none

