# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://github.com/ndoo/ikoka-nano-meshtastic-device
# Source: https://github.com/meshtastic/firmware/tree/master/variants/xiao_ble
name: Ikoka Nano
vendorId: ikoka
kind: product
lifecycle: active
familyId: ikoka-nano
image: ikoka_nano.svg
official: true
aliases:
  - Ikoka Nano Meshtastic Device
description: >
  Compact Meshtastic node based on the Seeed XIAO nRF52840 and EBYTE E22
  LoRa module. Small, battery-powered board with USB-C and Qwiic connectors;
  no onboard display — intended as a tiny companion/repeater or remote node.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
  radios:
    - technology: lora
      chip: sx1262
  display:
    status: none
  gnss:
    status: none
  power:
    batterySupported: true
    charging: true
    solarInput: false
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: "5.0"
    ble: true
  wifi:
    status: none
