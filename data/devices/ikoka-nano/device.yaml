# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://github.com/ndoo/ikoka-nano-meshtastic-device
# Source: https://github.com/meshtastic/firmware/tree/master/variants/xiao_ble
name: Ikoka Nano
vendorId: ikoka
kind: product
category: development-board
lifecycle: active
familyId: ikoka-nano
image: ikoka_nano.svg
flasherListed: true
aliases:
  - Ikoka Nano Meshtastic Device
  # Source: meshcore-dev/MeshCore variants/ikoka_nano_nrf/platformio.ini
  - Ikoka Nano nRF
  # Source: meshcore-dev/MeshCore variants/ikoka_nano_nrf/platformio.ini
  - Ikoka Nano (nRF52840)
price:
  # Source: mesh101 price range for comparable Ikoka devices ($30-45)
  amount: 39
  currency: USD
  asOf: 2026-06
description: >
  Compact Meshtastic node based on the Seeed XIAO nRF52840 and EBYTE E22
  LoRa module. Small, battery-powered board with USB-C and Qwiic connectors;
  no onboard display — intended as a tiny companion/repeater or remote node.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 2
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
  display:
    status: none
  leds:
    status: unknown
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryChemistry: other
    charging: true
    solarInput: false
    batteryConnector: PicoBlade 1.25-2P
    pmic: BQ25100
  expansion:
    - type: qwiic
      count: 1
      interfaces:
        - I2C
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: "5.0"
    ble: true
  wifi:
    status: none
