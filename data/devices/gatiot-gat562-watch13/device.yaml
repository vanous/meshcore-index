name: GAT-IoT GAT562 Mesh Watch13
vendorId: gatiot
kind: product
lifecycle: active
familyId: gatiot-gat562
variantOf: gatiot-gat562
aliases:
  - GAT562 Watch13
official: true
datasheet: datasheet.pdf
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52
    flashMb: 1
