    chip: ATGM336H
  input:
    - type: button
      description: power
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 800
    charging: true
    solarInput: false
  enclosure:
    builtIn: true
    ipRating: IP65
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
