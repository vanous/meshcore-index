description: >-
  Pocket Meshtastic/MeshCore handheld with ESP32-S3, optional SX1262 LoRa,
  2.8-inch IPS display, mini QWERTY keyboard, and trackball. Built-in
  microphone and speaker for standalone messaging and UI. Wi-Fi and BLE; no
  built-in GPS (external module optional).
