# Source: https://heltec.org/project/wireless-tracker/
# Source: https://resource.heltec.cn/download/Wireless_Tracker/
name: Heltec Wireless Tracker v3
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-wireless-tracker
revision: '3'
aliases:
  - Wireless Tracker
  - Wireless Tracker v3
replaces: heltec-wt2
image: heltec_wt3.svg
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/wireless-tracker/
refs:
  mesh-sh-device: heltec-wireless-tracker
price:
  amount: 45
  currency: USD
  asOf: 2026-06
description: >-
  Heltec Wireless Tracker v3 is an ESP32-S3 + SX1262 LoRa tracker with built-in
  GNSS (GPS), 4000+ mAh battery, solar input, and optional display. Designed for
  Meshtastic mesh networking, IoT tracking, and LoRaWAN applications with extended
  outdoor operation via solar charging and efficient power management.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Source: https://heltec.org/project/wireless-tracker/ (variation data embedded in product page).
variants:
  - name: 433MHz
    sku: ZC-192-2-470
    bands:
      - '433'
  - name: 863~870MHz
    sku: ZC-193-2-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-193-2-915
    bands:
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    psramMb: 8
    # Source: https://mesh-sn.de/hardware/details/heltec-wireless-tracker-v11
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: IPEX-1.0
  display:
    status: present
    technology: display
    controller: ST7735S
    size: 0.96
    resolution:
      width: 80
      height: 160
    colors: color
  gnss:
    status: present
    chip: L76K
  input:
    - type: button
    - type: button
  leds:
    status: present
    # Source: https://mesh-sn.de/en/devices/details/heltec-wireless-tracker-v11
    description: Status LED
  power:
    batterySupported: true
    batteryCapacityMah: 4000
    batteryConnector: SH1.25-2
    charging: true
    solarInput: true
    pmic: AXP2101
  expansion:
    - type: header-2.54
      count: 1
      pins: 12
  physical:
    dimensionsMm:
      width: 65.48
      height: 28.06
      depth: 13.52
    weightG: 55
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present

