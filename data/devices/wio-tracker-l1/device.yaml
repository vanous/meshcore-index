# Source: meshcore-dev/flasher.meshcore.io config.json
name: Seeed Studio Wio Tracker L1
vendorId: seeed
kind: product
lifecycle: active
familyId: seeed-wio-tracker-l1
flasherListed: true
product_url: https://www.seeedstudio.com/Wio-Tracker-L1-p-6453.html
price:
  # Source: https://www.seeedstudio.com/Wio-Tracker-L1-p-6453.html
  amount: 33
  currency: USD
  asOf: 2026-06
description: >-
  Low-power Meshtastic/MeshCore dev board with LoRa, L76K GNSS, a 1.3-inch
  OLED status display, and 4-way joystick. Supports USB-C, solar, and external
  Li-ion battery via JST connector. Board only — no integrated battery or enclosure.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
# Single SKU; radio supports the 862-930 MHz range across regional bands.
# Source: https://www.seeedstudio.com/Wio-Tracker-L1-p-6453.html (SKU 114993648).
variants:
  - name: 862–930MHz
    sku: '114993648'
    bands:
      - '865'
      - '868'
      - '915'
      - '920'
      - '923'

hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/seeed-wio-tracker-l1-pro
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '865'
        - '868'
        - '915'
        - '920'
        - '923'
  display:
    status: present
    technology: oled
    controller: SH1106
    size: 1.3
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: present
    chip: L76K
  leds:
    status: present
    description: Status LEDs
  input:
    - type: joystick
      description: 4-way
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    batteryConnector: JST 1.0mm Li-ion
    batteryChemistry: li-ion
    # Source: https://mesh-sn.de/en/devices/details/seeed-wio-tracker-l1-pro
    consumptionIdleMa: 5
    consumptionTxMa: 85
  enclosure:
    builtIn: false
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: "5.0"
    ble: true
  wifi:
    status: none
