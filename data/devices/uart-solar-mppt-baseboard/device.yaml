# Source: https://lectronz.com/products/solar-mppt-charger-for-meshtastic · https://pcb.uart.cz/
name: μArt.cz Solar Mesh Baseboard
vendorId: uart-cz
kind: kit
lifecycle: active
familyId: uart-cz-solar-node
variantOf: rak-4631
flasherListed: false
product_url: https://lectronz.com/products/solar-mppt-charger-for-meshtastic
price:
  amount: 55
  currency: EUR
  asOf: 2026-06
description: >-
  Bare 70 × 43 mm baseboard built around the RAK4630 (RAK4631-compatible
  firmware) with an integrated MPPT solar charge controller. Solar input
  7–30 V, supports 1S Li-Ion/Li-Pol/LiFePO4 and 1S/2S LTO batteries with a
  3.3V buck/boost converter. No enclosure, panel, or battery included; meant
  to be built into a custom off-grid Meshtastic/MeshCore/Reticulum node.
