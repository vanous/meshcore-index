# Source: https://heltec.org/project/wireless-shell-v3/
# Source: https://resource.heltec.cn/download/Wireless_Shell_V3/HTIT-Wsh_V3%28Rev1.1%29.pdf
# Source: https://wiki.heltec.org/docs/devices/open-source-hardware/esp32-series/lora-32/wireless-shell/
name: Heltec WSL3
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-wsl3
image: heltec_wsl3.svg
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/wireless-shell-v3/
description: >-
  Compact ESP32-S3 + SX1262 LoRa module with Wi-Fi and BLE, built as a
  stamp-hole package for embedding into custom products. The V3 revision uses a
  USB-C interface and a smaller low-power form factor than the classic WiFi LoRa
  32 boards.
price:
  # Source: https://heltec.org/project/wireless-shell-v3/
  amount: 12
  currency: USD
  asOf: 2026-06
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
# Source: https://heltec.org/project/wireless-shell-v3/ (variation data embedded in product page).
variants:
  - name: 470~510MHz
    sku: ZC-157-470
    bands:
      - '470'
  - name: 863~870MHz
    sku: ZC-158-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-158-915
    bands:
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    # Source: https://resource.heltec.cn/download/Wireless_Shell_V3/HTIT-Wsh_V3%28Rev1.1%29.pdf
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: none
  gnss:
    status: none
  leds:
    status: unknown
  power:
    batterySupported: false
    batteryBuiltIn: false
    charging: false
    solarInput: false
    # Source: https://resource.heltec.cn/download/Wireless_Shell_V3/HTIT-Wsh_V3%28Rev1.1%29.pdf
    consumptionIdleMa: 0.009
  physical:
    dimensionsMm:
      width: 38.4
      height: 16.1
      depth: 2.8
    # Source: https://heltec.org/project/wireless-shell-v3/
    weightG: 3
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

