# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.seeedstudio.com/XIAO_ESP32C3_Getting_Started/
name: Seeed Studio Xiao C3
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao-c3
aliases:
  - Seeed XIAO C3 + Wio-SX1262
  - XIAO C3 + Wio-SX1262
image: xiao_esp32c3.svg
official: true
product_url: https://wiki.seeedstudio.com/XIAO_ESP32C3_Getting_Started/
refs:
  mesh-sh-device: seeed-xiao-c3-wio-sx1262
roles:
  - companion
  - repeater
description: >-
  Thumb-sized ESP32-C3 board used as the host board in the Seeed XIAO C3 +
  Wio-SX1262 kit. The base board provides Wi-Fi, BLE, USB flashing, and a
  compact GPIO footprint; LoRa comes from the separate Wio-SX1262 module.
transports:
  - ble
  - usb
  - wifi
# Single SKU for the XIAO C3 + Wio-SX1262 variant bundle.
# Source: https://www.seeedstudio.com/seeed-xiao-esp32c3-p-5431.html (SKU 113991054).
variants:
  - name: 868/915MHz
    sku: '113991054'
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: esp32-c3
    # Source: https://mesh-sn.de/en/devices/details/seeed-xiao-c3-wio-sx1262
    ramKb: 400
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: User LED
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: PCB
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: false
    solarInput: false
    batteryConnector: JST 1.25mm (extern)
    # Source: https://mesh-sn.de/en/devices/details/seeed-xiao-c3-wio-sx1262
    consumptionIdleMa: 10
    consumptionTxMa: 85
  physical:
    dimensionsMm:
      width: 22
      height: 21
      depth: 15
    weightG: 3
price:
  # Source: https://www.seeedstudio.com/Seeed-XIAO-ESP32C3-p-5431.html
  # Source: https://forum.seeedstudio.com/t/xiao-esp32s3-sx1262-lorawan-wiki-example/292535
  amount: 10
  currency: USD
  asOf: 2026-06
interfaces:
  usb:
    connector: unknown
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: unknown
    ble: true
  wifi:
    status: present

# Community 3D-printable enclosures and accessories hosted on Printables.
# `image` is the model's social cover thumbnail (remote URL); `url` links to the printable.
prints:
  - name: "Seeed Studio Xiao ESP32C3 enclosure"
    type: enclosure
    author: "blalor"
    url: "https://www.printables.com/model/539193-seeed-studio-xiao-esp32c3-enclosure"
    image: "https://media.printables.com/media/prints/539193/images/4343951_9aa9716c-87af-401f-9ca4-e7320fefa4c9/thumbs/cover/1200x630/jpeg/img_0137.jpg"
    likes: 60
  - name: "XIAO ESP32-C6 Zigbee Router Case (Split Lid, SMA External Antenna)"
    type: enclosure
    date: 2026-01-05
    author: G_L
    url: https://www.printables.com/model/1543275-xiao-esp32-c6-zigbee-router-case-split-lid-sma-ext
    image: https://media.printables.com/media/prints/8b3c5d0a-57c9-4331-a580-4a39926a24af/images/11636393_7767f0f3-7a59-4784-aa37-0ee1f74353ab_8026be8e-54de-4f87-a8b4-741ab6aaf3dc/xiao-esp32-c6-zigbee-router-case_2.jpg
    likes: 19

