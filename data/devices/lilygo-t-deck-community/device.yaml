# Source: meshcore-dev/flasher.meshcore.io config.json
name: LilyGo T-Deck (community)
vendorId: lilygo
kind: product
lifecycle: active
familyId: lilygo-t-deck
variantOf: lilygo-t-deck
aliases:
  - T-Deck community build
image: lilygo_tdeck.svg
official: true
product_url: https://lilygo.cc/en-us/products/t-deck
price:
  # Source: https://lilygo.cc/en-us/products/t-deck-meshtastic
  amount: 43
  currency: USD
  asOf: 2026-06
description: >-
  Community firmware build of the LilyGo T-Deck handheld, inheriting the same
  ESP32-S3, SX1262, 2.8-inch IPS display, and keyboard/trackball layout as the
  retail T-Deck.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 8
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '868'
        - '915'
      txPowerDbm: 22
  display:
    status: present
    technology: display
    controller: ST7789
    size: 2.8
    resolution:
      width: 320
      height: 240
    colors: color
  gnss:
    status: none
  input:
    - type: keyboard
      description: mini QWERTY
    - type: trackball
  power:
    batterySupported: true
    batteryBuiltIn: true
    charging: true
    solarInput: false
  enclosure:
    builtIn: true
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

# Community 3D-printable models hosted on Printables. `type` is "case" (default)
# or "accessory"; `likes` is the host's like count, used to rank models. `image`
# is the model's social cover thumbnail (remote URL); `url` links to the model.
prints:
  - name: Lilygo T-Deck Meshtastic Slim Case
    type: case
    date: 2024-07-02
    author: Brian Flores
    url: https://www.printables.com/model/873518-lilygo-t-deck-meshtastic-slim-case
    image: https://media.printables.com/media/prints/873518/images/6702521_ad8a676b-d22f-415a-9754-9568e23a12ed_e4d4e8e6-55a3-43ac-b7a4-271d20b57d12/pxl_20240509_012908933portrait.jpg
    likes: 118
