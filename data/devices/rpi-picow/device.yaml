# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://www.raspberrypi.com/documentation/microcontrollers/pico-series.html
# Source: https://pip.raspberrypi.com/documents/RP-008307-DS-pico-datasheet.pdf
name: RPI Pico 2040 + WaveShare SX1262
vendorId: raspberry
kind: kit
lifecycle: active
familyId: raspberry-rpi-pico-2040-waveshare
image: rpi_picow.svg
datasheet: datasheet.pdf
official: true
description: >-
  Raspberry Pi Pico 2040 paired with a WaveShare SX1262 LoRa board for
  lightweight MeshCore and Meshtastic experimentation. The kit emphasizes USB
  flashing and a small RP2040 footprint over integrated display or GNSS
  hardware.
price:
  # Source: https://www.raspberrypi.com/products/raspberry-pi-pico/
  amount: 6
  currency: USD
  asOf: 2026-06
roles:
  - companion
  - repeater
  - room-server
transports:
  - usb
hardware:
  mcu:
    model: rp2040
    flashMb: 2
    # Source: https://www.raspberrypi.com/documentation/microcontrollers/pico-series.html
    ramKb: 264
  radios:
    - technology: lora
      chip: sx1262
      txPowerDbm: 22
  display:
    status: none
  gnss:
    status: none
  leds:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
interfaces:
  usb:
    connector: Micro-USB
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: unknown
    ble: false
  wifi:
    status: none

# Community 3D-printable models hosted on Printables. `type` is "case" (default)
# or "accessory"; `likes` is the host's like count, used to rank models. `image`
# is the model's social cover thumbnail (remote URL); `url` links to the model.
prints:
  - name: Box for Raspberry Pi Pico + Waveshare LoRa Module
    type: enclosure
    date: 2024-06-08
    author: sabotrax
    url: https://www.printables.com/model/906189-box-for-raspberry-pi-pico-waveshare-lora-module
    image: https://media.printables.com/media/prints/906189/images/6927555_40183f04-46b9-47bf-b5db-a8041d6ee965_00ce769d-a0d8-4e9d-9786-62aa09516ce6/pico_lora_box-2.jpg
    likes: 23
