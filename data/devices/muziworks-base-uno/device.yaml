# Source: https://muzi.works/products/base-uno
# Source: https://muzi.works/pages/base
name: Muzi Works Base Uno
vendorId: muziworks
kind: dev-board
lifecycle: active
familyId: muziworks-base
aliases:
  - Base Uno
product_url: https://muzi.works/products/base-uno
price:
  # Source: https://muzi.works/products/base-uno
  amount: 25
  currency: USD
  asOf: 2026-06
  url: https://muzi.works/products/base-uno
description: >-
  Compact BASE System dev board for single-band Meshtastic nodes, pairing an
  nRF52840 MCU with SX1262 LoRa, flexible GPIO, QWIIC/STEMMA QT expansion, and
  a charger that supports battery and solar inputs.
image: base-uno.svg
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 2
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 20
      antenna: SMA
  display:
    status: none
  gnss:
    status: none
  input:
    - type: button
      description: User button
    - type: button
      description: Reset button
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    pmic: BQ28185
    batteryConnector: 3-pin Molex PicoBlade
  expansion:
    - type: qwiic-stemma-qt
      count: 1
      pins: 4
      interfaces:
        - I2C
    - type: header-2.54
      count: 1
      pins: 25
      interfaces:
        - GPIO
        - PWR
        - UART
        - I2C
  physical:
    dimensionsMm:
      width: 42
      height: 32
    weightG: 10
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none

