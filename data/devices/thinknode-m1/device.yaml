# Source: https://www.elecrow.com/thinknode-m1-meshtastic-lora-signal-transceiver-powered-by-nrf52840-with-154-screen-support-gps.html
name: Elecrow ThinkNode M1
vendorId: elecrow
kind: product
lifecycle: active
familyId: elecrow-elecrow-thinknode-m1
refs:
  mesh-sh-device: elecrow-thinknode-m1
aliases:
  - ThinkNode M1
image: thinknode_m1.svg
datasheet: datasheet.pdf
official: true
product_url: https://www.elecrow.com/thinknode-m1-meshtastic-lora-signal-transceiver-powered-by-nrf52840-with-154-screen-support-gps.html
price:
  amount: 54
  currency: USD
  asOf: 2026-06
description: >-
  Handheld nRF52840 + SX1262 Meshtastic/MeshCore transceiver with a 1.54-inch
  E-Paper display, front-light, GPS, RTC, buzzer, and 1200 mAh battery. Ships in
  an ABS+PC enclosure with RP-SMA LoRa antenna and USB-C charging/programming.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
# Source: https://www.elecrow.com/thinknode-m1-meshtastic-lora-signal-transceiver-powered-by-nrf52840-with-154-screen-support-gps.html (base SKU CIL12901M-1, frequency selectable).
variants:
  - name: 868 MHz
    sku: CIL12901M-1
    bands:
      - '868'
  - name: 915 MHz
    sku: CIL12901M-1
    bands:
      - '915'

hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/elecrow-thinknode-m1
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: RP-SMA
  display:
    status: present
    technology: e-paper
    controller: SSD1681
    size: 1.54
    resolution:
      width: 200
      height: 200
    colors: monochrome
    touch: false
  gnss:
    status: present
    chip: L76K
  leds:
    status: present
    description: Status LEDs
  input:
    - type: encoder
      description: rotary power/backlight knob
    - type: button
      description: function button (location ping, backlight, SOS, sleep)
    - type: button
      description: page turn button
    - type: button
      description: reset button
    - type: button
      description: GPS switch
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 1200
    batteryChemistry: li-po
    charging: true
    # Source: https://mesh-sn.de/en/devices/details/elecrow-thinknode-m1
    consumptionIdleMa: 6
    consumptionTxMa: 85
  enclosure:
    builtIn: true
  physical:
    dimensionsMm:
      width: 118.5
      height: 52.1
      depth: 25
    weightG: 82.5
  environmental:
    operatingTempC:
      min: -20
      max: 70
  certifications:
    - FCC
    - CE
    - IC
    - UL
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none

