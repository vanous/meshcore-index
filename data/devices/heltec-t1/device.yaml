# Source: meshcore-dev/MeshCore variants/heltec_t1/platformio.ini + boards/heltec_t1.json
name: Heltec Mesh Node T1
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-mesh-node-t1
product_url: https://heltec.org/
flasherListed: true
price:
  # Source: comparable Heltec nRF52840 + SX1262 board pricing
  amount: 18
  currency: USD
  asOf: 2026-06
description: >-
  Compact Heltec nRF52 + SX1262 mesh target for portable low-power LoRa
  builds. The upstream firmware target exists, but the public product page is
  still sparse.
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Inferred from the nRF52 family used by the board profile
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: none
  leds:
    status: unknown
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
interfaces:
  usb:
    connector: unknown
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
