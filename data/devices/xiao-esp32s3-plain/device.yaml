# Source: meshcore-dev/MeshCore variants/xiao_s3/platformio.ini
# Source: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
name: Seeed Studio XIAO ESP32S3
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao
official: true
product_url: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
description: >-
  Thumb-sized ESP32-S3 XIAO board with Wi-Fi, BLE, USB flashing, and onboard
  user/charge LEDs. A compact host board for wireless and sensor projects, with
  battery charging support and the standard XIAO expansion footprint.
image: xiao-s3-plain.svg
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    psramMb: 8
    # Source: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: User LED and charge LED
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
price:
  # Source: https://www.seeedstudio.com/Wio-SX1262-with-XIAO-ESP32S3-p-5982.html
  amount: 10
  asOf: 2026-06
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

# Community 3D-printable models hosted on Printables. `type` is "case" (default)
# or "accessory"; `likes` is the host's like count, used to rank models. `image`
# is the model's social cover thumbnail (remote URL); `url` links to the model.
prints:
  - name: Snap-fit case for Seeed Studio XIAO ESP32S3
    type: enclosure
    date: 2025-11-07
    author: morozgrafix
    url: https://www.printables.com/model/1143379-snap-fit-case-for-seeed-studio-xiao-esp32s3
    image: https://media.printables.com/media/prints/1143379/images/8628513_3f1fedf9-309e-49f9-94c5-591be96e6e46_ce103e1c-b3f4-49f9-9291-bb72855ca02b/thumbs/cover/800x800/jpeg/img_3651.jpg
    likes: 59
