# Source: https://wiki.seeedstudio.com/meshtastic_solar_node/
name: Seeed Studio SenseCAP Solar Node P1
vendorId: seeed
kind: product
lifecycle: active
familyId: seeed-sensecap-solar
aliases:
  - SenseCAP Solar Node P1
  - SenseCAP Solar P1
image: sensecap_solar.svg
flasherListed: true
product_url: https://www.seeedstudio.com/SenseCAP-Solar-Node-P1-for-Meshtastic-LoRa-p-6425.html
refs:
  mesh-sh-device: sensecap-solar-node-p1
price:
  amount: 66
  currency: USD
  asOf: 2026-06
description: >-
  Economical solar-powered Meshtastic/MeshCore node or repeater for outdoor
  deployment. Integrates XIAO nRF52840 Plus and Wio-SX1262 with a built-in 5W
  solar panel and IPX6 enclosure. Four 18650 battery slots (cells not included)
  and optional XIAO L76K GPS module; no built-in GPS or batteries.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
# Single SKU; sold as 868 MHz / 915 MHz configurable via on-board Wio-SX1262 module.
# Source: https://www.seeedstudio.com/SenseCAP-Solar-Node-P1-for-Meshtastic-LoRa-p-6425.html (SKU 114993643).
variants:
  - name: 868/915MHz
    sku: '114993643'
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/sensecap-solar-node-p1
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: 2dBi rod
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: Status LEDs
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryChemistry: li-ion
    charging: true
    solarInput: true
    solarPanelBuiltIn: true
    solarPanelWatts: 5
    pmic: CN3165
    # Source: https://mesh-sn.de/en/devices/details/sensecap-solar-node-p1
    consumptionIdleMa: 8
    consumptionTxMa: 85
  expansion:
    - type: grove
      count: 1
      interfaces:
        - I2C
        - GPIO
        - UART
  enclosure:
    builtIn: true
    ipRating: IPX6
  physical:
    dimensionsMm:
      width: 191.2
      height: 201.2
      depth: 42.1
  environmental:
    operatingTempC:
      min: -40
      max: 60
  certifications:
    - FCC
    - CE
  input:
    - type: button
      description: power button
    - type: button
      description: reset button
    - type: button
      description: user-defined button
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: "5.0"
    ble: true
  wifi:
    status: none
