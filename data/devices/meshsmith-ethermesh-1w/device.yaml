description: >-
  Fixed-install MeshCore node combining the Waveshare ESP32-P4-POE development
  platform with MeshSmith's 1-watt Ebyte E22P LoRa radio (30 dBm). Designed
  for tower, rooftop, and backbone deployments with hardwired Ethernet. PoE
  powered via a Waveshare PoE module; USB and PoE can be connected
  simultaneously. No GPS or display — just the essentials for a reliable fixed
  repeater or gateway. Sold in 915 MHz and 868 MHz variants.
