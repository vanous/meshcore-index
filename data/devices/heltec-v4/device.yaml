# Source: https://heltec.org/project/wifi-lora-32-v4/
# Source: https://wiki.heltec.org/docs/devices/open-source-hardware/esp32-series/lora-32/wifi-lora-32-v4/
name: Heltec V4
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-wifi-lora-32
revision: '4.3'
aliases:
  - Heltec WiFi LoRa 32 V4
  - WiFi LoRa 32 V4
  - WiFi LoRa 32 V4.3.1
replaces: heltec-v3
image: heltec_v4.svg
official: true
product_url: https://heltec.org/project/wifi-lora-32-v4/
datasheet: datasheet.pdf
price:
  amount: 18
  currency: USD
  asOf: 2026-06
refs:
  mesh-sh-device: heltec-wifi-lora-32-v4
description: >-
  ESP32-S3R2 + SX1262 successor to Heltec V3 with 16 MB flash, 2 MB PSRAM, and
  up to 28 dBm LoRa TX power. Same 0.96-inch OLED and largely V3-compatible
  pinout, plus solar input, optional GNSS header, and built-in 2.4 GHz FPC
  antenna. Native USB-C (no CP2102). Widely used for Meshtastic and MeshCore.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Source: https://heltec.org/project/wifi-lora-32-v4/ (variation data embedded in product page).
variants:
  - name: 863~870MHz OLED (CN)
    sku: ZC-310-1-CN
    bands:
      - '868'
  - name: 902~928MHz OLED (CN)
    sku: ZC-310-1-CN2
    bands:
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 2
    # Source: https://mesh-sn.de/en/devices/details/heltec-wifi-lora-32-v4
    ramKb: 2048
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 28
      antenna: IPEX-1.0
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.96
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    description: White user LED
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: SH1.25-2
    charging: true
    solarInput: true
    batteryChemistry: li-po
    # Source: https://mesh-sn.de/en/devices/details/heltec-wifi-lora-32-v4
    consumptionIdleMa: 20
    consumptionTxMa: 120
  expansion:
    - type: header-2.54
      count: 2
      pins: 18
    - type: header-2.54
      count: 2
      pins: 2
    - type: gnss-1.25-8
      count: 1
      pins: 8
  enclosure:
    builtIn: false
  physical:
    dimensionsMm:
      width: 51.7
      height: 25.4
      depth: 10.7
    weightG: 35
  environmental:
    operatingTempC:
      min: -20
      max: 70
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
