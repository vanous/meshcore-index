# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.bqvoy.com/en/meshtastic/nano-g2-ultra
name: UnitEng Nano G2 Ultra
vendorId: uniteng
kind: product
lifecycle: active
familyId: uniteng-nano-g2-ultra
image: nano_g2.svg
official: true
refs:
  mesh-sh-device: nano-g2-ultra
aliases:
  - Nano G2 Ultra
product_url: https://wiki.bqvoy.com/en/meshtastic/nano-g2-ultra
price:
  # Source: https://shop.uniteng.com/product-category/lora/meshtastic/
  amount: 86
  currency: USD
  asOf: 2026-06
description: >-
  Pocket nRF52840 tracker with SX1262 LoRa, 1.3-inch OLED, GPS, buzzer, and a
  built-in 1200 mAh battery. Intended for MeshCore companion/repeater use with
  Bluetooth 5.4 and a compact on/off-switch form factor.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 2
    # Source: https://mesh-sn.de/en/devices/details/nano-g2-ultra
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      txPowerDbm: 22
  display:
    status: present
    technology: oled
    size: 1.3
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: present
    chip: ATGM336H
  leds:
    status: present
    description: Status LED and buzzer indicator
  input:
    - type: button
      description: program
    - type: button
      description: message read
    - type: button
      description: gps on/off
    - type: button
      description: led or buzzer
    - type: button
      description: power on/off
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 1200
    batteryChemistry: li-po
    charging: true
    solarInput: false
    # Source: https://mesh-sn.de/en/devices/details/nano-g2-ultra
    consumptionIdleMa: 8
    consumptionTxMa: 90
  physical:
    dimensionsMm:
      width: 75
      height: 40
      depth: 15
    weightG: 55
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.4'
    ble: true
  wifi:
    status: none

# Community 3D-printable models hosted on Printables. `type` is "case" (default)
# or "accessory"; `likes` is the host's like count, used to rank models. `image`
# is the model's social cover thumbnail (remote URL); `url` links to the model.
prints:
  - name: Nano G2 Ultra Case
    type: case
    date: 2024-07-28
    author: Blackout Concepts
    url: https://www.printables.com/model/956342-nano-g2-ultra-case
    image: https://media.printables.com/media/prints/956342/images/7293086_6b25096b-f90a-4e78-a0ef-a2f7022ce085_472f7f8e-4980-443e-b6e7-be78aa47b757/20240727_203759.jpg
    likes: 6
