# Source: https://github.com/chrismyers2000/MeshAdventurer
# Source: https://github.com/chrismyers2000/MeshAdventurer/blob/main/PCB/V1.3/BOM_MeshAdventurer_V1.3.csv
name: MeshAdventurer
kind: dev-board
lifecycle: active
familyId: meshadventurer
aliases:
  - Meshadventurer
flasherListed: true
product_url: https://github.com/chrismyers2000/MeshAdventurer
price:
  # Source: BOM-driven DIY build estimate
  amount: 28
  currency: USD
  asOf: 2026-06
description: >-
  DIY off-road ESP32 + E22 LoRa board with a 0.96-inch SSD1306 OLED, rotary
  encoder UI, GPS, and optional BME280 sensor support. Built for 1 W 433 or
  868/915 MHz builds with an external SMA antenna and wide-range 9-28V input.
image: meshadventurer_v1.3.svg
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
hardware:
  mcu:
    model: esp32
    # Inferred from the ESP32-WROOM-32D class MCU
    ramKb: 520
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 30
      antenna: SMA
    - technology: lora
      chip: sx1268
      bands:
        - '433'
      txPowerDbm: 30
      antenna: SMA
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.96
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: present
    chip: ATGM336H
  input:
    - type: button
      description: user button
    - type: encoder
      description: rotary encoder with push switch
  leds:
    status: unknown
  power:
    batterySupported: false
    solarInput: true
    pmic: CJ7805
  expansion:
    - type: header-2.54
      count: 2
      pins: 19
interfaces:
  usb:
    connector: Micro-USB
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '4.2'
    ble: true
  wifi:
    status: present
