# Source: https://heltec.org/project/cubecell-board/
# Source: https://github.com/atomozero/CubeCellMeshCore
name: Heltec CubeCell HTCC-AB01
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-cubecell
aliases:
  - CubeCell Board
  - HTCC-AB01
flasherListed: false
product_url: https://heltec.org/project/htcc-ab01/
description: >-
  Ultra-low-power CubeCell LoRa development board based on ASR6502-class
  silicon with an integrated SX1262 radio. Designed for solar-powered and
  battery-operated IoT deployments.
image: cubecell-htcc-ab01.svg
roles:
  - repeater
transports:
  - usb
# Source: https://heltec.org/project/htcc-ab01/ (variation data embedded in product page).
variants:
  - name: 433MHz
    sku: ZC-148-2-433
    bands:
      - '433'
  - name: 470~510MHz
    sku: ZC-148-2-470
    bands:
      - '470'
  - name: 863~870MHz
    sku: ZC-149-2-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-149-2-915
    bands:
      - '915'

hardware:
  mcu:
    model: asr6502
    flashMb: 0.125
    # Source: CubeCellMeshCore build output / HTCC-AB01_V2 resources
    ramKb: 16
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: none
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    # Source: https://wiki.heltec.org/docs/devices/open-source-hardware/cubecell-series/htcc_ab01/
    consumptionIdleMa: 0.0035
  expansion:
    - type: header-2.54
      count: 2
      interfaces:
        - GPIO
        - SPI
        - I2C
        - UART
        - ADC
        - PWM
        - SWD
  physical:
    dimensionsMm:
      width: 40.64
      height: 22.86
      depth: 7.6
interfaces:
  usb:
    connector: Micro-USB
    bridge: CP2102
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: none
    ble: false
  wifi:
    status: none
