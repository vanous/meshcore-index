# Source: https://heltec.org/project/cubecell-board/
# Source: https://github.com/atomozero/CubeCellMeshCore
name: Heltec CubeCell HTCC-AB01
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-cubecell
aliases:
  - CubeCell Board
  - HTCC-AB01
official: false
description: >-
  Ultra-low-power LoRa development board based on the ASR6601 (Cortex-M4) with integrated
  SX1262 radio. Designed for solar-powered and battery-operated IoT deployments.
roles:
  - repeater
transports:
  - usb
# Source: https://heltec.org/project/htcc-ab01/ (variation data embedded in product page).
variants:
  - name: 433MHz
    sku: ZC-148-2-433
    bands:
      - '433'
  - name: 470~510MHz
    sku: ZC-148-2-470
    bands:
      - '470'
  - name: 863~870MHz
    sku: ZC-149-2-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-149-2-915
    bands:
      - '915'

hardware:
  mcu:
    model: stm32wl
    flashMb: 0.25
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: IPEX-1.0
  display:
    status: none
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    consumptionIdleMa: 0.01
interfaces:
  usb:
    connector: Micro-USB
    capabilities:
      - power
      - serial
      - flashing