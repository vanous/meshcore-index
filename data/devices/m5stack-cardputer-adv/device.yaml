    likes: 23

  - name: M5Stack Cardputer Case
    type: case
    date: 2024-08-12
    author: hippazoid
    url: https://www.printables.com/model/971640-m5stack-cardputer-case
    image: https://media.printables.com/media/prints/971640/images/7419667_576acff9-68d3-489d-9600-dcbc57dbd32b_583beefe-d298-40d9-a32b-21fb9a94faae/thumbs/cover/800x800/jpeg/img_2595.jpg
