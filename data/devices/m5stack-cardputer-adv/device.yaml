prints:
  - name: M5 Stack Cardputer ADV Hardcase + LoRa Cap
    type: case
    date: 2026-02-24
    author: SmonSE
    url: https://www.printables.com/model/1280112-m5-stack-cardputer-adv-hardcase-lora-cap
