price:
  amount: 96
  currency: USD
  asOf: 2026-06
description: >-
  Solar-powered Meshtastic/MeshCore node or repeater with built-in XIAO L76K
  GNSS and four pre-installed 3350 mAh 18650 batteries. Same XIAO nRF52840 Plus
  and Wio-SX1262 core as the P1, plus a 5W solar panel and IPX6 outdoor
  enclosure with Grove expansion port.
roles:
