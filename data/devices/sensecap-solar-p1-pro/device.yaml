      count: 1
      interfaces:
        - I2C
        - GPIO
        - UART
  enclosure:
    builtIn: true
    ipRating: IPX6
  physical:
    dimensionsMm:
      width: 191.2
      height: 201.2
      depth: 42.1
  environmental:
    operatingTempC:
      min: -40
      max: 60
  certifications:
    - FCC
    - CE
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: "5.0"
