# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
name: Seeed Studio Xiao S3 WIO
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao-s3-wio
image: xiao_esp32s3.svg
official: true
product_url: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
description: >-
  Thumb-sized ESP32-S3 XIAO host board paired with the Wio-SX1262 LoRa module.
  Provides Wi-Fi, BLE, USB flashing, and the same compact Seeed XIAO footprint
  for tiny MeshCore companion and repeater builds.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
# Source: https://www.seeedstudio.com/Wio-SX1262-with-XIAO-ESP32S3-p-5982.html (SKU 102010611).
variants:
  - name: 868/915MHz
    sku: '102010611'
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    psramMb: 8
    # Source: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: User LED and charge LED
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
    batteryChemistry: other
    batteryConnector: solder pads
    # Source: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
price:
  # Source: https://www.seeedstudio.com/Wio-SX1262-with-XIAO-ESP32S3-p-5982.html
  amount: 10
  currency: USD
  asOf: 2026-06
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
