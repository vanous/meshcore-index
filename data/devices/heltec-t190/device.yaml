# Source: https://heltec.org/project/vision-master-t190/ · https://docs.heltec.org/en/node/esp32/ht_vmt190/index.html
name: Heltec T190
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-vision-master-t190
aliases:
  - Vision Master T190
  - HT-VMT190
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/vision-master-t190/
description: >-
  ESP32-S3R8 + optional SX1262 LoRa dev board with built-in 1.9-inch TFT
  (170×320, ST7789) for Meshtastic/MeshCore. USB-C, SH1.25 battery connector
  with charge management, SH1.0 QuickLink sensor port, and IPEX Wi-Fi/LoRa
  antennas. Two user buttons; no built-in GPS.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 8
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: present
    technology: display
    controller: ST7789
    size: 1.9
    resolution:
      width: 170
      height: 320
    colors: color
  gnss:
    status: none
  input:
    - type: button
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: SH1.25-2
    charging: true
  expansion:
    - type: header-2.54
      count: 2
      pins: 13
    - type: quicklink-sh1.0-4p
      count: 1
      pins: 4
  enclosure:
    builtIn: false
  physical:
    dimensionsMm:
      width: 60
      height: 25.4
      depth: 10.2
  environmental:
    operatingTempC:
      min: -20
      max: 60
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
