# Source: https://heltec.org/project/vision-master-t190/ · https://docs.heltec.org/en/node/esp32/ht_vmt190/index.html
name: Heltec T190
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-vision-master-t190
aliases:
  - Vision Master T190
  - HT-VMT190
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/vision-master-t190/
description: >-
  ESP32-S3R8 + optional SX1262 LoRa dev board with built-in 1.9-inch TFT
  (170×320, ST7789) for Meshtastic/MeshCore. USB-C, SH1.25 battery connector
  with charge management, SH1.0 QuickLink sensor port, and IPEX Wi-Fi/LoRa
  antennas. Two user buttons; no built-in GPS.
price:
  # Source: https://heltec.org/project/vision-master-t190/
  amount: 18
  currency: USD
  asOf: 2026-06
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Source: https://heltec.org/project/vision-master-t190/ (variation data embedded in product page).
# T190 variants differ in shell/accessory; the bare-board options with Mesh suffix are the dev-board SKUs.
variants:
  - name: 433MHz
    sku: ZC-278-2-433-Mesh
    bands:
      - '433'
  - name: 470~510MHz
    sku: ZC-278-2-470-Mesh
    bands:
      - '470'
  - name: 863~870MHz
    sku: ZC-279-2-868-Mesh
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-279-3-915-Mesh
    bands:
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 8
    # Source: https://heltec.org/project/vision-master-t190/
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: present
    technology: display
    controller: ST7789
    size: 1.9
    resolution:
      width: 170
      height: 320
    colors: color
  gnss:
    status: none
  leds:
    status: present
    description: Status LED
  input:
    - type: button
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: SH1.25-2
    charging: true
    solarInput: false
    # Source: https://heltec.org/project/vision-master-t190/
    consumptionIdleMa: 0.018
  expansion:
    - type: header-2.54
      count: 2
      pins: 13
    - type: quicklink-sh1.0-4p
      count: 1
      pins: 4
  enclosure:
    builtIn: false
  physical:
    dimensionsMm:
      width: 60
      height: 25.4
      depth: 10.2
    weightG: 35
  environmental:
    operatingTempC:
      min: -20
      max: 60
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
