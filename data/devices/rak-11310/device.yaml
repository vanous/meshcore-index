# Source: meshcore-dev/MeshCore variants/rak11310/platformio.ini
# Source: https://docs.rakwireless.com/product-categories/wisblock/rak11310/datasheet/
name: RAK 11310
vendorId: rak
kind: product
lifecycle: active
familyId: rak-11310
aliases:
  - RAK11310 WisBlock Core
official: true
refs:
  mesh-sh-device: rak11310-wisblock-core
description: >-
  WisBlock core module with RP2040 and SX1262 LoRa for compact mesh builds on
  WisBlock base boards. No Wi-Fi or BLE on board; designed to be combined with
  WisBlock communication modules and external antennas.
roles:
  - companion
  - repeater
  - room-server
transports:
  - usb
hardware:
  mcu:
    model: rp2040
    # Source: https://docs.rakwireless.com/product-categories/wisblock/rak11310/datasheet/
    ramKb: 264
    flashMb: 2
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '865'
        - '868'
        - '915'
        - '920'
        - '923'
      antenna: IPEX-1.0
  physical:
    dimensionsMm:
      width: 20
      height: 30
      depth: 2
  display:
    status: none
  gnss:
    status: none
  leds:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    batteryConnector: WisBlock Battery Connector
    # Source: https://mesh-sn.de/hardware/details/rak11310-wisblock-core
    consumptionIdleMa: 15
    consumptionTxMa: 90
interfaces:
  usb:
    connector: none
    capabilities:
      - power
      - serial
      - flashing
  wifi:
    status: none
