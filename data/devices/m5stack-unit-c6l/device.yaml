# Source: https://docs.m5stack.com/en/unit/Unit_C6L
# Source: https://m5stack-doc.oss-cn-shenzhen.aliyuncs.com/1185/U202-SCH_Unit_C6L_SCH_B0.4.1_20250826_2025_08_26_16_13_36.pdf
name: M5Stack Unit C6L
vendorId: m5stack
kind: product
lifecycle: active
familyId: m5stack-m5stack-unit-c6l
official: true
refs:
  mesh-sh-device: m5stack-unit-c6l
price:
  # Source: https://shop.m5stack.com/pages/search-results-page?q=c6%3A
  amount: 23
  currency: USD
  asOf: 2026-06
product_url: https://docs.m5stack.com/en/unit/Unit_C6L
datasheet: datasheet.pdf
description: >-
  ESP32-C6 LoRa unit with an onboard SX1262 radio, OLED status display, RGB
  indicator, buzzer, and a user button. The official documentation highlights
  Wi-Fi 6, Meshtastic support, and the pair of RP-SMA antenna connectors.
image: m5stack-unit-c6l.svg
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Single SKU; M5Stack Unit C6L module with sub-GHz LoRa.
# Source: https://docs.m5stack.com/en/unit/Unit_C6L (SKU U202).
variants:
  - name: 868/915MHz
    sku: U202
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: esp32-c6
    flashMb: 16
    # Source: https://mesh-sn.de/en/devices/details/m5stack-unit-c6l
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 22
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.66
    resolution:
      width: 64
      height: 48
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    description: RGB indicator + status LED
  input:
    - type: button
      description: user button
  power:
    batterySupported: false
    charging: false
    # Source: https://mesh-sn.de/en/devices/details/m5stack-unit-c6l
    consumptionIdleMa: 1
    consumptionTxMa: 85
  physical:
    dimensionsMm:
      width: 62
      height: 24
      depth: 8
    weightG: 13.6
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 ax

