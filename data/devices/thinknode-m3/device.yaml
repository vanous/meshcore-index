description: >-
  Credit-card-sized nRF52840 + LR1110 tracker for Meshtastic/MeshCore or
  LoRaWAN (separate firmware SKUs). GNSS plus Wi-Fi scan and BLE beacon
  positioning via LR1110; temperature, humidity, and accelerometer sensors.
  Built-in 770 mAh battery, magnetic charging, SOS button, and IP66 enclosure.
  No display — BLE configuration only.
