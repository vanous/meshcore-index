# Source: https://heltec.org/project/wireless-tracker-v2/
# Source: https://resource.heltec.cn/download/Wireless_Tracker_V2/Wireless_Tracker_v2_Datasheet/Wireless%20Tracker%20v2.pdf
# Source: https://wiki.heltec.org/docs/devices/open-source-hardware/esp32-series/lora-32/wireless-tracker-v2/
name: Heltec Wireless Tracker v2
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-wireless-tracker
revision: '2'
aliases:
  - Heltec Wireless Tracker V1.1
  - Heltec Wireless Tracker V2
  - Wireless Tracker v2
image: heltec_wt2.svg
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/wireless-tracker-v2/
refs:
  mesh-sh-device: heltec-wireless-tracker-v2
price:
  # Source: https://heltec.org/project/wireless-tracker-v2/
  amount: 31
  currency: USD
  asOf: 2026-06
description: >-
  ESP32-S3 based tracker with SX1262 LoRa, UC6580 GNSS, Wi-Fi, BLE, and a
  0.96-inch 160×80 TFT display. Built for object tracking and mesh networking,
  with USB-C, battery management, and solar-panel support.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Source: https://heltec.org/project/wireless-tracker-v2/ (variation data embedded in product page).
variants:
  - name: 863~870MHz
    sku: ZC-320-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-320-915
    bands:
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    psramMb: 8
    # Source: https://mesh-sn.de/en/devices/details/heltec-wireless-tracker-v2
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '865'
        - '868'
        - '915'
        - '920'
        - '923'
      txPowerDbm: 28
      antenna: IPEX-1.0
  display:
    status: present
    technology: display
    size: 0.96
    resolution:
      width: 160
      height: 80
    colors: color
  gnss:
    status: present
    chip: UC6580
  leds:
    status: present
    description: Status LEDs
  input:
    - type: button
      description: USER_SW
    - type: button
      description: RST_SW
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 600
    batteryConnector: Built-in 600mAh LiPo
    charging: true
    solarInput: false
    # Source: https://mesh-sn.de/en/devices/details/heltec-wireless-tracker-v2
    batteryChemistry: li-po
    # Source: https://mesh-sn.de/en/devices/details/heltec-wireless-tracker-v2
    consumptionIdleMa: 35
    consumptionTxMa: 110
  physical:
    dimensionsMm:
      width: 53
      height: 25.4
      depth: 9.37
    weightG: 55
  expansion:
    - type: header-2.54
      count: 2
      pins: 18
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

