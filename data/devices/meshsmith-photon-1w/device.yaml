description: >-
  1-watt LoRa board built for the Seeed Xiao MCU ecosystem with an Ebyte E22P
  (SX1262) radio delivering 30 dBm output and a built-in ATGM336H GPS. Ships
  as a $65 DIY kit (no MCU), a $75 build with a Xiao nRF52840 or ESP32-C6, or
  $95 with solar management and a 3×18650 holder using the Waveshare Solar
  Power Manager (D). Power-source agnostic: the main board has no built-in
  charger — external regulated 5 V powers the board. Battery sense connector
  for monitoring charge state. Stemma QT/Qwiic I2C expansion port included.
