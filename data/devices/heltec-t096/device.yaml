  # Source: https://heltec.org/project/t096/
  amount: 34
  currency: USD
  asOf: 2026-06

hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-node-t096
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 28
      antenna: IPEX-1.0
  display:
    status: present
    technology: display
    controller: ST7735S
    size: 0.96
    resolution:
      width: 80
      height: 160
    colors: color
  gnss:
    status: present
    chip: UC6580
  leds:
    status: present
    description: Status LEDs
  input:
    - type: button
    - type: button
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: true
    batteryConnector: SH1.25-2
    batteryChemistry: li-po
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-node-t096
    consumptionIdleMa: 13
    consumptionTxMa: 130
  physical:
    dimensionsMm:
      width: 52
      height: 25.4
      depth: 10.26
  expansion:
    - type: header-2.54
      count: 2
      pins: 13
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
