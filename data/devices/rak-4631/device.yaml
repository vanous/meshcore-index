# Source: https://docs.rakwireless.com/Product-Categories/WisBlock/RAK4631/Datasheet/ (RAKWireless/rakwireless-docs GitHub) · https://docs.rakwireless.com/Product-Categories/WisBlock/RAK4631/Overview/
name: RAK WisBlock / WisMesh (RAK 4631)
vendorId: rak
kind: module
lifecycle: active
familyId: rak-wisblock
aliases:
  - RAK4631 WisBlock Core
  - RAK4631
  - WisBlock Core RAK4631
  - RAK4631-R
image: rak_4631.svg
datasheet: datasheet.pdf
official: true
refs:
  mesh-sh-device: rak4631-wisblock-core
price:
  # Source: https://store.rakwireless.com/products/rak4631-lpwan-node
  amount: 18
  currency: USD
  asOf: 2026-06
product_url: https://docs.rakwireless.com/Product-Categories/WisBlock/RAK4631/Overview/
description: >-
  WisBlock Core module pairing an nRF52840 MCU with an SX1262 LoRa
  transceiver (RAK4630 stamp), designed to plug into a WisBlock base board
  (RAK5005-O / RAK19007). BLE 5.0, 22 dBm LoRa output, and 2.0 µA sleep
  current. The basis of the RAK WisMesh Base, WisMesh Tap, and Meshtastic
  Starter Kit.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Source: https://mesh-sn.de/hardware/details/rak4631-wisblock-core
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 22
      antenna: IPEX-1.0
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    # Source: https://mesh-sn.de/hardware/details/rak4631-wisblock-core
    description: Status LED
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: WisBlock Battery Connector
    charging: true
    solarInput: true
    # Source: https://mesh-sn.de/hardware/details/rak4631-wisblock-core
    consumptionIdleMa: 12
    consumptionTxMa: 85
  physical:
    dimensionsMm:
      width: 30
      height: 20
      depth: 3
    # Source: https://mesh-sn.de/hardware/details/rak4631-wisblock-core
    weightG: 5
  environmental:
    operatingTempC:
      min: -40
      max: 85
  certifications:
    - FCC
    - CE
    - ISED
    - KCC
    - RCM
interfaces:
  usb:
    connector: Micro-USB
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
