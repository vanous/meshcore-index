# Source: https://heltec.org/project/meshsolar/
# Source: https://docs.heltec.org/en/node/meshsolar/index.html
name: Heltec MeshSolar / MeshTower
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-meshsolar-meshtower
aliases:
  - Heltec Mesh Solar
  - Heltec MeshTower
image: heltec_mesh_solar.svg
flasherListed: true
product_url: https://heltec.org/project/meshsolar/
refs:
  mesh-sh-device: heltec-mesh-solar
price:
  # Source: https://heltec.org/project/meshsolar/
  amount: 39
  currency: USD
  asOf: 2026-06
description: >-
  Outdoor solar-ready power and communication platform combining a BMS board
  with an BLE + LoRa control board. Built for long-lived mesh deployments with
  solar charging, interchangeable battery chemistry support, and optional
  GNSS/display expansion.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
# Source: https://heltec.org/project/meshsolar/ (variation data embedded in product page).
variants:
  - name: 863~870MHz
    sku: ZC-312-1
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-312-1-915
    bands:
      - '915'

hardware:
  mcu:
    model: nrf52
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-solar
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      antenna: IPEX-1.0
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: Status LEDs
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: JST LiPo + Solar
    charging: true
    solarInput: true
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-solar
    batteryChemistry: li-po
    # Source: https://mesh-sn.de/en/devices/details/heltec-mesh-solar
    consumptionIdleMa: 8
    consumptionTxMa: 85
  physical:
    weightG: 35
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
