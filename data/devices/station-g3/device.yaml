name: UnitEng Station G3 ESP32
vendorId: uniteng
kind: product
lifecycle: active
familyId: uniteng-station-g3
description: >-
  Modular Station board with an ESP32-S3 MCU daughterboard, an RF
  daughterboard, and a 1.3-inch OLED display. Designed for external 9-19 V
  power input and firmware compatibility with Station G2 profiles.
product_url: https://wiki.bqvoy.com/en/devkits/station-g3
flasherListed: true
price:
  # Source: https://shop.uniteng.com/product/meshtastic-mesh-device-station-edition/
  amount: 109
  currency: USD
  asOf: 2026-06
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 8
    # Source: https://wiki.bqvoy.com/en/devkits/station-g3
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      txPowerDbm: 35
      antenna: SMA
  display:
    status: present
    technology: oled
    size: 1.3
    colors: monochrome
  gnss:
    status: none
  input:
    - type: button
      description: Program
    - type: button
      description: Firmware Download
    - type: button
      description: Restart
  physical:
    dimensionsMm:
      width: 110
      height: 58
      depth: 22
    weightG: 87.5
  power:
    batterySupported: false
    batteryBuiltIn: false
    charging: false
    solarInput: false
    batteryConnector: extern (Netzteil)
  expansion:
    - type: grove
      count: 2
      interfaces:
        - I2C
        - GPIO
        - UART
    - type: qwiic
      count: 1
      interfaces:
        - I2C
interfaces:
  wifi:
    status: present
    standard: 802.11 b/g/n
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
