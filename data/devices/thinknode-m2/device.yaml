# Source: https://www.elecrow.com/thinknode-m2-meshtastic-lora-signal-transceiver-powered-by-esp32-s3-with-1-3-oled-display.html
# Source: https://www.elecrow.com/download/product/CIL13002M/ThinkNode_M2_Meshtastic_Signal_Transceiver_DataSheet.pdf
name: Elecrow ThinkNode M2 Mini
vendorId: elecrow
kind: product
lifecycle: active
familyId: elecrow-elecrow-thinknode-m2
aliases:
  - Elecrow ThinkNode M2
  - ThinkNode M2 Mini
  - ThinkNode M2
image: thinknode_m2.svg
datasheet: datasheet.pdf
official: true
product_url: https://www.elecrow.com/thinknode-m2-meshtastic-lora-signal-transceiver-powered-by-esp32-s3-with-1-3-oled-display.html
refs:
  mesh-sh-device: elecrow-thinknode-m2
price:
  amount: 41
  currency: USD
  asOf: 2026-06
description: >-
  Compact Meshtastic/MeshCore LoRa transceiver with ESP32-S3, SX1262, and a
  1.3-inch OLED status display. Built-in 1000 mAh battery, USB-C charging, Wi-Fi,
  and BLE. Ships with ABS enclosure and external LoRa antenna via internal IPEX
  connector. Pre-flashed for Meshtastic; no GPS.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Source: https://www.elecrow.com/thinknode-m2-meshtastic-lora-signal-transceiver-powered-by-esp32-s3-with-1-3-oled-display.html (SKU CIL13002M).
variants:
  - name: 868/915MHz
    sku: CIL13002M
    bands:
      - '868'
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 4
    psramMb: 8
    # Source: https://mesh-sn.de/en/devices/details/elecrow-thinknode-m2
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
      antenna: IPEX
  display:
    status: present
    technology: oled
    controller: SH1106
    size: 1.3
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    description: Status LEDs
  input:
    - type: button
      description: PWR button
    - type: button
      description: function button
    - type: button
      description: BOOT button
    - type: button
      description: reset button
  power:
    batterySupported: true
    batteryBuiltIn: true
    batteryCapacityMah: 1000
    batteryChemistry: li-po
    batteryConnector: JST1.25-2
    charging: true
    # Source: https://mesh-sn.de/en/devices/details/elecrow-thinknode-m2
    consumptionIdleMa: 35
    consumptionTxMa: 120
  enclosure:
    builtIn: true
  physical:
    dimensionsMm:
      width: 88.5
      height: 46.3
      depth: 23.8
    weightG: 45.3
  environmental:
    operatingTempC:
      min: -10
      max: 50
  certifications:
    - FCC
interfaces:
  usb:
    connector: USB-C
    bridge: CH9102
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 a/b/g/n

