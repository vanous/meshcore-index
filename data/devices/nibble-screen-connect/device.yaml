name: Nibble Screen Connect
vendorId: nibble
kind: product
lifecycle: active
familyId: nibble-nibble-screen-connect
official: true
product_url: https://retia.io/products/nibble-screen-connect
price:
  # Source: https://retia.io/collections/all
  amount: 50
  currency: USD
  asOf: 2026-06
description: >-
  Breadboard-friendly Nibble node with a built-in screen, buttons, and a
  through-hole expansion layout aimed at MeshCore and Meshtastic hacking. The
  design pairs a Waveshare ESP32-S3 Zero with a Seeed Wio SX1262 radio module.
image: nibble-screen-connect.svg
transports:
  - ble
  - usb
  - wifi
# Single SKU kit; unsoldered screen-connect kit for Nibble.
