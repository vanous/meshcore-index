      bands:
        - '868'
        - '915'
  display:
    status: present
    technology: display
    controller: SSD1306
    size: 0.92
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    description: Indicator LED
  input:
