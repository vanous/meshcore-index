# Source: https://heltec.org/project/wifi-lora-32-v3/
name: Heltec V3
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-wifi-lora-32
revision: '3'
aliases:
  - Heltec WiFi LoRa 32 V3
  - WiFi LoRa 32 V3
replaces: heltec-v2
image: heltec_v3.svg
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/wifi-lora-32-v3/
price:
  amount: 18
  currency: USD
  asOf: 2026-06
refs:
  mesh-sh-device: heltec-wifi-lora-32-v3
description: >-
  Classic ESP32-S3 + SX1262 LoRa development board with integrated 0.96-inch
  OLED, Wi-Fi, and BLE. USB-C power and CP2102 serial, SH1.25 battery connector
  with charge management, and IPEX LoRa antenna. Widely used for Meshtastic and
  MeshCore companion, repeater, and room-server nodes.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
# Sold in four per-band options; pick one at purchase (radios.bands is their union).
# SKU sources: Heltec WooCommerce product page (V3.2, variation IDs 78555-78562).
variants:
  - name: 433MHz / V3.0
    revision: '3.0'
    bands:
      - '433'
  - name: 433MHz / V3.1
    revision: '3.1'
    bands:
      - '433'
  - name: 433MHz / V3.2
    sku: ZC-152-2-433
    revision: '3.2'
    bands:
      - '433'
  - name: 470~510MHz / V3.0
    revision: '3.0'
    bands:
      - '470'
  - name: 470~510MHz / V3.1
    revision: '3.1'
    bands:
      - '470'
  - name: 470~510MHz / V3.2
    sku: ZC-152-2-470
    revision: '3.2'
    bands:
      - '470'
  - name: 863~870MHz / V3.0
    revision: '3.0'
    bands:
      - '868'
  - name: 863~870MHz / V3.1
    revision: '3.1'
    bands:
      - '868'
  - name: 863~870MHz / V3.2
    sku: ZC-153-2-868
    revision: '3.2'
    bands:
      - '868'
  - name: 902~928MHz / V3.0
    revision: '3.0'
    bands:
      - '915'
  - name: 902~928MHz / V3.1
    revision: '3.1'
    bands:
      - '915'
  - name: 902~928MHz / V3.2
    sku: ZC-153-2-915
    revision: '3.2'
    bands:
      - '915'
hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.96
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: SH1.25-2
    charging: true
    batteryChemistry: li-po
    # Source: https://mesh-sn.de/en/devices/details/heltec-wifi-lora-32-v3
    consumptionIdleMa: 45
    consumptionTxMa: 120
  leds:
    status: present
    description: White user LED (GPIO35)
  expansion:
    - type: header-2.54
      count: 2
      pins: 18
  enclosure:
    builtIn: false
  physical:
    dimensionsMm:
      width: 50.2
      height: 25.5
      depth: 10.2
    weightG: 35
  environmental:
    operatingTempC:
      min: -20
      max: 70
interfaces:
  usb:
    connector: USB-C
    bridge: CP2102
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
