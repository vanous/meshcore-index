hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.96
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: SH1.25-2
    charging: true
    batteryChemistry: li-po
    # Source: https://mesh-sn.de/en/devices/details/heltec-wifi-lora-32-v3
    consumptionIdleMa: 45
    consumptionTxMa: 120
  leds:
    status: present
    description: White user LED (GPIO35)
  expansion:
    - type: header-2.54
      count: 2
      pins: 18
  enclosure:
    builtIn: false
  physical:
    dimensionsMm:
      width: 50.2
      height: 25.5
      depth: 10.2
    weightG: 35
  environmental:
    operatingTempC:
      min: -20
      max: 70
interfaces:
  usb:
    connector: USB-C
    bridge: CP2102
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
