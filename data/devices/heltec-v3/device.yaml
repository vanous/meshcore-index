# Source: https://heltec.org/project/wifi-lora-32-v3/
name: Heltec V3
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-wifi-lora-32
revision: '3'
aliases:
  - Heltec WiFi LoRa 32 V3
  - WiFi LoRa 32 V3
replaces: heltec-v2
image: heltec_v3.svg
datasheet: datasheet.pdf
official: true
product_url: https://heltec.org/project/wifi-lora-32-v3/
price:
  amount: 18
  currency: USD
  asOf: 2026-06
refs:
  mesh-sh-device: heltec-wifi-lora-32-v3
description: >-
  Classic ESP32-S3 + SX1262 LoRa development board with integrated 0.96-inch
  OLED, Wi-Fi, and BLE. USB-C power and CP2102 serial, SH1.25 battery connector
  with charge management, and IPEX LoRa antenna. Widely used for Meshtastic and
  MeshCore companion, repeater, and room-server nodes.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
