# Source: https://heltec.org/project/wireless-paper/ · https://wiki.heltec.org/docs/devices/open-source-hardware/esp32-series/lora-32/wireless-paper/
name: Heltec Wireless Paper
vendorId: heltec
kind: dev-board
lifecycle: active
familyId: heltec-wireless-paper
aliases:
  - Wireless Paper
image: heltec_paper.svg
datasheet: datasheet.pdf
official: true
refs:
  mesh-sh-device: heltec-wireless-paper
product_url: https://heltec.org/project/wireless-paper/
price:
  amount: 16
  currency: USD
  asOf: 2026-06
description: >-
  ESP32-S3FN8 + SX1262 E-Ink development board with a 2.13-inch black-and-white
  display. USB-C power/programming and SH1.25 battery connector; compatible
  with Meshtastic/MeshCore.
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
# Source: https://heltec.org/project/wireless-paper/ (variation data embedded in product page).
variants:
  - name: 433MHz
    sku: ZC-194-2-433
    bands:
      - '433'
  - name: 470~510MHz
    sku: ZC-194-2-470
    bands:
      - '470'
  - name: 863~870MHz
    sku: ZC-195-2-868
    bands:
      - '868'
  - name: 902~928MHz
    sku: ZC-195-2-915
    bands:
      - '915'

hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    # Source: https://heltec.org
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '433'
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: present
    technology: e-paper
    size: 2.13
    resolution:
      width: 250
      height: 122
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    # Source: https://github.com/meshcore-dev/MeshCore/issues/1276
    description: White status LED
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: SH1.25-2
    charging: true
    batteryChemistry: li-po
    # Source: https://heltec.org/Documents/Rev.1.0/WirelessPaper.pdf
    consumptionIdleMa: 0.02
    consumptionTxMa: 215
  enclosure:
    builtIn: false
  physical:
    dimensionsMm:
      width: 88
      height: 88
      depth: 25
    weightG: 60
  environmental:
    operatingTempC:
      min: 0
      max: 50
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

