  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32
    flashMb: 4
    # Source: https://mesh-sn.de/hardware/details/lilygo-lora32-v21-16
    ramKb: 520
  radios:
    - technology: lora
      chip: sx1276
      bands:
        - '868'
        - '915'
      txPowerDbm: 20
      antenna: IPEX-1.0
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.96
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    # Source: https://mesh-sn.de/hardware/details/lilygo-lora32-v21-16
    description: Status LED
  power:
    batterySupported: true
    batteryBuiltIn: false
    batteryConnector: JST 1.25mm
    charging: true
    # Source: https://mesh-sn.de/hardware/details/lilygo-lora32-v21-16
    consumptionIdleMa: 55
    consumptionTxMa: 130
  physical:
    dimensionsMm:
      width: 51
      height: 28
      depth: 11
    # Source: https://mesh-sn.de/hardware/details/lilygo-lora32-v21-16
    weightG: 13
  expansion:
    - type: micro-SD
      count: 1
  environmental:
    operatingTempC:
      min: -40
      max: 85
interfaces:
  usb:
    connector: USB-C
    bridge: CH9102
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '4.2'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n

