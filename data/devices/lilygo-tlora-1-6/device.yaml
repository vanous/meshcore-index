# Source: https://github.com/Xinyuan-LilyGO/LilyGo-LoRa-Series/blob/master/docs/en/t3_v161_sx1276/t3_v161_sx1276_hw.md · https://github.com/Xinyuan-LilyGO/LilyGo-LoRa-Series/blob/master/schematic/T3_V1.6.1.pdf
name: LilyGo LoRa32 V2.1_1.6
vendorId: lilygo
kind: dev-board
lifecycle: active
familyId: lilygo-lora32-1-1-6
revision: '2'
aliases:
