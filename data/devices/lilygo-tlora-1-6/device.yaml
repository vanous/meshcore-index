description: >-
  ESP32-PICO-D4 + SX1276 LoRa development board with SSD1306 OLED and micro-SD
  slot. USB-C with CH9102 bridge and PH2.0 battery connector. No on-board BMS
  — use a protected Li-ion cell.
price:
