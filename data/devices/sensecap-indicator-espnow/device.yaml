name: Seeed Studio SenseCAP Indicator ESP-NOW
vendorId: seeed
kind: product
lifecycle: active
familyId: seeed-sensecap-indicator-esp-now
flasherListed: true
product_url: https://www.seeedstudio.com/SenseCAP-Indicator-D1L-for-Meshtastic-p-6304.html
price:
  # Source: https://forum.seeedstudio.com/t/i-cant-even-get-started-is-there-phone-support/285080
  amount: 61
  currency: USD
  asOf: 2026-06
roles:
  - standalone-ui
description: >-
  4-inch SenseCAP Indicator touchscreen platform for firmware experiments and
