# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.seeedstudio.com/xiao_esp32c6_getting_started/
name: Seeed Studio Xiao C6
vendorId: seeed
kind: dev-board
lifecycle: unknown
familyId: seeed-xiao-c6
image: xiao_esp32c6.svg
official: false
product_url: https://wiki.seeedstudio.com/xiao_esp32c6_getting_started/
description: >-
  Thumb-sized ESP32-C6 XIAO board with Wi-Fi 6, BLE 5, and Thread/Zigbee-capable
  radio support. MeshCore uses it as a compact companion or repeater host with
  the Wio-SX1262 LoRa module attached.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-c6
    flashMb: 4
    # Source: https://wiki.seeedstudio.com/xiao_esp32c6_getting_started/
    ramKb: 400
  radios:
    - technology: lora
      chip: sx1262
      bands:
        - '868'
        - '915'
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: User LED and charge LED
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
    batteryChemistry: other
    batteryConnector: solder pads
    # Source: https://wiki.seeedstudio.com/xiao_esp32c6_getting_started/
price:
  # Source: https://www.seeedstudio.com/Seeed-Studio-XIAO-ESP32C6-p-5884.html
  # Source: https://forum.seeedstudio.com/t/xiao-esp32s3-sx1262-lorawan-wiki-example/292535
  amount: 10
  asOf: 2026-06
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.3'
    ble: true
  wifi:
    status: present
    standard: 802.11 ax

# Community 3D-printable models hosted on Printables. `type` is "case" (default)
# or "accessory"; `likes` is the host's like count, used to rank models. `image`
# is the model's social cover thumbnail (remote URL); `url` links to the model.
prints:
  - name: Box ESP32-C6 XIAO
    type: enclosure
    date: 2025-04-27
    author: Lomax1983
    url: https://www.printables.com/model/1278374-box-esp32-c6-xiao
    image: https://media.printables.com/media/prints/5bb8f8d2-a2a3-45a2-9231-36b3bc8f910b/images/9615421_2c817a49-d920-420d-a076-d09893e1d34d_c0ff7391-7015-4cdb-9068-985962b1acbe/20250427_154946.jpg
    likes: 15
